  {type:'single',question:'实行总承包管理的建设工程，(    )应对绿色施工负总责。',options:['劳务单位', '专业承包单位', '分包单位', '总承包单位'],answer:[3],analysis:'实行总承包管理的建设工程，总承包单位应对绿色施工负总责。',memory:'【绿色施工总责】实行总承包管理时，总承包单位对绿色施工负总责',section:'8.1  绿色建造管理'},
  {type:'single',question:'现场办公和生活用房采用周转式活动房现场围挡应最大限度地利用已有围墙，或采用装配式可重复使用围挡封闭力争工地临房临时围挡材料的可重复使用率达到(    )。',options:['70%', '80%', '60%', '90%'],answer:[0],analysis:'现场办公和生活用房采用周转式活动房现场围挡应最大限度地利用已有围墙，或采用装配式可重复使用围挡封闭力争工地临房临时围挡材料的可重复使用率达到70%。',memory:'【临房围挡可重复使用率】临房临时围挡材料可重复使用率达到70%（不是80%/90%）',section:'8.1  绿色建造管理'},
  {type:'single',question:'处于基坑降水阶段的工地，宜优先采用地下水作为混凝土搅拌用水、养护用水、冲洗用水和部分生活用水现场机具、设备、车辆冲洗喷洒路面绿化浇灌等用水，优先采用非传统水掘，尽量不使用市政自来水力争施工中非传统水源和循环水的再利用量大于(    )。',options:['20%', '30%', '40%', '50%'],answer:[1],analysis:'处于基坑降水阶段的工地，宜优先采用地下水作为混凝土搅拌用水、养护用水、冲洗用水和部分生活用水现场机具、设备、车辆冲洗喷洒路面绿化浇灌等用水，优先采用非传统水掘，尽量不使用市政自来水力争施工中非传统水源和循环水的再利用量大于30%。',memory:'【非传统水源再利用率】施工中非传统水源和循环水再利用量>30%（基坑降水阶段优先用地下水）',section:'8.1  绿色建造管理'},
  {type:'single',question:'照明照度宜按最低合理照度设计照明设计以满足最低照度为原则，照度不应超过最低照度的(    )施工现场宜错峰用电',options:['50%', '40%', '30%', '20%'],answer:[3],analysis:'照明照度宜按最低合理照度设计照明设计以满足最低照度为原则，照度不应超过最低照度的20%施工现场宜错峰用电。',memory:'【照明照度上限】照度不应超过最低照度的20%（上浮不超20%，施工现场宜错峰用电）',section:'8.1  绿色建造管理'},
  {type:'single',question:'为保护环境，在土方作业阶段，施工现场作业区目测扬尘高度应小于（ ）m。',options:['2.0', '2.5', '1.5', '3.0'],answer:[2],analysis:'土方作业阶段，采取洒水、覆盖等措施，达到作业区目测扬尘高度小于 1.5m，不扩散到场区外。',memory:'【扬尘高度控制】土方作业阶段：作业区目测扬尘高度<1.5m（不是2.0m或2.5m）',section:'8.1  绿色建造管理'},
  {type:'single',question:'作为绿色策划的主要内容，绿色交付策划应明确的内容是（ ）。',options:['绿色建造效果评估内容及方式', '绿色建造目标及实施路径', '绿色建造全过程数字化技术应用方式', '绿色建造各参与方协同工作机制'],answer:[0],analysis:'绿色交付策划：\n（1）应根据建筑类型和运营维护需求确定绿色建造项目的实体交付内容及交付标准。\n（2）宜按照城市信息化建设要求和运营维护需求，制定数字化交付标准和方案，明确各阶段责任主体和交付成果。\n（3）应明确综合效能调适及绿色建造效果评估的内容及方式。',memory:'【绿色交付策划内容】明确综合效能调适及绿色建造效果评估的内容及方式（交付策划关注交付后使用效果）',section:'8.1  绿色建造管理'},
  {type:'multi',question:'可持续发展的基本原则有(    )。',options:['共同性', '持续性', '延续性', '公正性', '公平性'],answer:[0, 1, 4],analysis:'可持续发展有公平性、持续性和共同性三项基本原则。',memory:'【可持续发展三原则】公平性+持续性+共同性。口诀："公持共"（公平持续共同发展）。不含"延续性"',section:'8.1  绿色建造管理'},
  {type:'multi',question:'清洁生产的主要内容可归纳为(    )。',options:['清洁的人员控制', '清洁的生产过程', '贯穿于清洁生产的全过程控制', '清洁的产品', '清洁的原料与能源'],answer:[1, 2, 3, 4],analysis:'清洁生产的主要内容可归纳为“三清一控”。①清洁的原料与能源；②清洁的生产过程；③清洁的产品；④贯穿于清洁生产的全过程控制。',memory:'【清洁生产三清一控】清洁原料能源+清洁生产过程+清洁产品+全过程控制。口诀："三清一控"',section:'8.1  绿色建造管理'},
  {type:'multi',question:'循环经济的“3R”原则是(    )。',options:['再清洁', '再利用', '减量化', '再循环', '可持续性'],answer:[1, 2, 3],analysis:'循环经济的“3R”原则，即“减量化”(Reduce)、“再利用”(Reuse)、“再循环”(Recycle)，是绿色施工需遵循的重要原则。',memory:'【3R原则】减量化(Reduce)+再利用(Reuse)+再循环(Recycle)。口诀："减再循"',section:'8.1  绿色建造管理'},
  {type:'multi',question:'LCA方法应用可分(    )阶段。',options:['人材机分析', '清单分析', '效果评估', '影响评估', '目的与范围确定'],answer:[1, 3, 4],analysis:'LCA方法应用可分为以下四个阶段：(1)目的与范围确定；(2)清单分析；(3)影响评估；(4)解释说明。',memory:'【LCA四阶段】目的与范围确定→清单分析→影响评估→解释说明。口诀："目清影解"',section:'8.1  绿色建造管理'},
  {type:'multi',question:'以下属于建设单位绿色施工职责的是(    )。',options:['应建立建设工程绿色施工的协调机制', '应进行绿色设计', '在编制工程概算和招标文件时，应明确绿色施工的要求', '制定绿色施工管理制度', '应审查绿色施工专项方案'],answer:[0, 2],analysis:'B选项是设计单位绿色施工职责；D选项是施工单位绿色施工职责；E选项是工程监理单位绿色施工职责。',memory:'【建设单位绿色施工职责】建立协调机制+概算招标文件明确要求+审查绿色施工专项方案。注意：绿色设计是设计单位的事',section:'8.1  绿色建造管理'},
  {type:'multi',question:'绿色施工管理措施包括(    )。',options:['周转材料利用', '节材与材料资源利用', '绿色施工组织设计', '设备材料管理', '排放和减量化管理'],answer:[2, 3, 4],analysis:'绿色施工管理措施包括：1)绿色施工组织设计和绿色施工方案；2)人员安全与健康管理；3)设备材料管理；4)用能用水管理；5)排放和减量化管理；6)环境监测管理。',memory:'【绿色施工管理措施】绿色施工组织设计+人员安全健康+设备材料管理+用能用水+排放减量化+环境监测',section:'8.1  绿色建造管理'},
  {type:'multi',question:'绿色施工方案应包括(    )内容。',options:['节能措施', '节电措施', '节材措施', '节气措施', '节水措施'],answer:[0, 2, 4],analysis:'绿色施工方案应包括以下内容：①节材措施。②节水措施。③节能措施。④节地与施工用地保护措施。⑤环境保护措施。',memory:'【绿色施工方案五内容】节材+节水+节能+节地与施工用地保护+环境保护。口诀："材水能地环"（两节一保一环）',section:'8.1  绿色建造管理'},
  {type:'multi',question:'绿色施工技术措施包括(    )。',options:['发展绿色施工“四新”技术', '人员安全与健康管理', '节材与材料资源利用', '用能用水管理', '节能与能源利用'],answer:[0, 2, 4],analysis:'BD选项属于绿色施工管理措施。',memory:'【绿色施工技术vs管理措施区别】技术措施：四新技术+节材资源利用+节能能源利用。管理措施：人员健康、用能用水管理',section:'8.1  绿色建造管理'},
  {type:'multi',question:'绿色施工组织设计、绿色施工方案或绿色施工专项方案的编制应符合下列规定：(    )。',options:['应考虑施工现场的自然与人文环境特点', '应有减少资源浪费和环境污染的措施', '应明确绿色施工的组织管理体系、技术要求和措施', '应选用非先进的产品、技术、设备、施工工艺和方法，利用规划区域内设施', '应包含改善作业条件、提高劳动强度、节约人力资源等内容'],answer:[0, 1, 2],analysis:'绿色施工组织设计、绿色施工方案或绿色施工专项方案的编制应符合下列规定：(1)应考虑施工现场的自然与人文环境特点(2)应有减少资源浪费和环境污染的措施(3)应明确绿色施工的组织管理体系、技术要求和措施(4)应选用先进的产品、技术、设备、施工工艺和方法，利用规划区域内设施。(5)应包含改善作业条件、降低劳动强度、节约人力资源等内容。',memory:'【绿色方案编制规定关键词】先进产品技术（不是"非先进"）；降低劳动强度（不是"提高"）',section:'8.1  绿色建造管理'},
  {type:'multi',question:'下列选项中属于节材措施的是(    )。',options:['施工现场500km以内生产的建筑材料用量占建筑材料总重量的80%以上', '采取措施提高模板、脚手架等的周转次数', '减少二次搬运', '应根据施工进度、库存情况等合理安排材料的采购、进场时间和批次，减少库存', '采用工具式模板和新型模板材料'],answer:[1, 2, 3, 4],analysis:'节材措施鼓励就地取材，施工现场500km以内生产的建筑材料用量占建筑材料总重量的70%以上，宜优先选用获得绿色建材评价认证标识的建筑材料和产品。应根据施工进度、库存情况等合理安排材料的采购、进场时间和批次，减少库存材料运输工具适宜，装卸方法得当，防止损坏和遗洒根据现场平面布置情况就近卸载，避免和减少二次搬运采取措施提高模板、脚手架等的周转次数，如采用管件合一的脚手架和支撑体系，采用工具式模板和新型模板材料，如铝合金、塑料、玻璃钢和其他可再生材质的大模板和钢框镶边模板等。',memory:'【节材措施中的500km规定】施工现场500km内生产的建材用量占总量≥70%（不是80%）就地取材',section:'8.1  绿色建造管理'},
  {type:'multi',question:'绿色建造需要将绿色发展理念融入工程策划、设计、施工、交付全过程，除体现绿色化外，还应体现的特征有（ ）。',options:['信息化', '工业化', '系统化', '产业化', '集约化'],answer:[0, 1, 3, 4],analysis:'绿色建造需要将绿色发展理念融入工程策划、设计、施工、交付的建造全过程，充分体现绿色化、工业化、信息化、集约化和产业化的总体特征。',memory:'【绿色建造五大特征】绿色化+工业化+信息化+集约化+产业化。口诀："绿工信集产"',section:'8.1  绿色建造管理'},
  {type:'multi',question:'有观点认为，应在“3R”原则基础上增加(    )，扩展为“5R”原则',options:['再优化', '再生', '再制造', '再设计', '再回收'],answer:[1, 2],analysis:'也有观点认为，应在前述“3R”原则基础上增加“再制造”和“再生”，扩展为“5R”原则。',memory:'【5R原则】3R（减量化+再利用+再循环）+再制造+再生。口诀："3R加制生"',section:'8.1  绿色建造管理'},
  {type:'single',question:'下列文明施工管理理念中，强调企业在创造利润的同时，还要承担对环境、社会和其他利益相关者的责任或义务的是（ ）。',options:['精益管理理念', '企业社会责任理念', '“8S” 管理理念', '经济责任理念'],answer:[1],analysis:'企业社会责任是指企业在创造利润、对股东承担责任的同时，还要承担对股东以外的企业利益相关者的责任。',memory:'【企业社会责任理念】创造利润同时承担对环境、社会、其他利益相关者责任——区别于精益管理（追求效率）和8S管理（现场规范）',section:'8.2  施工现场环境管理'},
  {type:'single',question:'文明施工应贯彻的 “8S” 管理理念，是在整理、整顿、清扫、清洁、素养、安全 6S 管理要素的基础上，又增加了（ ）两大要素。',options:['监督和学习', '节约和学习', '监督和供应', '节约和供应'],answer:[1],analysis:'又增加了节约（Save）和学习（Study）两大要素，即成为当今施工现场的 “8S” 管理理念。',memory:'【8S=6S+2S】6S（整理整顿清扫清洁素养安全）+节约(Save)+学习(Study)。记住新增的两个S：节约和学习',section:'8.2  施工现场环境管理'},
  {type:'single',question:'工地四周设置的封闭围挡高度不得低于（ ）m。',options:['1.8', '2.0', '2.2', '2.5'],answer:[0],analysis:'现场围挡采用封闭围挡，高度不小于 1.8m；围挡材料可采用彩色、定型钢板，砖、混凝土砌块等墙体。',memory:'【围挡高度】封闭围挡高度≥1.8m（不是2.0m）',section:'8.2  施工现场环境管理'},
  {type:'single',question:'施工单位应建立绿色施工管理体系，并明确（ ）是项目绿色施工管理的第一责任人。',options:['施工单位负责人', '施工单位技术负责人', '项目负责人', '项目技术负责人'],answer:[2],analysis:'施工单位通过建立绿色施工管理体系，明确企业各部门绿色施工管理职责，并明确施工项目经理是其所负责项目绿色施工管理的第一责任人，负责绿色施工的组织实施和目标实现。',memory:'【绿色施工第一责任人再确认】项目经理（项目负责人）是项目绿色施工管理第一责任人',section:'8.2  施工现场环境管理'},
  {type:'single',question:'安全文明施工费的结算依据是（ ）。',options:['安全文明施工费台账', '施工合同及实施过程中的费用核查情况', '安全文明施工费报价单', '有关企业安全生产费用提取制度（Kimmy真帅）'],answer:[1],analysis:'施工单位应设立安全文明施工费专用账户，建立安全文明施工措施费台账，做到专款专用，确保按投标报价及相关标准要求投入，施工合同和实施过程中的费用核查情况是安全文明措施费的结算依据。',memory:'【安全文明施工费结算依据】施工合同和实施过程中的费用核查情况（不是台账/报价单）',section:'8.2  施工现场环境管理'},
  {type:'single',question:'下列工作要求中，属于文明施工管理 “六化” 的是（ ）。',options:['项目管理制度化', '设备操作规范化', '安全设施标准化', '机器设备现场摆放定置化'],answer:[2],analysis:'建筑企业及施工项目部应努力做到文明施工管理的 “六化”：现场管理制度化、安全设施标准化、现场布置条理化、机料摆放定置化、作业行为规范化、环境协调和谐化。',memory:'【文明施工六化】现场管理制度化+安全设施标准化+现场布置条理化+机料摆放定置化+作业行为规范化+环境协调和谐化',section:'8.2  施工现场环境管理'},
  {type:'single',question:'下列文明施工标准中，不属于文明施工管理体系的是（ ）。',options:['管理类标准', '技术类标准', '设施类标准', '行为类标准'],answer:[2],analysis:'建立文明施工管理体系是落实项目管理目标和管理职责的基础。文明施工管理体系通常包括目标设置、组织机构、权责划分、管理流程、措施要求、规章制度、奖惩制度等，涉及技术类标准、管理类标准和行为类标准。管理体系的建立要考虑施工现场实际情况，确保文明施工管理体系能够真正应用到施工现场管理中，促进文明施工管理措施的顺利实施，并能根据情况变化适时进行调整。',memory:'【文明施工管理体系三类标准】技术类+管理类+行为类。注意："设施类标准"不在其中',section:'8.2  施工现场环境管理'},
  {type:'single',question:'下列绿色施工相关内容中，不属于安全文明施工管理规划的是（ ）。',options:['工程概况', '环境保护措施', '应急预案', '材料和设备的采购计划'],answer:[3],analysis:'制定安全文明施工管理规划，优化对策方法。安全文明施工管理规划需要根据施工现场文明施工管理目标制定，使文明施工管理形成良好的运行模式。安全文明施工规划应在工程开工前编制，其主要内容有：工程概况；安全方针、目标；安全文明施工管理组织机构；安全文明施工责任制等各项规章制度；环境保护措施（包括粉尘、噪声控制措施，现场排水和污水处理措施，植被保护措施，施工区域内现有市政管网和周围的建、构筑物的保护）；应急预案等。',memory:'【安全文明施工规划不含内容】材料和设备的采购计划不在其中（规划关注安全方针、环保、应急等，不含采购）',section:'8.2  施工现场环境管理'},
  {type:'single',question:'根据现行绿色施工评价标准，下列施工现场环境保护评价指标中，属于控制项的是（ ）。',options:['对集中堆放在施工现场的土方应采取抑尘措施', '施工现场厨房烟气应净化后排放', '施工现场应在醒目位置设环境保护标识', '施工现场垃圾应分类、封闭、集中堆放'],answer:[2],analysis:'“控制项” 包括以下内容：(1) 绿色施工策划文件中应包含环境保护内容，并建立环境保护管理制度。(2) 施工现场应在醒目位置设置环境保护标识。C 选项正确 (3) 施工现场的古迹、文物、树木及生态环境等应采取有效保护措施，制定地下文物保护应急预案。',memory:'【环境保护控制项】施工现场应在醒目位置设置环境保护标识（控制项=必须达到的基本要求）',section:'8.2  施工现场环境管理'},
  {type:'single',question:'根据绿色施工评价相关标准，在施工现场环境保护方面作为 “控制项” 进行评价的内容是（ ）。',options:['采取限时施工和遮光措施（Kimmy真帅）', '设置并清理现场厕所化粪池', '制定地下文物保护应急预案', '制定建筑垃圾减量化计划'],answer:[2],analysis:'这里的 “控制项” 是指绿色施工过程中必须达到的基本要求条款。对于施工现场环境保护而言，“控制项” 包括以下内容：(1) 绿色施工策划文件中应包含环境保护内容，并建立环境保护管理制度。(2) 施工现场应在醒目位置设置环境保护标识。(3) 施工现场的古迹、文物、树木及生态环境等应采取有效保护措施，制定地下文物保护应急预案。C 选项正确。',memory:'【制定地下文物保护应急预案属于控制项】控制项=古迹文物树木生态环境保护+制定地下文物保护应急预案',section:'8.2  施工现场环境管理'},
  {type:'single',question:'在一般项中，为了实现绿色施工，建筑垃圾回收利用率应达到（ ）。',options:['10%', '30%', '50%', '100%'],answer:[1],analysis:'(3) 建筑垃圾处置应符合下列规定：①应制定建筑垃圾减量化、资源化计划；②建筑垃圾产生量不应大于 300t / 万 m²；③建筑垃圾回收利用率应达到 30%；④现场垃圾应分类、封闭、集中堆放；⑤生活、办公区应设置可回收与不可回收垃圾桶，并定期清运；⑥生活区垃圾堆放区域应定期消毒；⑦应办理施工渣土、建筑废弃物等排放手续，按指定地点排放；⑧碎石和土石方类等应用作地基和路基回填材料；⑨废电池、废硒鼓、废墨盒、剩油漆、剩涂料等有毒有害的废弃物应封闭分类存放，设置醒目标识并回收。',memory:'【建筑垃圾回收利用率（一般项）】建筑垃圾回收利用率达到30%（一般项要求，优选项要达50%）',section:'8.2  施工现场环境管理'},
  {type:'single',question:'下列各项施工现场环境保护措施中，属于 “优选项” 的是（ ）。',options:['应采用低噪声设备施工', '焊接作业时，应采取挡光措施', '施工现场不应焚烧废弃物', '非装配式建筑垃圾产生量不宜大于 210t / 万 m²'],answer:[3],analysis:'“优选项” 包括以下内容：(1) 施工现场宜设置可移动环保厕所，并定期清运、消毒。(2) 现场宜采用自动喷雾（淋）降尘系统。(3) 施工场界宜设置扬尘自动监测仪，动态连续定量监测扬尘（总悬浮颗粒物 TSP,PM10）。(4) 施工场界宜设置动态连续噪声监测设施，保存昼夜噪声曲线。(5) 装配式建筑施工的垃圾排放量不宜大于 140t / 万 m²，非装配式建筑施工的垃圾排放量不宜大于 210t / 万 m²。(6) 建筑垃圾回收利用率宜达到 50%。(7) 施工现场宜采用地磅或自动监测平台，动态计量建筑废弃物重量。(8) 施工现场宜采用雨水就地渗透措施。(9) 施工现场宜采用生态环保泥浆、泥浆净化器反循环快速清孔等环境保护技术。(10) 施工现场宜采用水封爆破、静态爆破等高效降尘的先进工艺。(11) 土方施工宜采用水浸法湿润土壤等降尘方法。(12) 施工现场淤泥质渣土宜经脱水后外运。',memory:'【优选项关键数字】非装配式建筑垃圾排放量不宜大于210t/万m²；装配式不宜大于140t/万m²（优选项）',section:'8.2  施工现场环境管理'},
  {type:'multi',question:'施工现场文明施工所指的 “五牌一图” 包括（ ）。',options:['工程概况牌', '组织结构图', '消防保卫牌', '文明施工牌', '安全生产牌'],answer:[0, 2, 3, 4],analysis:'在进门处悬挂工程概况、管理人员名单及监督电话、安全生产、文明施工、消防保卫五牌；施工现场总平面图。',memory:'【五牌一图内容】工程概况牌+管理人员名单及监督电话牌+安全生产牌+文明施工牌+消防保卫牌+施工现场总平面图',section:'8.2  施工现场环境管理'},
  {type:'multi',question:'施工单位应设立安全文明施工费专用账户，做到专款专用。安全文明施工费的用途有（ ）。',options:['建立健全安全文明施工管理体系', '购置和更新施工安全防护用具及设施', '培训施工现场从事危险作业人员', '改善现场安全生产条件和作业环境', '赔付施工安全事故所造成的损失'],answer:[1, 3],analysis:'安全文明施工费是指按照有关规定，购置和更新施工安全防护用具及设施、改善现场安全生产条件和作业环境所需要的费用。建设单位应及时足额向施工单位支付安全文明施工费，为施工单位采取完善的安全文明施工措施提供资金保证。',memory:'【安全文明施工费用途】购置更新安全防护用具及设施+改善现场安全生产条件和作业环境。注意：赔付事故损失不是合法用途',section:'8.2  施工现场环境管理'},
  {type:'multi',question:'下列关于施工现场文明施工具体要求的说法，正确的有（ ）。',options:['在进门处悬挂 “五牌一图”', '现场围挡采用封闭围挡，高度不小于 1m', '施工现场应设置密闭式垃圾站', '工地地面硬化处理', '施工垃圾必须采用相应容器或管道运输'],answer:[0, 2, 3, 4],analysis:'现场围挡采用封闭围挡，高度不小于 1.8m，选项 B 错误。其余选项均符合施工现场文明施工具体要求。所以 A、C、D、E 正确。',memory:'【文明施工要求关键数字】围挡≥1.8m（不是1m）；需设密闭式垃圾站；垃圾须用容器或管道运输',section:'8.2  施工现场环境管理'},
  {type:'multi',question:'在一般项中，下列关于绿色施工过程中污水排放规定的说法，正确的有（ ）。A.现场厕所应设置化粪池',options:['工程污水和试验室养护用水，检测频率不应少于 4 次 / 月', '钻孔桩作业应采用泥浆循环利用系统', '工地厨房应设置隔油池', '现场道路和材料堆放场地周边应设置排水沟'],answer:[0, 2, 3],analysis:'污水排放应符合下列规定：①现场道路和材料堆放场地周边应设置排水沟；②工程污水和试验室养护用水应处理合格后，排入市政污水管道，检测频率不应少于 1 次 / 月；③现场厕所应设置化粪池，化粪池定期清理；④工地厨房应设置隔油池，定期清理；⑤工地生活污水、预制场和搅拌站等施工污水应达标排放和利用；⑥钻孔桩作业应采用泥浆循环利用系统，不应外溢漫流。\n第9章  国际工程承包管理',memory:'【污水排放规定辨析】工程污水检测频率≥1次/月（不是4次/月）；现场厕所设化粪池；厨房设隔油池；钻孔桩采用泥浆循环系统',section:'8.2  施工现场环境管理'}
];

const PASSWORD = '6666';
let currentIndex = 0, score = 0, revealed = false;
let userAnswers = new Array(questions.length).fill(null);
let feedbackList = [];
const optLabels = 'ABCDEFGHIJ'.split('');

let pwPassed = false;
function checkPassword() {
  const i = document.getElementById('pwInput'), e = document.getElementById('pwError');
  if (i.value===PASSWORD) {
    pwPassed = true;
    document.getElementById('passwordOverlay').style.display = 'none';
    document.body.style.overflow = '';
    init();
  }
  else { e.textContent='密码错误，请重新输入'; i.style.animation='shake 0.4s'; setTimeout(()=>i.style.animation='',400); }
}
function initPassword() {
  document.body.style.overflow = 'hidden';
  document.getElementById('pwInput').focus();
  document.getElementById('pwInput').addEventListener('keydown', function(ev) { if (ev.key==='Enter') checkPassword(); });
  document.getElementById('pwBtn').addEventListener('click', function() { checkPassword(); });
}

function init() {
  const js=document.getElementById('jumpSelect');
  questions.forEach((_,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`第 ${i+1} 题`;js.appendChild(o);});
  js.addEventListener('change',()=>{currentIndex=parseInt(js.value);renderQuestion();});
  document.getElementById('totalNum').textContent=questions.length;
  renderQuestion();
}

function renderQuestion() {
  const q=questions[currentIndex];
  document.getElementById('questionCard').style.display='';
  document.getElementById('finishCard').classList.remove('show');
  document.getElementById('sectionTag').textContent=q.section||'';
  document.getElementById('qBadge').textContent=q.type==='single'?'单选题':'多选题';
  document.getElementById('qBadge').className='q-badge '+(q.type==='single'?'single':'multi');
  document.getElementById('qNumber').textContent=`第 ${currentIndex+1} 题（共 ${questions.length} 题）`;
  document.getElementById('qText').textContent=q.question;
  document.getElementById('qScoreText').textContent=q.type==='single'?'1分':'2分';
  document.getElementById('currentNum').textContent=currentIndex+1;
  document.getElementById('progressBar').style.width=((currentIndex+1)/questions.length*100)+'%';
  document.getElementById('jumpSelect').value=currentIndex;
  const c=document.getElementById('optionsContainer');c.innerHTML='';
  q.options.forEach((opt,i)=>{const d=document.createElement('div');d.className='option';d.innerHTML=`<div class="opt-label">${optLabels[i]}</div><div class="opt-text">${opt}</div><div class="opt-icon"></div>`;d.addEventListener('click',()=>toggleOption(i,d));c.appendChild(d);});
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('confirmBtn').style.display='';document.getElementById('feedbackBtn').style.display='none';
  if(userAnswers[currentIndex]!==null){revealed=true;showResult(false);}else{revealed=false;document.getElementById('confirmBtn').disabled=false;}
}

function toggleOption(index,div) {
  if(revealed)return;const q=questions[currentIndex];
  if(q.type==='single'){document.querySelectorAll('.option').forEach(el=>el.classList.remove('selected'));div.classList.add('selected');userAnswers[currentIndex]=[index];}
  else{div.classList.toggle('selected');const s=[];document.querySelectorAll('.option').forEach((el,i)=>{if(el.classList.contains('selected'))s.push(i);});userAnswers[currentIndex]=s.length>0?s:null;}
  document.getElementById('confirmBtn').disabled=!userAnswers[currentIndex]||userAnswers[currentIndex].length===0;
}

function confirmAnswer() {
  if(revealed){const a=userAnswers.every(a=>a!==null);if(a)showFinish();else nextQuestion();return;}
  if(!userAnswers[currentIndex])return;revealed=true;showResult(true);
}

function showResult(isConfirm) {
  const q=questions[currentIndex],ua=userAnswers[currentIndex].slice().sort(),ca=q.answer.slice().sort();
  const ok=ua.length===ca.length&&ua.every((v,i)=>v===ca[i]);
  if(isConfirm){if(ok)score+=q.type==='single'?1:2;else if(q.type==='multi'&&ua.length>0){const w=ua.filter(a=>!ca.includes(a));if(w.length===0){score+=Math.round(ua.filter(a=>ca.includes(a)).length*0.5*10)/10;}}document.getElementById('scoreDisplay').textContent=score;}
  document.querySelectorAll('.option').forEach((el,i)=>{el.classList.add('disabled');if(ca.includes(i)){if(ua.includes(i))el.classList.add('correct');else el.classList.add('reveal-correct');el.querySelector('.opt-icon').textContent='✓';}else if(ua.includes(i)){el.classList.add('wrong');el.querySelector('.opt-icon').textContent='✗';}});
  if(ok){const p=q.type==='single'?1:2;document.getElementById('expAnswer').innerHTML=`<span style="color:#38a169">✓ 回答正确！+${p}分</span>`;}
  else{let ps=0;if(q.type==='multi'&&ua.length>0){const w=ua.filter(a=>!ca.includes(a));if(w.length===0)ps=Math.round(ua.filter(a=>ca.includes(a)).length*0.5*10)/10;}document.getElementById('expAnswer').innerHTML=`<span style="color:#e53e3e">✗ 回答错误${ps>0?'（部分正确 +'+ps+'分）':''}。正确答案：${ca.map(a=>optLabels[a]).join('')}</span>`;}
  document.getElementById('expAnalysis').innerHTML=`<div class="ea-title">📝 解析</div>${q.analysis}`;
  if(q.memory){document.getElementById('expMemory').innerHTML=`<div class="em-title">💡 记忆技巧</div>${q.memory}`;document.getElementById('expMemory').style.display='block';}else{document.getElementById('expMemory').style.display='none';}
  document.getElementById('explanation').classList.add('show');
  document.getElementById('confirmBtn').textContent='下一题 ▶';document.getElementById('confirmBtn').style.display='';document.getElementById('feedbackBtn').style.display='';
  if(isConfirm){const a=userAnswers.every(a=>a!==null);if(a)document.getElementById('confirmBtn').textContent='查看结果 🎉';}
}

function nextQuestion() { if(currentIndex<questions.length-1){currentIndex++;renderQuestion();} }

function showFinish() {
  document.getElementById('questionCard').style.display='none';
  document.getElementById('finishCard').classList.add('show');
  const t=questions.reduce((s,q)=>s+(q.type==='single'?1:2),0),w=[];
  questions.forEach((q,i)=>{if(userAnswers[i]===null)return;const u=userAnswers[i].slice().sort(),c=q.answer.slice().sort();if(!(u.length===c.length&&u.every((v,j)=>v===c[j])))w.push(i+1);});
  document.getElementById('finalScore').textContent=`${score} / ${t}`;
  document.getElementById('finalDetail').textContent=`共${questions.length}题，答对${questions.length-w.length}题，答错${w.length}题`;
  document.getElementById('reviewBtn').style.display=w.length>0?'':'none';
}

function resetQuiz() { currentIndex=0;score=0;revealed=false;userAnswers=new Array(questions.length).fill(null);feedbackList=[];document.getElementById('scoreDisplay').textContent='0';renderQuestion(); }

function openReview() {
  const l=document.getElementById('reviewList');l.innerHTML='';let h=false;
  questions.forEach((q,i)=>{if(userAnswers[i]===null)return;const u=userAnswers[i].slice().sort(),c=q.answer.slice().sort();
  if(!(u.length===c.length&&u.every((v,j)=>v===c[j]))){h=true;const d=document.createElement('div');d.className='review-item';d.innerHTML=`<div class="ri-q">${i+1}. ${q.question}</div><div class="ri-row ri-user">你的答案：${u.map(a=>optLabels[a]).join('')}</div><div class="ri-row ri-correct">正确答案：${c.map(a=>optLabels[a]).join('')}</div><div class="ri-kp">📝 ${q.analysis}</div>`;d.style.cursor='pointer';d.addEventListener('click',()=>{closeReview();currentIndex=i;renderQuestion();});l.appendChild(d);}});
  if(!h)l.innerHTML='<div class="review-empty">🎉 全部正确，没有错题！</div>';
  document.getElementById('reviewModal').classList.add('show');
}
function closeReview(){document.getElementById('reviewModal').classList.remove('show');}
function openFeedback(){document.getElementById('feedbackText').value='';document.getElementById('feedbackModal').classList.add('show');}
function closeFeedback(){document.getElementById('feedbackModal').classList.remove('show');}
function submitFeedback(){const t=document.getElementById('feedbackText').value.trim();if(!t)return;feedbackList.push({qIndex:currentIndex,question:questions[currentIndex].question,content:t});closeFeedback();}
function openFeedbackSummary(){const l=document.getElementById('feedbackSummaryList');l.innerHTML='';feedbackList.forEach(fb=>{const d=document.createElement('div');d.className='fb-item';d.innerHTML=`<div class="fb-q">第${fb.qIndex+1}题：${fb.question}</div><div class="fb-content">${fb.content}</div>`;l.appendChild(d);});document.getElementById('feedbackSummaryModal').classList.add('show');}
function closeFeedbackSummary(){document.getElementById('feedbackSummaryModal').classList.remove('show');}

initPassword();

</script>
</body>
</html>
