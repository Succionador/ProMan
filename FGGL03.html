<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: #2d3748; }
.container { max-width: 800px; margin: 0 auto; padding: 20px 16px; }
.top-bar { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 20px 24px; margin-bottom: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); backdrop-filter: blur(10px); }

.score-box { display: flex; align-items: center; gap: 6px; background: linear-gradient(135deg, #f6ad55, #ed8936); color: white; padding: 8px 18px; border-radius: 10px; font-size: 16px; font-weight: 700; white-space: nowrap; }
.score-box .label { font-weight: 400; font-size: 13px; opacity: 0.9; }
.jump-select { padding: 8px 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 14px; color: #4a5568; background: #f7fafc; cursor: pointer; outline: none; transition: border-color 0.2s; }
.jump-select:focus { border-color: #667eea; }
.question-card { background: rgba(255,255,255,0.97); border-radius: 16px; padding: 28px 28px 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); transition: all 0.3s ease; }
.q-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }

.options { display: flex; flex-direction: column; gap: 10px; }
.option { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; transition: all 0.2s ease; user-select: none; }
.option:hover { border-color: #a3bffa; background: #f7faff; }

.option.wrong { border-color: #fc8181; background: #fff5f5; }

.option.disabled { pointer-events: none; }
.opt-label { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; border: 2px solid #cbd5e0; color: #718096; transition: all 0.2s; }
.option.selected .opt-label { background: #5a67d8; color: white; border-color: #5a67d8; }
.option.correct .opt-label { background: #48bb78; color: white; border-color: #48bb78; }
.option.wrong .opt-label { background: #fc8181; color: white; border-color: #fc8181; }
.option.reveal-correct .opt-label { background: #48bb78; color: white; border-color: #48bb78; }
.opt-text { font-size: 15px; line-height: 1.6; padding-top: 2px; color: #4a5568; }
.opt-icon { flex-shrink: 0; width: 22px; height: 22px; border-radius: 4px; display: none; align-items: center; justify-content: center; font-size: 14px; color: white; margin-left: auto; }
.option.correct .opt-icon { display: flex; background: #48bb78; }
.option.wrong .opt-icon { display: flex; background: #fc8181; }
.explanation { margin-top: 20px; padding: 18px 20px; border-radius: 12px; background: #f7fafc; border-left: 4px solid #5a67d8; display: none; animation: fadeIn 0.3s ease; }
.explanation.show { display: block; }
.explanation .exp-title { font-size: 14px; font-weight: 700; color: #5a67d8; margin-bottom: 8px; }
.explanation .exp-answer { font-size: 15px; color: #2d3748; margin-bottom: 6px; }
.explanation .exp-answer span { font-weight: 700; }
.explanation .exp-analysis { font-size: 14px; color: #2c5282; margin-top: 10px; line-height: 1.7; padding: 10px 14px; background: #ebf8ff; border-radius: 8px; border-left: 3px solid #4299e1; }
.explanation .exp-analysis .ea-title { font-weight: 700; color: #2b6cb0; }
.explanation .exp-memory { font-size: 14px; color: #744210; margin-top: 12px; line-height: 1.7; padding: 10px 14px; background: #fffff0; border-radius: 8px; border-left: 3px solid #d69e2e; }
.explanation .exp-memory .em-title { font-weight: 700; color: #975a16; }
.btn-area { display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end; }
.btn { padding: 12px 32px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; box-shadow: 0 4px 14px rgba(102, 126, 234, 0.4); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-secondary { background: #fff; color: #e53e3e; border: 2px solid #fed7d7; }
.btn-secondary:hover { background: #fff5f5; border-color: #fc8181; }
.btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
.finish-card { background: rgba(255,255,255,0.97); border-radius: 16px; padding: 48px 32px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); text-align: center; display: none; }
.finish-card.show { display: block; }
.finish-card .trophy { font-size: 64px; margin-bottom: 16px; }
.finish-card h2 { font-size: 24px; color: #2d3748; margin-bottom: 8px; }
.finish-card .final-score { font-size: 48px; font-weight: 800; color: #5a67d8; margin: 16px 0; }
.finish-card .final-detail { font-size: 14px; color: #718096; margin-bottom: 24px; line-height: 1.8; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: white; border-radius: 16px; padding: 32px; width: 90%; max-width: 460px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); animation: fadeIn 0.25s ease; }
.modal h3 { font-size: 18px; color: #2d3748; margin-bottom: 16px; }
.modal textarea { width: 100%; height: 120px; border: 2px solid #e2e8f0; border-radius: 10px; padding: 12px; font-size: 14px; resize: vertical; outline: none; font-family: inherit; }
.modal textarea:focus { border-color: #667eea; }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
.modal-btns .btn { padding: 10px 24px; font-size: 14px; }
.review-modal { background: white; border-radius: 16px; padding: 0; width: 92%; max-width: 600px; max-height: 80vh; box-shadow: 0 20px 60px rgba(0,0,0,0.2); animation: fadeIn 0.25s ease; display: flex; flex-direction: column; overflow: hidden; }
.review-modal .review-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }
.review-modal .review-header h3 { margin-bottom: 0; font-size: 18px; color: #e53e3e; }
.review-modal .review-close { width: 32px; height: 32px; border: none; background: #f7fafc; border-radius: 50%; font-size: 18px; cursor: pointer; color: #718096; display: flex; align-items: center; justify-content: center; }
.review-modal .review-close:hover { background: #edf2f7; }
.review-modal .review-list { padding: 16px 24px 24px; overflow-y: auto; flex: 1; }
.review-item { background: #fff5f5; border: 1px solid #fed7d7; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.review-item:last-child { margin-bottom: 0; }
.review-item .ri-q { font-size: 14px; font-weight: 600; color: #2d3748; margin-bottom: 8px; line-height: 1.6; }
.review-item .ri-row { font-size: 13px; margin-bottom: 4px; line-height: 1.5; }
.review-item .ri-user { color: #e53e3e; }
.review-item .ri-correct { color: #38a169; }
.review-empty { text-align: center; padding: 40px 20px; color: #38a169; font-size: 18px; }
.fb-item { background: #fffff0; border: 1px solid #fefcbf; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.fb-item:last-child { margin-bottom: 0; }
.fb-item .fb-q { font-size: 14px; font-weight: 600; color: #2d3748; margin-bottom: 8px; line-height: 1.6; }
.fb-item .fb-content { font-size: 13px; color: #c05621; background: rgba(237, 137, 54, 0.08); padding: 10px 14px; border-radius: 8px; line-height: 1.6; }
.password-overlay { position: fixed; inset: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); z-index: 999; display: flex; align-items: center; justify-content: center; transition: opacity 0.4s ease; }
.password-overlay.hidden { opacity: 0; pointer-events: none; }
.password-card { background: white; border-radius: 20px; padding: 40px 36px; width: 90%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; }
.password-card .lock-icon { font-size: 48px; margin-bottom: 16px; }
.password-card h2 { font-size: 20px; color: #2d3748; margin-bottom: 6px; }
.password-card p { font-size: 14px; color: #a0aec0; margin-bottom: 24px; }
.password-card input { width: 100%; padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; text-align: center; letter-spacing: 4px; outline: none; transition: border-color 0.2s; }
.password-card input:focus { border-color: #667eea; }
.password-card .pw-error { color: #e53e3e; font-size: 13px; margin-top: 10px; min-height: 20px; }
.password-card .pw-btn { margin-top: 16px; width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
.password-card .pw-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(102,126,234,0.4); }
.password-card .pw-btn:active { transform: translateY(0); }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
</style>

<body>
<div class="password-overlay" id="passwordOverlay">
  <div class="password-card">
    <div class="lock-icon">🔒</div>
    <h2>请输入访问密码</h2>
    <p>本页面仅限授权用户使用</p>
    <input type="password" id="pwInput" placeholder="请输入密码" autocomplete="off">
    <div class="pw-error" id="pwError"></div>
    <button class="pw-btn" id="pwBtn">进 入</button>
  </div>
</div>
<div class="container">
  <div class="top-bar">
    <h1>📚 第1章 建设工程项目组织、规划与控制</h1>
    <div class="section-tag" id="sectionTag"></div>
    <div class="stats-row">
      <div class="progress-info">
        <div class="progress-text">做题进度：<span id="currentNum">1</span> / <span id="totalNum">125</span></div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
      </div>
      <div class="score-box"><span class="label">得分</span><span id="scoreDisplay">0</span></div>
      <select class="jump-select" id="jumpSelect" title="跳转到指定题目"></select>
    </div>
  </div>
  <div class="question-card" id="questionCard">
    <div class="q-header">
      <span class="q-badge" id="qBadge">单选题</span>
      <span class="q-score" id="qScoreText"></span>
    </div>
    <div class="q-number" id="qNumber"></div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="optionsContainer"></div>
    <div class="explanation" id="explanation">
      <div class="exp-title">📝 解析</div>
      <div class="exp-answer" id="expAnswer"></div>
      <div class="exp-analysis" id="expAnalysis"></div>
      <div class="exp-memory" id="expMemory"></div>
    </div>
    <div class="btn-area">
      <button class="btn btn-secondary" id="feedbackBtn" style="display:none" onclick="openFeedback()">⚠️ 题目/答案反馈</button>
      <button class="btn btn-primary" id="confirmBtn" onclick="confirmAnswer()">确定</button>
    </div>
  </div>
  <div class="finish-card" id="finishCard">
    <div class="trophy">🎉</div>
    <h2>练习完成！</h2>
    <div class="final-score" id="finalScore">0</div>
    <div class="final-detail" id="finalDetail"></div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-secondary" id="reviewBtn" onclick="openReview()" style="margin:0">❌ 查看错题</button>
      <button class="btn btn-secondary" id="feedbackSummaryBtn" onclick="openFeedbackSummary()" style="margin:0;display:none">⚠️ 反馈汇总</button>
      <button class="btn btn-primary" onclick="resetQuiz()" style="margin:0">🔄 重新做题</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="feedbackModal">
  <div class="modal">
    <h3>⚠️ 题目/答案反馈</h3>
    <p style="font-size:14px;color:#718096;margin-bottom:12px;">请描述您认为有误的题目或答案，我们会尽快核实修正。</p>
    <textarea id="feedbackText" placeholder="请输入您发现的问题..."></textarea>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeFeedback()">取消</button>
      <button class="btn btn-primary" onclick="submitFeedback()">提交</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="reviewModal">
  <div class="review-modal">
    <div class="review-header">
      <h3>❌ 错题汇总</h3>
      <button class="review-close" onclick="closeReview()">✕</button>
    </div>
    <div class="review-list" id="reviewList"></div>
  </div>
</div>
<div class="modal-overlay" id="feedbackSummaryModal">
  <div class="review-modal">
    <div class="review-header">
      <h3>⚠️ 反馈汇总</h3>
      <button class="review-close" onclick="closeFeedbackSummary()">✕</button>
    </div>
    <div class="review-list" id="feedbackSummaryList"></div>
  </div>
</div>
<script>
const questions = [
  {type:'single',question:'工程施工招标时发布招标公告，属于施工合同订立环节中的（ ）行为。',options:['要约', '要约邀请', '承诺意向', '承诺'],answer:[1],analysis:'招标公告、招标邀请书均属于要约邀请，目的是邀请潜在投标人向招标人发出要约。',memory:'【口诀】"招标方式两类型：公开邀请选其一"——公开招标和邀请招标。',section:'3.1  工程招标与投标'},
  {type:'single',question:'与公开招标方式相比，采用邀请招标方式具有的特点是（ ）。',options:['招标人不需要发出投标邀请函', '投标人不需要提交表明其资质的证明材料', '招标中不需要发布招标公告和设置资格预审程序', '评标时不需要对投标文件进行合格性审查'],answer:[2],analysis:'邀请招标不发布招标公告，不进行资格预审，直接向符合条件的特定投标人发出邀请。',memory:'【口诀】"公开招标公告发，邀请招标邀请书"——两种方式的不同发布形式。',section:'3.1  工程招标与投标'},
  {type:'single',question:'根据《标准施工招标文件》，关于编制招标文件的说法，不正确的是（ ）。',options:['招标文件应包括招标项目所有实质性要求和条件', '招标文件应包括投标人须知、评标办法和工程量清单等内容', '投标人须知包括前附表、正文和附表三部分', '招标人对招标文件的澄清、修改，不构成招标文件的组成部分'],answer:[3],analysis:'招标人对招标文件的澄清、修改，属于招标文件的组成部分。',memory:'【口诀】"必须招标看规模：施工400万，货物200万，服务100万"——必须招标的规模标准。',section:'3.1  工程招标与投标'},
  {type:'single',question:'招标人对已发出的资格预审文件进行必要的澄清或者修改，影响资格预审申请文件编制的，招标人应在提交资格预审申请文件截止时间至少（ ）日前，书面形式通知所有获取资格预审文件的潜在投标人。',options:['2', '3', '5', '7'],answer:[1],analysis:'澄清或修改资格预审文件，应在截止时间至少 3 日前通知。',memory:'【口诀】"国有资金主导，必须公开招标"——国有资金控股或主导的项目。',section:'3.1  工程招标与投标'},
  {type:'single',question:'关于审查资格预审申请文件的说法，正确的是（ ）。',options:['投标人资格预审分初步审查和详细审查两个环节', '投标人资格预审方法有合格制、有限数量制和淘汰制三种', '合格制需要对通过审查的资格预审申请文件进行量化打分', '有限数量制会使投标竞争更加充分，增加招标工作量和费用'],answer:[0],analysis:'资格预审分初步审查和详细审查；方法为合格制、有限数量制；合格制不打分，有限数量制打分；合格制竞争更充分。',memory:'【口诀】"邀请招标要批准：技术复杂或特殊要求"——邀请招标的适用情形。',section:'3.1  工程招标与投标'},
  {type:'single',question:'关于资格预审申请文件的澄清或说明，说法不正确的是（ ）。',options:['资格审查委员会可要求申请人对申请文件中不明确的内容进行必要的澄清或说明', '申请人的澄清或说明应采用书面形式，并不得改变申请文件的实质性内容', '申请人的澄清和说明内容属于资格预审申请文件的组成部分', '招标人和审查委员会可接受申请人主动提出的澄清或说明'],answer:[3],analysis:'不接受申请人主动提出的澄清或说明，只能由审查委员会要求。',memory:'【口诀】"招标文件发售期：不少于5日"——发售时间要求。',section:'3.1  工程招标与投标'},
  {type:'single',question:'下列关于工程施工招标组织现场踏勘的说法，正确的是（ ）。',options:['招标人组织现场踏勘时，除了介绍场地和周边环境情况，还应对投标人问题作进一步说明', '投标人依据招标人介绍的情况作出的判断和决策，由招标人负责', '投标人在踏勘现场中发生的人员伤亡和财产损失均由招标人负责', '投标人踏勘现场发生的费用自理'],answer:[3],analysis:'投标人踏勘现场费用自理，风险自负；招标人仅介绍情况，不承担判断决策责任。',memory:'【口诀】"投标截止20日，招标文件可澄清"——投标准备时间。',section:'3.1  工程招标与投标'},
  {type:'single',question:'关于投标文件递交和接收的说法，正确的是（ ）。',options:['投标文件应加写标记和加盖投标人单位章，在投标截止时间后递交', '逾期送达或者未送达指定地点的投标文件，招标人将不予受理', '未按要求密封和加写标记的投标文件，招标人不得拒收', '招标人签收投标文件后，经批准可在开标时间前开启投标文件'],answer:[1],analysis:'逾期送达、未按指定地点、未按要求密封的投标文件，招标人不予受理；开标前不得开启投标文件。',memory:'【口诀】"澄清修改15日，不足顺延截止期"——澄清修改的时间要求。',section:'3.1  工程招标与投标'},
  {type:'single',question:'关于组建评标委员会的说法，正确的是（ ）。',options:['评标委员会成员名单一般应在开标前确定，在中标结果确定前应当保密', '评标委员会人数应为 5 人以上单数，技术、经济等方面的专家不得多于成员总数的 2/3', '对于一般项目，评标委员会的专家应由招标人直接确定', '对于技术复杂、专业性强的项目，评标委员会的专家可以由上级主管部门直接确定'],answer:[0],analysis:'评标委员会名单在中标结果确定前保密；专家不得少于 2/3；一般项目随机抽取，特殊项目可直接确定。',memory:'【口诀】"投标保证金2%，最高不超80万"——投标保证金比例和上限。',section:'3.1  工程招标与投标'},
  {type:'single',question:'关于已标价工程量清单的说法，正确的是（ ）。',options:['投标文件中大写金额与小写金额不一致的，以大写金额为准', '依据单价计算出的结果与总价金额不一致的，以总价金额为准', '评标委员会对投标报价的错误予以修正后，可直接作为投标报价的金额', '投标人不接受修正价格的，可进一步补正'],answer:[0],analysis:'大小写不一致以大写为准；单价与总价不一致以单价为准；修正需投标人确认；不接受修正则否决投标。',memory:'【口诀】"投标有效期：开标之日至中标通知"——投标有效期起止。',section:'3.1  工程招标与投标'},
  {type:'single',question:'某建筑工程招标采用经评审的最低投标价法评标。现有三家单位投标，甲投标报价 6050 万元，评标价 6000 万元；乙投标报价 6200 万元，评标价 5950 万元；丙投标报价 5950 万元，评标价 6050 万元。则中标单位及签约合同价分别为（ ）。',options:['甲，5950 万元', '乙，6200 万元', '乙，5950 万元', '丙，6050 万元'],answer:[1],analysis:'经评审的最低投标价法按评标价最低推荐中标人，签约合同价为其中标投标报价。',memory:'【口诀】"评标委员会5人以上，专家不少于2/3"——评标委员会组成。',section:'3.1  工程招标与投标'},
  {type:'single',question:'某招标工程采用综合评估法评标，按照得分由高到低推荐中标候选人时发现有两家投标单位的综合评分相等，应将（ ）的优先排序。',options:['设计方案得分高（Kimmy真帅）', '投标报价低', '设计资质等级高', '对招标人提出较多优惠条件'],answer:[1],analysis:'综合评分相等时，投标报价低的优先；报价也相等，由招标人自行确定。',memory:'【口诀】"开标当众拆封，宣读唱标记录"——开标程序。',section:'3.1  工程招标与投标'},
  {type:'single',question:'关于中标后签订合同的说法，正确的是（ ）。',options:['招标人和中标人应在中标通知书收到之日起 30 日内订立书面合同', '合同的标的、价款、质量、履行期限等主要条款应与招标文件和中标人投标文件内容一致', '当人工、材料及机械使用费价格行情发生变化，双方应就合同价款订立新的协议', '招标人最迟应在书面合同签订后 3 日内向中标人和未中标的投标人退还投标保证金'],answer:[1],analysis:'应在中标通知书发出之日起 30 日内签合同；合同主要条款必须与招标文件和投标文件一致；保证金在合同签订后 5 日内退还。',memory:'【口诀】"中标通知书发出，30日内签合同"——合同签订时限。',section:'3.1  工程招标与投标'},
  {type:'single',question:'某已标价工程量清单中钢筋混凝土工程的工程量是 1000m³，综合单价是 600 元 /m³，该分部工程招标控制价为 70 万元。实际施工完成合格工程量为 1500m³，则固定单价合同下，钢筋混凝土工程价款为（ ）万元。',options:['60.0', '90.0', '65.0', '70.0'],answer:[1],analysis:'固定单价合同按实际工程量 × 综合单价计算：1500×600=900000 元 = 90 万元。',memory:'【口诀】"履约保证金10%，中标人提交"——履约保证金比例。',section:'3.1  工程招标与投标'},
  {type:'single',question:'关于固定单价合同的说法，正确的是（ ）。',options:['当通货膨胀达到一定水平时，可对单价进行调整', '当国家政策发生变化时，可对单价进行调整', '当实际工程量发生较大变化时，可对单价进行调整', '无论发生哪些影响价格的因素都不对单价进行调整'],answer:[3],analysis:'固定单价合同单价固定不变，不因通货膨胀、政策变化、工程量变化调整单价。',memory:'【口诀】"否决投标七情形：串通弄虚作假，资格不符合"——否决投标的情形。',section:'3.1  工程招标与投标'},
  {type:'single',question:'对于建设单位无法为施工单位提供报价依据资料的紧急工程或灾后修复工程，宜采用的施工合同计价方式是（ ）。',options:['可调单价合同', '成本加酬金合同', '固定单价合同', '固定总价合同'],answer:[1],analysis:'紧急工程、灾后修复、无法确定工程量与报价依据时，宜采用成本加酬金合同。',memory:'【口诀】"最低评标价法：价格最低中标"——经评审的最低投标价法。',section:'3.1  工程招标与投标'},
  {type:'single',question:'关于成本加酬金合同的说法，正确的是（ ）。',options:['成本加固定百分比酬金合同是在签订合同时约定酬金为某一固定值', '成本加浮动酬金合同是指在实际发生的直接费中加某一百分比的酬金', '目标成本加奖罚合同是以签合同时的估算目标成本为依据，以百分比形式约定基本酬金和奖罚酬金', '成本加固定酬金合同是约定预期成本和固定酬金，以及实际成本与预期成本有差异后的奖罚计算办法'],answer:[2],analysis:'成本加固定百分比酬金按成本百分比计取；成本加固定酬金酬金总额固定；目标成本加奖罚以目标成本为基数约定酬金与奖罚。',memory:'【口诀】"综合评估法：技术商务价格综合"——综合评分最高者中标。',section:'3.1  工程招标与投标'},
  {type:'single',question:'下列成本加酬金合同中，不能激励承包单位缩短工期和降低成本的合同形式是（ ）。',options:['成本加浮动酬金合同', '成本加固定酬金合同', '目标成本加奖罚合同', '成本加固定百分比酬金合同'],answer:[3],analysis:'成本加固定百分比酬金，成本越高酬金越多，不利于激励承包商控制成本、缩短工期。',memory:'【口诀】"两阶段招标：技术复杂无法精确"——两阶段招标适用情形。',section:'3.1  工程招标与投标'},
  {type:'single',question:'下列合同计价方式中，建设单位容易控制造价，施工承包单位风险大的是（ ）。',options:['单价合同', '目标成本加奖罚合同', '总价合同', '成本加固定酬金合同'],answer:[2],analysis:'总价合同业主造价易控制，承包商承担价格、工程量等主要风险。',memory:'【口诀】"必须招标三条件：大型基建国资外资"——范围+规模+资金来源。',section:'3.1  工程招标与投标'},
  {type:'single',question:'工程设计深度是选择施工合同计价方式需要考虑的重要因素，下列合同计价方式中，对工程设计深度要求最高的是（ ）。',options:['可调单价合同', '固定单价合同', '成本加酬金合同', '固定总价合同'],answer:[3],analysis:'固定总价合同需要施工图设计完整、工程量准确，对设计深度要求最高。',memory:'【口诀】"可不招标情形：唯一专利自建，原中标人配套"——可以不招标的情形。',section:'3.1  工程招标与投标'},
  {type:'single',question:'下列工程中，施工单位在投标时可选择报低价的是（ ）。',options:['工期要求紧的工程', '支付条件好的工程', '技术复杂的工程', '施工条件差的工程'],answer:[1],analysis:'支付条件好、工程量大、风险小、竞争对手多的工程可报低价；工期紧、技术复杂、条件差宜报高价。',memory:'【口诀】"邀请招标情形：技术复杂特殊，费用占比大"——邀请招标的适用条件。',section:'3.1  工程招标与投标'},
  {type:'single',question:'下列情形中，不适合采用保本报价法的有（ ）。',options:['有可能在中标后，将大部分工程分包给索价较低的一些分包商', '分期建设的工程，先以低价获得首期工程，而后赢得机会创造第二期工程的竞争优势', '较长时期内，施工单位没有在建工程项目，如果再不中标，就难以维持生存', '技术规范要求过于苛刻的工程'],answer:[3],analysis:'保本报价适用于：无项目可干、分期工程抢占首期、可低价分包等；范围不明、条款不公、规范苛刻应报高价或放弃。',memory:'【口诀】"招标文件内容：须知技术合同，格式评标办法"——招标文件主要内容。',section:'3.1  工程招标与投标'},
  {type:'single',question:'招标人规定了暂定金额的分项内容和暂定总价款，并规定所有投标人都必须在总报价中加入这笔固定金额，但由于分项工程量不是很准确，允许将来按投标人所报单价和实际完成的工程量付款。则投标人可采用的报价策略是（ ）。',options:['适当降低暂定金额分项内容的单价', '适当减少暂定金额的分项工程量', '适当提高暂定金额分项内容的单价', '适当增加暂定金额的分项工程量'],answer:[2],analysis:'暂定金额按实际工程量 × 投标人单价结算，可适当提高该分项单价以增加收益。',memory:'【口诀】"投标文件内容：函件商务技术，价格保证金"——投标文件主要内容。',section:'3.1  工程招标与投标'},
  {type:'single',question:'某投标人按招标文件规定，在投标文件中除主方案外还提出了建议方案，但保留了建议方案中的技术关键。这种做法的优越性是（ ）。',options:['有利于投标人通过不平衡报价获得更大收益', '有利于投标人提高投标文件中主方案的竞争力', '有利于投标人在开标后获得修改投标报价的机会', '有利于防止招标人将建议方案交由其他投标人实施'],answer:[3],analysis:'保留技术关键可防止招标人无偿使用方案并转交其他投标人。',memory:'【口诀】"联合体投标：协议共同签，资质取低，连带责"——联合体投标规则。',section:'3.1  工程招标与投标'},
  {type:'single',question:'根据《标准设计施工总承包招标文件》，工程总承包投标人确定投标报价的工作包括：①测算工程成本；②提出最终报价；③研读评标办法；④投标报价检查。正确的程序是（ ）。',options:['①-②-③-④', '③-①-②-④', '①-③-④-②', '③-①-④-②'],answer:[1],analysis:'工程总承包投标报价程序：先研读评标办法→测算工程成本→提出最终报价→报价检查。',memory:'【口诀】"串通投标情形：协商约定协同，放弃中标"——串通投标的表现。',section:'3.1  工程招标与投标'},
  {type:'multi',question:'关于施工招标方式的说法，正确的有（ ）。',options:['按照竞争开放程度不同，招标可分为公开招标和邀请招标两种方式', '公开招标方式，招标人可在较广范围内选择承包商，获得有竞争性的报价', '公开招标方式，可在较大程度上避免招标过程中的贿标行为', '与公开招标相比，采用邀请招标的招标时间长、费用高', '邀请招标方式，投标竞争激烈，会降低中标合同价'],answer:[0, 1, 2],analysis:'公开招标范围广、竞争充分、报价更具竞争性，能有效防止贿标；邀请招标时间短、费用低、竞争范围小。',memory:'【口诀】"评标程序：初步详细评审，推荐候选人"——评标流程。',section:'3.1  工程招标与投标'},
  {type:'multi',question:'下列施工招标准备工作内容中，说法正确的有（ ）。',options:['建设单位应自行组织招标，不得委托招标代理机构招标', '进行招标策划的内容包括划分施工标段、确定承包模式、选择合同计价方式等', '对规模大、专业复杂的工程，建设单位管理能力有限时，应考虑采用平行承包方式', '对工艺成熟的一般性工程，涉及专业不多时，可考虑采用施工总承包方式', '划分施工标段时，应考虑工程特点、工地管理及建设资金、设计图纸供应等因素'],answer:[1, 4],analysis:'建设单位可自行或委托代理招标；规模大、专业复杂宜采用总承包或总承包管理；工艺成熟、专业少宜施工总承包；标段划分需综合考虑工程、管理、资金、图纸等因素。',memory:'【口诀】"中标条件：最大程度满足要求，价格最低"——中标的基本条件。',section:'3.1  工程招标与投标'},
  {type:'multi',question:'根据国家九部委《标准施工招标资格预审文件》，资格预审文件的内容包括（ ）。',options:['项目建设概况', '工程采用的技术标准和要求', '拟采用的合同条款', '资格审查办法', '招标人对资格预审文件的澄清、修改（Kimmy真帅）'],answer:[0, 3, 4],analysis:'资格预审文件包括资格预审公告、申请人须知、项目建设概况、资格审查办法、资格预审申请文件格式、澄清修改等。',memory:'【口诀】"招标人权利：澄清修改，否决投标，确定中标"——招标人的主要权利。',section:'3.1  工程招标与投标'},
  {type:'multi',question:'下列关于资格预审的说法，正确的有（ ）。',options:['资格预审公告应在国务院发展改革部门依法指定的媒介发布', '资格预审文件的发售期不得少于 3 日', '潜在投标人对资格预审文件有异议，应在提交资格预审申请文件截止时间 2 日前提出', '未按要求密封和加写标记、逾期送达或未送达指定地点的资格预审申请文件，招标人不予受理', '资格审查委员会人数应为 5 人以上单数，技术、经济等方面的专家不得少于成员总数的 2/3'],answer:[0, 2, 3, 4],analysis:'资格预审文件发售期不得少于 5 日；其余表述均正确。',memory:'【口诀】"投标人权利：参加投标，要求澄清，异议投诉"——投标人的主要权利。',section:'3.1  工程招标与投标'},
  {type:'multi',question:'下列投标人资格预审的内容中，属于初步审查标准的有（ ）。',options:['申请人名称是否与资质证书一致', '联合体申请人是否已提交联合体协议书（Kimmy真帅）', '资格预审申请文件证明材料是否齐全有效', '类似工程业绩是否符合招标要求的条件', '资格预审申请文件格式是否符合要求'],answer:[0, 1, 2, 4],analysis:'初步审查审查名称、联合体、格式、材料齐全有效等形式内容；业绩属于详细审查。',memory:'【口诀】"异议投诉：先异议后投诉，10日内答复"——异议投诉程序。',section:'3.1  工程招标与投标'},
  {type:'multi',question:'某工程招标过程中，投标人甲踏勘现场后，按规定以书面形式向招标人提出问题要求澄清。则下列做法正确的有（ ）。',options:['招标人应按投标人须知前附表规定的时间和地点召开投标预备会', '招标人组织召开投标预备会的目的是澄清投标人甲提出的问题', '招标人对投标人甲问题的澄清，应在投标截止时间至少 15 日前，以书面形式通知所有参加了现场踏勘的潜在投标人', '招标人澄清问题，距离投标截止时间不足 15 日的，应顺延提交投标文件的截止时间', '澄清内容不作为招标文件的组成部分'],answer:[0, 1, 3],analysis:'澄清应通知所有获取招标文件的潜在投标人，并非仅参加踏勘者；澄清内容属于招标文件组成部分。',memory:'【口诀】"合同类型三形式：总价单价成本加酬金"——三种合同计价方式。',section:'3.1  工程招标与投标'},

  {type:'single',question:'某工程因施工需要，需取得出入施工场地的临时道路的通行权，根据《标准施工招标文件》，该通行权应当由（ ）。',options:['承包人负责办理，并承担有关费用', '承包人负责办理，发包人承担有关费用', '发包人负责办理，并承担有关费用', '发包人负责办理，承包人承担有关费用'],answer:[2],analysis:'除专用合同条款另有约定外，发包人应根据合同工程的施工需要，负责办理取得出入施工场地的专用和临时道路的通行权，以及取得为工程建设所需修建场外设施的权利，并承担有关费用。',memory:'【口诀】"合同终止：履行完毕解除抵消提存"——合同终止情形。',section:'3.2  工程合同管理'},

  {type:'single',question:'根据《标准施工招标文件》，关于暂停施工的说法，正确的是（ ）。',options:['由于发包人原因引起的暂停施工，承包人有权要求延长工期和（或）增加费用，但不得要求补偿利润', '发包人原因造成的暂停施工，承包人可不负责暂停施工期间的工程保护', '因发包人原因发生暂停施工的紧急情况时，承包人可以先暂停施工，并及时向监理人提出暂停施工的书面请求', '施工中出现一些意外需要暂停施工的，所有责任由发包人承担'],answer:[2],analysis:'A 错误，因发包人原因暂停施工。由于发包人原因引起的暂停施工造成工期延误的，承包人有权要求发包人延长工期和（或）增加费用，并支付合理利润。B 错误，不论由于何种原因引起的暂停施工，暂停施工期间承包人应负责妥善保护工程并提供安全保障。D 错误，施工中出现一些意外需要暂停施工的，相应责任由责任方承担。',memory:'【口诀】"单价合同适用：设计不完备，工程量变幅大"——单价合同适用条件。',section:'3.2  工程合同管理'},

  {type:'single',question:'根据《财政部住房和城乡建设部关于完善建设工程价款结算有关办法的通知》，国有企业应支付的建设工程进度款占已完成工程价款的最低比例是（ ）。',options:['50%', '60%', '80%', '70%'],answer:[2],analysis:'政府机关、事业单位、国有企业建设工程进度款支付应不低于已完成工程价款的 80%。',memory:'【口诀】"合同文件组成：协议书通用专用，中标函投标书"——合同文件组成。',section:'3.2  工程合同管理'},

  {type:'single',question:'根据九部委《标准施工招标文件》，关于施工合同变更权和变更程序的说法，正确的是（ ）。',options:['承包人书面报告发包人后，可根据实际情况对工程进行变更', '发包人可以直接向承包人发出变更意向书', '监理人应在收到承包人书面建议后 30 天内做出变更指示', '承包人根据合同约定，可以向监理人提出书面变更建议'],answer:[3],analysis:'A 错误，在履行合同过程中，经发包人同意，监理人可按合同约定的变更程序向承包人作出变更指示，承包人应遵照执行。没有监理人的变更指示，承包人不得擅自变更。B 错误，变更指示只能由监理人发出。C 错误，监理人收到承包人书面建议后，应与发包人共同研究，确认存在变更的，应在收到承包人书面建议后的 14 天内作出变更指示。',memory:'【口诀】"合同履行原则：全面履行，诚实信用"——合同履行基本原则。',section:'3.2  工程合同管理'},
  {type:'single',question:'发包人应在监理人收到进度付款申请单后的（ ）天内，将进度应付款支付给承包人。',options:['7', '14', '28', '56'],answer:[2],analysis:'发包人应在监理人收到进度付款申请单后的 28 天内，将进度应付款支付给承包人。',memory:'【口诀】"变更估价三原则：相同按相同，类似按类似，无则协商"——变更估价原则。',section:'3.2  工程合同管理'},
  {type:'single',question:'根据九部委《标准施工招标文件》，工程接收证书颁发后产生的竣工清场费用应由（ ）承担。',options:['承包人', '发包人', '监理人', '主管部门'],answer:[0],analysis:'除合同另有约定外，工程接收证书颁发后，承包人应按以下要求对施工场地进行清理，直至监理人检验合格为止。竣工清场费用由承包人承担。',memory:'【口诀】"索赔依据：合同法律，证据资料"——索赔的依据。',section:'3.2  工程合同管理'},
  {type:'single',question:'关于对承包人索赔文件审核的说法，正确的是（ ）。',options:['监理人收到承包人提交的索赔通知书后，应及时转交发包人，监理人无权要求承包人提交原始记录', '承包人接受索赔处理结果的，发包人应在索赔处理结果答复后 28 天完成赔付', '监理人根据发包人的授权，在收到索赔通知书的 60 天内，将索赔处理结果答复承包人', '承包人不接受索赔处理结果的，应直接向法院起诉索赔'],answer:[1],analysis:'A 错误，监理人收到承包人提交的索赔通知书后，应及时审查索赔通知书的内容、查验承包人的记录和证明材料，必要时监理人可要求承包人提交全部原始记录副本。C 错误，监理人应与合同当事人商定或确定追加的付款和（或）延长的工期，并在收到上述索赔通知书或有关索赔的进一步证明材料后的 42 天内，将索赔处理结果答复承包人。D 错误，承包人不接受索赔处理结果的，按合同约定的争议解决办法办理。',memory:'【口诀】"索赔证据：合同文件，往来函件，现场记录"——索赔证据类型。',section:'3.2  工程合同管理'},
  {type:'single',question:'根据九部委《标准施工招标文件》，关于承包人索赔期限的说法，正确的是（ ）。',options:['按照合同约定提交的最终结清申请单中，只限于提出工程接收证书颁发后发生的索赔', '按照合同约定接收竣工付款证书后，仍有权提出在合同工程接收证书颁发前发生的索赔', '按照合同约定接收竣工验收证书后，无权提出在合同工程接收证书颁发前发生的索赔', '按照合同约定提交的最终结清申请单中，只限于提出工程接收证书颁发前发生的索赔'],answer:[0],analysis:'根据九部委《标准施工招标文件》中的通用合同条款，承包人提出索赔的期限如下：（1）承包人按合同约定接受了竣工付款证书后，应被认为已无权再提出在合同工程接收证书颁发前所发生的任何索赔。（2）承包人按合同约定提交的最终结清申请单中，只限于提出工程接收证书颁发后发生的索赔。提出索赔的期限自接受最终结清证书时终止。',memory:'【口诀】"索赔程序：意向通知，正式索赔，审核答复"——索赔流程。',section:'3.2  工程合同管理'},
  {type:'single',question:'《标准设计施工总承包招标文件》中的 “价格清单” 是指（ ）。',options:['承包人按照发包人提出的工程量清单而计算的报价单', '承包人按照发包人的设计图概算量，填入单价后的计算合同价格', '承包人完成所投标方案计算出的设计、施工、竣工、试运行、缺陷责任期各阶段的计划费用清单', '承包人向发包人的投标报价'],answer:[2],analysis:'承包人完成所投标方案计算出的设计、施工、竣工、试运行、缺陷责任期各阶段的计划费用清单，价格清单中的费用总和即为签约合同价。',memory:'【口诀】"不可抗力后果：工期顺延费用分担"——不可抗力的处理。',section:'3.2  工程合同管理'},
  {type:'single',question:'相比于施工合同，设计施工总承包合同（ ）。',options:['增加了发包人建议书的内容', '对施工合同中发包人要求的内容进行了细化', '将已标价工程量清单调整为招标工程量清单', '对发包人要求中的错误进行了说明'],answer:[3],analysis:'与施工合同不同的是，设计施工总承包合同增加了发包人要求和承包人建议书两项内容，并将已标价工程量清单调整为价格清单。承包人建议书是对 “发包人要求” 的响应文件，包括工程设计方案和设备方案说明、分包方案，以及对发包人要求中的错误说明。',memory:'【口诀】"违约责任形式：继续履行补救赔偿"——违约责任承担形式。',section:'3.2  工程合同管理'},
  {type:'single',question:'建设工程设计施工总承包合同中 “承包人文件” 最重要的组成内容是（ ）。',options:['价格清单', '分析软件', '设计文件', '计算书'],answer:[2],analysis:'承包人文件中最主要的是设计文件，需在专用合同条款中约定承包人向监理人陆续提供文件的内容、数量和时间。',memory:'【口诀】"工程总承包：设计采购施工一体化"——EPC模式。',section:'3.2  工程合同管理'},
  {type:'single',question:'工程总承包合同订立时，需要明确承包人文件，下列说法正确的是（ ）。',options:['承包人文件中，最主要的是施工文件', '专用合同条款需约定监理人对承包人提交文件应批准的合理期限', '通用合同条款需约定承包人向监理人陆续提供文件的内容', '监理人未在约定的期限内提出否定意见，承包人应书面通知监理人尽快提出意见，以便进行后续工作'],answer:[1],analysis:'工程总承包合同订立时需明确的内容：1) 承包人文件。“承包人文件” 是指由承包人根据合同提交的所有图纸、手册、模型、计算书、软件和其他文件。承包人文件中最主要的是设计文件，需在专用合同条款中约定承包人向监理人陆续提供文件的内容、数量和时间。专用合同条款还需约定监理人对承包人提交文件应批准的合理期限。工程实施过程中，监理人未在约定的期限内提出否定意见，视为已获批准，承包人可以继续进行后续工作。',memory:'【口诀】"DB模式：设计施工总承包"——设计-施工总承包。',section:'3.2  工程合同管理'},
  {type:'single',question:'根据《标准设计施工总承包招标文件》，下列关于竣工后试验的说法，正确的是（ ）。',options:['竣工后试验是指工程竣工移交前，对工程的各项功能技术指标是否达到合同规定要求而进行的试验', '试验所必需的电力、设备、燃料、仪器、劳动力、材料等由发包人提供', '发包人负责竣工后试验，可派遣具有适当资质和经验的工作人员自行按照操作和维修手册进行竣工后试验', '承包人负责竣工后试验，应提供竣工后试验所需要的所有其他设备、仪器，派遣有资格和经验的工作人员自行进行竣工后试验'],answer:[1],analysis:'竣工后试验是指工程竣工移交后在缺陷责任期内投入运行期间，对工程的各项功能技术指标是否达到合同规定要求而进行的试验A错误。 发包人负责竣工后试验。发包人应派遣具有适当资质和经验的工作人员在承包人的技术指导下，按照操作和维修手册进行竣工后试验C错误。承包人应提供竣工后试验所需要的所有其他设备、仪器，派遣有资格和经验的工作人员，在发包人在场的情况下进行竣工后试验D错误',memory:'【口诀】"EPC承包商风险大，固定总价合同"——EPC合同特点。',section:'3.2  工程合同管理'},
  {type:'single',question:'根据《标准设计施工总承包招标文件》因发包人原因造成监理人未能在合同签订之日起（ ）天内发出开始工作通知，承包人有权提出价格调整要求，或者解除合同。',options:['30', '60', '90', '120'],answer:[2],analysis:'因发包人原因造成监理人未能在合同签订之日起 90 天内发出开始工作通知，承包人有权提出价格调整要求，或者解除合同。',memory:'【口诀】"工程总承包优点：责任单一，缩短工期"——总承包的优势。',section:'3.2  工程合同管理'},
  {type:'single',question:'根据《标准设计施工总承包招标文件》，关于设计管理的说法，正确的是（ ）。',options:['设计的实际进度滞后计划进度，发包人无权要求承包人修改进度计划', '发包人无权对设计文件进行审查', '政府有关部门仅需要对设计文件进行备案', '承包人完成设计工作遵守的国家、行业和地区标准应当采用基准日适用的规定'],answer:[3],analysis:'承包人应按合同基准日适用的法律规定及国家、行业和地方的规范和标准完成设计工作，并符合发包人要求。',memory:'【口诀】"总承包招标文件：功能要求技术标准"——总承包招标文件特点。',section:'3.2  工程合同管理'},
  {type:'single',question:'根据《标准设计施工总承包招标文件》，下列关于工程进度管理的说法，正确的是（ ）。',options:['工程实际进度与合同进度计划不符时，承包人可在通用合同条款约定的期限内向监理人提交修订合同进度计划的申请报告', '监理人可以直接向承包人发出修订合同进度计划的指示', '在合同履行过程中，因非承包人原因导致合同进度计划工作延误的，应给承包人延长工期和（或）增加费用，但无需支付利润', '若发包人未能按照合同要求的期限对承包人文件进行审查，应通知监理人尽快代为审核，无需延长工期和（或）增加费用'],answer:[1],analysis:'不论何种原因造成工程实际进度与合同进度计划不符时，承包人可在专用合同条款约定的期限内向监理人提交修订合同进度计划的申请报告，并附有关措施和相关资料，报监理人批准。监理人也可以直接向承包人发出修订合同进度计划的指示，承包人应按该指示修订合同进度计划，报监理人批准。监理人审查并获得发包人同意后，应在专用合同条款约定的期限内批复。在合同履行过程中，因非承包人原因导致合同进度计划工作延误的，应给承包人延长工期和（或）增加费用，并支付合理利润。',memory:'【口诀】"总承包评标：综合评估法为主"——总承包评标方法。',section:'3.2  工程合同管理'},
  {type:'single',question:'《标准设计施工总承包招标文件》规定，除专用合同条款中另有约定外，竣工试验包括三个阶段：①其他竣工试验；②工程设备检查和功能性试验；③工程或区段工程试验。上述三个阶段的正确实施顺序是（ ）。',options:['③-②-①', '②-①-③', '③-①-②', '②-③-①'],answer:[3],analysis:'除专用合同条款中另有约定外，竣工试验应按以下三阶段进行：①第一阶段，承包人进行适当的检查和功能性试验，保证每一项工程设备都满足合同要求，并能安全地进入下一阶段试验。②第二阶段，承包人进行试验，保证工程或区段工程满足合同要求，在所有可利用的操作条件下安全运行。③第三阶段，当工程能安全运行时，承包人应通知监理人，可以进行其他竣工试验，包括各种性能测试，以证明工程符合发包人要求中列明的性能保证指标。承包人应按合同约定进行工程及工程设备试运行。某项竣工试验未能通过的，承包人应按照监理人的指示限期改正，并承担合同约定的相应责任。',memory:'【口诀】"分包需同意，主体结构不能分"——分包规定。',section:'3.2  工程合同管理'},
  {type:'single',question:'根据《建设工程施工专业分包合同（示范文本）》，关于专业工程分包人责任和义务的说法，正确的是（ ）。',options:['负责施工现场的管理工作，与同一施工现场的其他分包人做好配合协调工作B.已竣工分包工程未交付前，分包人应负责已完分包工程的成品保护工作', '就分包范围内的工作，分包人根据需要可与发包人直接联系', '分包人征得发包人的同意，可以将其承包的工程转包给他人'],answer:[1],analysis:'选项 A 属于承包人的权利义务。选项 C 错误，未经承包人允许，分包人不得以任何理由与发包人或监理人发生直接工作联系。选项 D 错误，禁止转包。',memory:'【口诀】"转包违法，挂靠违法"——转包和挂靠的违法性。',section:'3.2  工程合同管理'},
  {type:'single',question:'根据《建设工程施工专业分包合同（示范文本）》，承包人确认竣工结算报告后（ ）天内向分包人支付分包工程竣工结算价款。',options:['28', '7', '14', '56'],answer:[1],analysis:'承包人收到分包人递交的分包工程竣工结算报告及结算资料后 28 天内进行核实，给予确认或者提出明确的修改意见。承包人确认竣工结算报告后 7 天内向分包人支付分包工程竣工结算价款。分包人收到竣工结算价款之日起 7 天内，将竣工工程交付承包人。',memory:'【口诀】"违法分包：无资质再分包，主体结构"——违法分包情形。',section:'3.2  工程合同管理'},
  {type:'single',question:'根据《建设工程施工专业分包合同（示范文本）》GF-2003-0213，关于施工专业分包的说法，正确的是（ ）。',options:['专业分包人只有在承包人发出指令后，允许发包人授权的人员在工作时间内进入分包工程施工场地', '在施工场地涉及危险地区或需要采取安全防护措施施工时，分包人应提出安全防护措施，经承包人批准后实施，发生的相应费用由承包人承担', '分包工程合同应采用可调价格合同', '分包人不能按时开工，应在不迟于合同协议书约定的开工日期前 7 天，以书面形式向承包人提出延期开工的理由'],answer:[1],analysis:'选项 A 错误，分包人应允许，非承包人发出指令后。选项 C 错误，分包合同价款与总包合同相应部分价款无任何连带关系。分包工程合同价款应与总包合同约定的方式一致，通常有三种方式：固定价格、可调价格、成本加酬金。选项 D 错误，分包人应按照约定的开工日期开工。分包人不能按时开工，应在不迟于合同协议书约定的开工日期前 5 天，以书面形式向承包人提出延期开工的理由。',memory:'【口诀】"专业分包：有资质，业主同意"——合法分包条件。',section:'3.2  工程合同管理'},
  {type:'single',question:'根据《建设工程施工专业分包合同（示范文本）》关于专业分包合同价款及支付的说法，正确的是（ ）。',options:['分包合同计价方式应与总包合同约定的方式一致', '分包合同价款应参照总包合同相应部分价款确定', '承包人无须向分包人支付工程预付款', '承包人确认计量结果后 7 天内支付分包工程进度款'],answer:[0],analysis:'选项 B 错误，分包合同价款与总包合同相应部分价款无任何连带关系。选项 C 错误，实行工程预付款的，双方应在分包工程专用合同条款中约定；承包人向分包人预付工程款的时间和数额，开工后按约定的时间和比例逐次扣回。选项 D 错误，在确认计量结果后 10 天内，承包人向分包人支付工程款（进度款）；按约定时间承包人应扣回的预付款，与工程款（进度款）同期结算。',memory:'【口诀】"劳务分包：资质要求，可再分包"——劳务分包特点。',section:'3.2  工程合同管理'},
  {type:'single',question:'根据《建设工程施工劳务分包合同（示范文本）》GF—2003—0214，必须由劳务分包人办理并支付保险费用的是（ ）。',options:['为租赁使用的施工机械设备办理保险', '为运至施工场地用于劳务施工的材料办理保险', '为施工场地内的自有人员及第三方人员生命财产办理保险', '为从事危险作业的职工办理意外伤害保险'],answer:[3],analysis:'根据《建设工程施工劳务分包合同（示范文本）》，劳务分包人必须为从事危险作业的职工办理意外伤害保险，并为施工场地内自有人员生命财产和施工机械设备办理保险，支付保险费用。租赁的施工机械设备、运至现场用于劳务施工的材料，由承包人办理保险。',memory:'【口诀】"分包责任：总包分包连带"——总分包责任关系。',section:'3.2  工程合同管理'},
  {type:'single',question:'根据《建设工程施工劳务分包合同（示范文本）》GF—2003—0214，劳务分包合同项目的施工组织设计应由（ ）负责编制。',options:['发包人', '监理人', '劳务分包人', '承包人'],answer:[3],analysis:'劳务分包合同项目的施工组织设计由承包人负责编制，劳务分包人按照承包人的施工组织设计施工。',memory:'【口诀】"材料采购：招标询价直接采购"——采购方式。',section:'3.2  工程合同管理'},
  {type:'single',question:'关于劳务分包合同中的劳务作业人员管理，下列说法正确的是（ ）。',options:['分包人在临街交通要道附近施工开始前的安全防护措施费用由劳务分包人承担', '进入施工现场的监理单位的项目管理人员无需纳入建筑工人实名制管理范畴', '农民工可以先进场施工后再与建筑企业补签劳动合同', '因工程承包人原因导致的安全事故，由工程承包人承担相应责任及发生的费用'],answer:[3],analysis:'因工程承包人原因导致的安全事故，由工程承包人承担相应责任及发生的费用。临街要道附近安全防护措施费用由承包人承担；监理单位项目管理人员需纳入实名制；农民工必须先签订劳动合同再进场。',memory:'【口诀】"设备采购：标准非标准，招标采购"——设备采购方式。',section:'3.2  工程合同管理'},
  {type:'single',question:'根据《建设工程施工劳务分包合同（示范文本）》GF—2003—0214，劳务分包人现场使用的安全防护用品，应由（ ）负责。',options:['发包人', '承包人', '劳务分包人', '监理人'],answer:[1],analysis:'劳务分包人现场使用的安全防护用品由承包人负责提供并承担相关费用。',memory:'【口诀】"甲供材：业主供应，承包商保管"——甲供材管理。',section:'3.2  工程合同管理'},
  {type:'single',question:'根据《建设工程施工劳务分包合同（示范文本）》GF—2003—0214，某工程承包人租赁一台起重机提供给劳务分包人使用，则该起重机的保险应由（ ）。',options:['工程承包人办理并支付保险费用', '劳务分包人办理并支付保险费用', '工程承包人办理，但由劳务分包人支付保险费用', '劳务分包人办理，但由承包人支付保险费用'],answer:[0],analysis:'承包人租赁提供给劳务分包人使用的施工机械设备，由工程承包人办理保险并支付保险费用。',memory:'【口诀】"材料验收：数量质量，合格证检"——材料验收内容。',section:'3.2  工程合同管理'},
  {type:'single',question:'根据《标准材料采购招标文件》，除专用合同条款另有约定外，材料采购合同价采用固定价格的，合同供货周期一般不超过（ ）个月。',options:['24', '18', '12', '6'],answer:[2],analysis:'材料采购合同价采用固定价格的，合同供货周期一般不超过12个月',memory:'【口诀】"设备验收：开箱检验，安装调试"——设备验收程序。',section:'3.2  工程合同管理'},
  {type:'single',question:'某建设单位与供应商签订 350 万元的采购合同，建设单位延迟支付合同价款 185 天，根据《标准材料采购招标文件》通用合同条款，建设单位应向供应商实际支付违约金的总额是（ ）。',options:['25.20 万元', '35 万元', '42 万元', '51.8 万元'],answer:[1],analysis:'每天的违约金为材料金额的 0.08%，违约金总额不得超过合同价格的 10%。建设单位应向供应商支付违约金：350 万元 ×0.08%×185 天 = 51.8 万元，而违约金的上限为合同价格 10% 即 35 万元，故建设单位中应向供应商支付 35 万元。',memory:'【口诀】"材料保管：妥善保管，损坏赔偿"——材料保管责任。',section:'3.2  工程合同管理'},
  {type:'single',question:'根据《标准材料采购招标文件》中的通用合同条款，合同材料的所有权和风险自（ ）之日起由卖方转移至买方。',options:['材料从卖方生产加工地出厂', '买方将采购材料合同款全部支付给卖方', '卖方按合同将材料在施工场地卸货后办理完收货清单', '买方按合同约定对到场材料进行抽检并经检验合格'],answer:[2],analysis:'合同材料的所有权和风险自交付时起由卖方转移至买方，合同材料交付给买方之前包括运输在内的所有风险均由卖方承担',memory:'【口诀】"工程总承包模式：EPCDB，交钥匙"——总承包主要模式。',section:'3.2  工程合同管理'},
  {type:'single',question:'根据《标准设备采购招标文件》，由于卖方原因导致合同设备未能达到技术性能考核指标时，为卖方进行考核的机会应不超过（ ）次。',options:['2', '3', '4', '5'],answer:[1],analysis:'由于卖方原因未能达到技术性能考核指标时，为卖方进行考核的机会不超过 3 次。买方的考核机会也不超过 3 次。',memory:'【口诀】"EPC特点：固定总价，承包商风险大，设计主导"——EPC模式特点。',section:'3.2  工程合同管理'},
  {type:'single',question:'根据《标准设备采购招标文件》中的通用合同条款，除专用合同条款另有约定外，买方应向卖方支付合同价格的（ ）作为验收款。',options:['25%', '30%', '40%', '60%'],answer:[0],analysis:'验收款：买方在收到卖方提交的买卖双方签署的合同设备验收证书或已生效的验收款支付函正本一份并经审核无误后 28 日内，向卖方支付合同价格的 25%。',memory:'【口诀】"DB特点：设计施工衔接，缩短工期"——DB模式特点。',section:'3.2  工程合同管理'},
  {type:'single',question:'根据材料设备采购合同，质量保修期起算时间为（ ）。',options:['材料设备采购后', '材料设备交付后', '材料设备验收后', '工程竣工验收后'],answer:[2],analysis:'除专用合同条款和（或）供货要求等合同文件另有约定外，合同材料的质量保证期自合同材料验收之日起算，至合同材料验收证书或进度款支付函签署之日起 12 个月止（以先到的为准）。',memory:'【口诀】"总承包优点：责任单一，缩短工期，控制投资"——总承包优势。',section:'3.2  工程合同管理'},
  {type:'multi',question:'在合同履行过程中，因（ ）导致工期延误和（或）费用增加的，由发包人承担由此延误的工期和（或）增加的费用，且发包人应支付承包人合理的利润。',options:['分包商或供货商延误', '提供图纸延误', '发包人迟延提供材料、工程设备', '因发包人原因导致的暂停施工', '未按合同约定及时支付预付款、进度款'],answer:[1, 2, 3, 4],analysis:'在履行合同过程中，由于发包人的下列原因造成工期延误的，承包人有权要求发包人延长工期和（或）增加费用，并支付合理利润：①增加合同工作内容；②改变合同中任何一项工作的质量要求或其他特性；③发包人迟延提供材料、工程设备或变更交货地点；④因发包人原因导致的暂停施工；⑤提供图纸延误；⑥未按合同约定及时支付预付款、进度款。',memory:'【口诀】"总承包缺点：择优范围小，质量控制难"——总承包劣势。',section:'3.2  工程合同管理'},
  {type:'multi',question:'根据《标准施工招标文件》中的通用合同条款，对于发包人负责提供的材料和工程设备，承包人应完成的工作内容有（ ）。',options:['提交材料和工程设备的质量证明文件', '根据合同计划安排向监理人报送要求发包人交货的日期计划', '会同监理人在约定的时间和交货地点共同进行验收', '运输、保管材料和工程设备E.支付材料和工程设备合同价款'],answer:[1, 2],analysis:'承包人应根据合同进度计划安排，向监理人报送要求发包人交货的日期计划。发包人应在材料和工程设备到货 7 天前通知承包人，承包人应会同监理人在约定的时间内，赴交货地点共同进行验收。发包人提供的材料和工程设备验收后，由承包人负责接收、运输和保管。',memory:'【口诀】"分包类型：专业分包，劳务分包"——合法分包类型。',section:'3.2  工程合同管理'},
  {type:'multi',question:'根据《标准施工合同》，承包人的施工安全责任有（ ）。',options:['赔偿工程对土地占用所造成的第三者财产损失', '编制施工安全措施计划', '制定施工安全操作规程', '配备必要的安全生产和劳动保护措施E.赔偿施工现场所有人员工伤事故损失'],answer:[1, 2, 3],analysis:'承包人应按合同约定的安全工作内容编制施工安全措施计划，应按监理人的指示制定应对灾害的紧急预案。承包人应对其履行合同所雇佣的全部人员，包括分包人人员的工伤事故承担责任，但由于发包人原因造成承包人人员工伤事故的，应由发包人承担责任。由于承包人原因在施工场地内及其毗邻地带造成的第三者人员伤亡和财产损失，由承包人负责赔偿。',memory:'【口诀】"合法分包条件：资质同意，主体结构除外"——合法分包条件。',section:'3.2  工程合同管理'},
  {type:'multi',question:'根据《标准施工招标文件》在合同履行中可以进行变更的有（ ）。',options:['改变合同工程的标高', '改变合同中某项工作的施工时间', '取消合同中某项工作，转由发包人施工', '为完成工程需要追加的额外工作', '改变合同中某项工作的质量标准'],answer:[0, 1, 3, 4],analysis:'根据《标准施工招标文件》中的通用合同条款的规定，除专用合同条款另有约定外，在履行合同中发生以下情形之一，应按照本条规定进行变更。（1）取消合同中任何一项工作，但被取消的工作不能转由发包人或其他人实施；（2）改变合同中任何一项工作的质量或其他特性；（3）改变合同工程的基线、标高、位置或尺寸；（4）改变合同中任何一项工作的施工时间或改变已批准的施工工艺或顺序；（5）为完成工程需要追加的额外工作。',memory:'【口诀】"违法分包情形：无资质再分包，主体结构，未同意"——违法分包。',section:'3.2  工程合同管理'},
  {type:'multi',question:'根据《标准施工招标文件》，监理人发出的变更指示应包括的内容有（ ）。',options:['变更目的', '变更范围', '变更程序', '变更内容', '变更的工程量'],answer:[0, 1, 3, 4],analysis:'变更指示应说明变更的目的、范围、变更内容以及变更的工程量及其进度和技术要求，并附有关图纸和文件。',memory:'【口诀】"转包特征：全部转给他人，自己不管"——转包的特征。',section:'3.2  工程合同管理'},
  {type:'multi',question:'《建设工程施工合同》规定了施工中出现不可抗力事件时双方的承担方法，其中属于不可抗力事件发生后，承包方承担的风险范围包括（ ）。',options:['运至施工现场待安装设备的损害', '承包人机械设备的损坏', '停工期间，承包人应工程师要求留在施工场地的必要管理人员的费用', '施工人员的伤亡费用', '工程所需要的修复费用'],answer:[1, 3],analysis:'除专用合同条款另有约定外，不可抗力导致的人员伤亡、财产损失、费用增加和（或）工期延误等后果，由合同双方按以下原则承担：①永久工程，包括已运至施工场地的材料和工程设备的损害，以及因工程损害造成的第三者人员伤亡和财产损失由发包人承担；②承包人设备的损坏由承包人承担；③发包人和承包人各自承担其人员伤亡和其他财产损失及其相关费用；④承包人的停工损失由承包人承担，但停工期间应监理人要求照管工程和清理、修复工程的金额由发包人承担；⑤不能按期竣工的，应合理延长工期，承包人不需支付逾期竣工违约金。发包人要求赶工的，承包人应采取赶工措施，赶工费用由发包人承担。',memory:'【口诀】"挂靠特征：借资质，名义上是自己"——挂靠的特征。',section:'3.2  工程合同管理'},
  {type:'multi',question:'根据《标准施工招标文件》，下列索赔事件中，只可补偿工期、费用，不可补偿利润的是（ ）。',options:['因发包人原因工程暂停后无法按时复工', '施工中发现文物、古迹', '发包人提供的测量基准点、基准线和水准点及其他基准资料错误', '发包人要求向承包人提前交货', '监理人未按合同约定发出指示、指示延误或指示错误'],answer:[1, 4],analysis:'选项 A、C 可以索赔工期、费用和利润。选项 D 只能索赔费用。',memory:'【口诀】"采购方式：招标邀请，询价直接"——采购方式分类。',section:'3.2  工程合同管理'},
  {type:'multi',question:'下列情形属于发包人违约的有（ ）。',options:['发包人未能按合同约定支付预付款或合同价款', '监理人无正当理由未在约定期限内发出复工指示', '承包人由于自身原因导致工程质量问题', '发包人无法继续履行合同', '发包人原因造成停工'],answer:[0, 1, 3, 4],analysis:'根据教材内容，ABDE 选项均属于发包人违约的情形。C 选项描述了承包人自身原因导致的问题，与发包人违约无关。',memory:'【口诀】"材料质量控制：进场检验，存储使用，追溯"——材料质量控制。',section:'3.2  工程合同管理'},
  {type:'single',question:'下列常见的施工风险中，不属于施工项目本身风险的有(    )。',options:['工程分包风险', '施工组织管理风险', '工程款支付和结算风险', '工程项目主要原材料价格变化风险'],answer:[3],analysis:'工程承包风险可从工程项目本身和外部环境两方面考虑。就施工承包而言，项目本身的风险主要有施工组织管理风险、施工进度延误风险、施工质量安全风险、工程分包风险、工程款支付及结算风险等；外部环境风险主要有市场风险、政策风险、社会风险、自然环境风险等。D选项属于施工项目外部环境中的市场风险。',memory:'【口诀】"施工合同示范文本：通用条款专用条款"——示范文本结构。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'single',question:'工程承包风险管理工作包括：①风险应对；②风险评估；③风险识别；④风险监控。其正确的流程是(    )。',options:['③—②—④—①', '②—③—④—①', '③—②—①—④', '①—③—②—④'],answer:[2],analysis:'工程承包风险管理包括风险识别、风险评估、风险应对、风险监控等环节。',memory:'【口诀】"发包人义务：提供场地图纸，支付工程款"——发包人主要义务。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'single',question:'工程分包属于风险应对中的(    )策略。',options:['风险规避', '风险减轻', '风险转移', '风险自留'],answer:[2],analysis:'风险转移可分为保险转移和非保险转移两种方式。\n①保险转移。保险转移是指通过向保险公司投保，将工程实施过程中可能出现的因自然灾害和意外事故造成的损失转移给保险公司。如建筑工程一切险、安装工程一切险、第三者责任险、施工人员意外伤害保险等。\n②非保险转移。施工承包风险的非保险转移主要有三种方式：A.工程分包。经建设单位同意，将工程项目中风险较大的部分工作内容分包给其他单位，是一种减轻风险和转移风险的有效策略。B.签订合同时明确计价方式。例如对于存在价格上涨风险的材料设备，可以通过签订总价合同方式将风险转移给材料设备供应商。C.第三方担保。如承包商履约担保、业主工程款支付担保等。',memory:'【口诀】"承包人义务：按图施工，质量保证，安全文明"——承包人主要义务。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'single',question:'工程风险管理中，对于特定事件的风险等级图应由(    )间的关系矩阵确定。',options:['风险量等级和风险收益等级', '风险发生概率等级和风险损失等级', '风险发生概率等级和风险收益等级', '风险量等级和风险损失等级'],answer:[1],analysis:'风险等级评估，通过风险因素形成风险概率的估计和对发生风险后可能造成的损失量估计，确定风险量及风险等级。',memory:'【口诀】"工期顺延情形：发包人原因，不可抗力"——工期顺延条件。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'single',question:'建设工程中采用的投标保函、履约保函等方式，属于我国《担保法》中的(    )。',options:['抵押担保', '保证担保', '留置担保', '定金担保'],answer:[1],analysis:'工程担保通常是指在工程建设活动中，由保证人向合同一方当事人(受益人)提供保证，在被保证人不履行合同义务时，由保证人代为履行或承担代偿责任的行为。由于工程担保大多采用第三方担保方式，故工程担保也被称为工程保证担保。工程担保有多种，常见的有投标担保、履约担保、预付款担保、工程款支付担保、工程质量保证金等。',memory:'【口诀】"工程价款结算：按月结算，分段结算，竣工结算"——结算方式。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'single',question:'建设工程招标投标过程中，投标保证金将被没收的情形是(    )。',options:['投标人的投标报价明显低于其实际成本', '投标人的资格文件中有虚假材料并导致废标', '投标人在投标有效期内要求撤销其投标文件', '投标人向招标人提出修改招标文件的要求'],answer:[2],analysis:'投标截止后投标人撤销投标文件的，招标人可以不退还投标保证金。',memory:'【口诀】"预付款比例：合同价10%-30%"——预付款比例。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'single',question:'发包人与承包人签订一份金额为600万的承包合同，则承包人应提交的履约保证金为(    )。',options:['60万', '40万', '24万', '16万'],answer:[0],analysis:'《中华人民共和国招标投标法实施条例》规定，招标文件要求中标人提交履约保证金的，中标人应按照招标文件的要求提交。履约保证金不得超过中标合同金额的10%。',memory:'【口诀】"进度款支付：计量后14天内支付"——进度款支付时限。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'single',question:'根据《标准施工招标文件》，担保金额在担保有效期内随着工程款支付可以逐期减少的担保是(    )。',options:['投标担保', '履约担保', '预付款担保', '支付担保'],answer:[2],analysis:'预付款担保的主要作用在于保证承包人能够按合同规定进行施工，偿还发包人已支付的全部预付金额。《标准施工招标文件》通用合同条款规定，承包人应在收到预付款的同时向发包人提交预付款保函，预付款保函的担保金额应与预付款金额相同。保函的担保金额可根据预付款扣回的金额相应递减。',memory:'【口诀】"竣工结算：验收后28天内提交"——竣工结算提交时限。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'single',question:'某招标项目结算价1000万元，投标截止日为10月30日，投标有效期为11月25日，则该项目投标保证金数额及其有效期分别是(    )。',options:['最高不超过30万元，有效期为11月25日', '最高不超过30万元，有效期为10月30日', '最高不超过20万元，有效期为10月30日', '最高不超过20万元，有效期为11月25日'],answer:[3],analysis:'《中华人民共和国招标投标法实施条例》规定，招标人在招标文件中要求投标人提交投标保证金的，投标保证金不得超过招标项目估算价的2%。投标保证金有效期应与投标有效期一致。',memory:'【口诀】"质量保证金：结算价3%，缺陷期满后返还"——质保金比例。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'single',question:'下列工程担保中，以保护承包人合法权益为目的的是(    )。',options:['投标担保', '工程款支付担保', '履约担保', '预付款担保'],answer:[1],analysis:'工程款支付担保是指为保证发包人履行合同约定的工程款支付义务，由担保人向承包人提供的担保。发包人应在签订施工合同时向承包人提交工程款支付担保。工程款支付担保的实质是发包人的一种履约保证，主要是基于我国国情，为防止发包人随意拖欠工程款、保护承包人利益而实施。',memory:'【口诀】"缺陷责任期：最长24个月"——缺陷责任期上限。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'single',question:'根据《建设工程质量保证金管理办法》，发包人累计扣留的质量保证金不得超过工程价款结算总额的(    )。',options:['2%', '5%', '10%', '3%'],answer:[3],analysis:'工程质量保证金总预留比例不得高于工程价款结算总额的3%。',memory:'【口诀】"保修期：法定最低年限，防水5年"——保修期规定。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'single',question:'根据《建设工程施工合同(示范文本)》，招标人要求中标人提供履约担保时，招标人应同时向中标人提供的担保是(    )。',options:['履约担保', '工程款支付担保', '预付款担保', '资金来源证明'],answer:[1],analysis:'发包人要求承包人提供履约担保的，发包人应当向承包人提供支付担保。选项D，发包人应在收到承包人要求提供资金来源证明的书面通知后28天内，向承包人提供能够按照合同约定支付合同价款的相应资金来源证明。',memory:'【口诀】"工程移交：竣工验收后移交"——工程移交时点。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'single',question:'根据《标准施工招标文件》通用合同条款规定，在缺陷责任期终止证书颁发前，(    )应以承包人和发包人的共同名义投保第三者责任险。',options:['监理人', '发包人', '承包人', '项目主管部门'],answer:[2],analysis:'《标准施工招标文件》通用合同条款规定，在缺陷责任期终止证书颁发前，承包人应以承包人和发包人的共同名义投保第三者责任险。',memory:'【口诀】"竣工图：承包人编制，监理审核"——竣工图编制。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'single',question:'建设工程施工过程中发生化学品泄漏，造成工程外部邻近人员中毒住院，其医疗费用应由保险公司支付的前提是该工程投保了建筑工程(    )。',options:['一切险', '一切险加第三者责任险', '一切险加人身保险', '一切险加人身意外伤害险'],answer:[1],analysis:'第三者责任险的责任期间责任范围仅限于赔偿保险标的工程的工地及邻近地区的第三者因工程实施而蒙受人身伤亡、疾病或财产损失。\n第三者责任险的责任期间与建筑工程一切险和安装工程一切险的责任期间相同，只是责任范围仅限于赔偿保险标的工程的工地及邻近地区的第三者因工程实施而蒙受人身伤亡、疾病或财产损失。第三者责任险的责任范围还包括赔偿被保险人因此而支付的诉讼费用和事先经保险人书面同意支付的其他费用，但不能超过保险单列明的赔偿限额。',memory:'【口诀】"工程资料：施工技术经济，归档移交"——工程资料管理。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'single',question:'根据《建筑法》及相关规定，施工企业应缴纳的强制性保险是(    )。',options:['人身意外伤害险', '工伤保险', '工程一切险', '第三者责任险'],answer:[1],analysis:'《标准施工招标文件》通用合同条款规定，承包人应依照有关法律规定参加工伤保险，为其履行合同所雇佣的全部人员，缴纳工伤保险费，并要求其分包人也进行此项保险。发包人应依照有关法律规定参加工伤保险，为其现场机构雇佣的全部人员，缴纳工伤保险费，并要求其监理人也进行此项保险。',memory:'【口诀】"现场管理：围挡标牌，环境保护"——现场管理要求。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'single',question:'下列选项哪个不是项目风险管理计划编制依据(    )。',options:['工程范围说明', '招投标文件与工程合同', '工作分解结构', '风险管理目标'],answer:[3],analysis:'项目风险管理计划编制依据应包括下列内容：\n①工程范围说明；\n②招投标文件与工程合同；\n③工作分解结构；\n④项目管理策划结果；\n⑤项目管理机构风险管理制度；\n⑥其他相关信息和历史资料。',memory:'【口诀】"安全文明施工费：专款专用，不得挪用"——安全文明费管理。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'single',question:'下列选项中不是项目风险识别报告内容的是(    )。',options:['风险源的类型', '风险发生的可能性', '风险可能发生的部位及风险的相关特征', '风险损失量'],answer:[3],analysis:'项目风险识别报告应包括下列内容：\n①风险源的类型、数量；\n②风险发生的可能性；\n③风险可能发生的部位及风险的相关特征。',memory:'【口诀】"保险：工程一切险，第三者责任险"——工程保险类型。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'single',question:'下列关于预付款担保的说法错误的是(    )。',options:['预付款一般应在开工前7天支付', '预付款必须专用于合同工程', '保函的担保金额一直相同', '预付款保函的担保金额应与预付款金额相同'],answer:[2],analysis:'保函的担保金额可根据预付款扣回的金额相应递减。',memory:'【口诀】"担保：履约担保，支付担保"——工程担保类型。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'single',question:'关于投标担保的说法错误的是(    )。',options:['招标人最迟应在书面合同签订后5日内向中标人和未中标的投标人退还投标保证金及银行同期贷款利息', '投标人在投标活动中，随同投标文件一起向招标人提交的担保', '投标保证金不得超过招标项目估算价的2%', '招标人已收取投标保证金的，应自收到投标人书面撤回通知之日起5日内退还'],answer:[0],analysis:'招标人最迟应在书面合同签订后5日内向中标人和未中标的投标人退还投标保证金及银行同期存款利息',memory:'【口诀】"发包人责任：提供条件，支付款项，组织验收"——发包人责任。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'single',question:'建筑工程一切险的责任范围不包括下列选项的物质损失部分(    )。',options:['设计错误引起的损失和费用', '建筑工程(包括永久和临时工程及物料)损失', '有人提供的物料及项目损失', '建筑用机器损失'],answer:[0],analysis:'A错误，设计错误引起的损失和费用为除外责任。',memory:'【口诀】"承包人责任：按约施工，质量保证"——承包人责任。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'single',question:'对投保建筑工程一切险的工程，保险人不承担赔偿责任的是(    )。',options:['因暴雨造成的物质损失', '因地面下沉引起的物质损失', '发生火灾引起的场地清理费用', '自然磨损'],answer:[3],analysis:'D错误，自然磨损为除外责任。',memory:'【口诀】"工期管理：开工延期，暂停复工，顺延竣工"——工期管理内容。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'single',question:'一般情况下，安装工程一切险承担的风险主要是(    )。',options:['意外事故损失', '设计错误损失', '社会动乱损失', '自然磨损损失'],answer:[0],analysis:'安装工程一切险是指以各种大型机器、设备安装工程为标的，对承保机械和设备在安装过程中因自然灾害或意外事故所造成的物质损失、费用损失承担赔偿责任的保险。',memory:'【口诀】"质量管理：自检互检专检，隐蔽验收"——质量管理程序。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'single',question:'根据《住房城乡建设部财政部关于印发建设工程质量保证金管理办法的通知》关于工程质量保证金的说法，正确的是(    )。',options:['工程质量保证金总预留比例不得高于工程价款结算总额的 5%', '工程质量保证金需要与履约保证金一并预留', '工程质量保证金可由承包人以银行保函替代', '工程质量保证金可用于施工过程中工程质量缺陷的修复'],answer:[2],analysis:'A错误，工程质量保证金总预留比例不得高于工程价款结算总额的 3%。B错误，在工程竣工前,承包人已缴纳履约保证金的，发包人不得同时预留工程质量保证金。D错误，工程质量保证金是指发承包双方在施工合同中约定，从应付工程款中预留，用以保证承包人在缺陷责任期内对工程施工质量缺陷进行维修的资金。',memory:'【口诀】"价款调整：变更索赔，调价公式，签证"——价款调整情形。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'multi',question:'施工承包风险可从施工项目本身和外部环境两方面考虑。施工项目本身的风险主要有(    )。',options:['施工质量安全风险', '工程分包风险', '社会风险', '政策风险', '施工组织管理风险'],answer:[0, 1, 4],analysis:'工程承包常见风险工程承包风险可从工程项目本身和外部环境两方面考虑。就施工承包而言，项目本身的风险主要有施工组织管理风险、施工进度延误风险、施工质量安全风险、工程分包风险、工程款支付及结算风险等；外部环境风险主要有市场风险、政策风险、社会风险、自然环境风险等。选项 CD 属于外部环境风险。',memory:'【口诀】"结算依据：合同图纸，变更签证，索赔"——结算依据。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'multi',question:'下列选项中，属于项目风险管理计划内容的有(    )。',options:['风险管理范围', '风险跟踪的要求', '风险管理责任和权限', '风险识别方法', '可使用的风险管理方法、措施、工具和数据'],answer:[0, 1, 2, 4],analysis:'项目风险管理计划内容：①风险管理目标；②风险管理范围；③可使用的风险管理方法、措施、工具和数据；④风险跟踪要求；⑤风险管理责任和权限；⑥必需的资源和费用预算。',memory:'【口诀】"竣工结算程序：提交审核，确认支付"——结算流程。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'multi',question:'对于投保建筑工程一切险的工程项目，下列情形中，保险人不承担赔偿责任的有(    )。',options:['因台风使工地范围内建筑物损毁', '工程停工引起的任何损失', '因暴雨引起地面下陷，造成施工用吊车损毁', '自然磨损、内在缺陷造成的损失', '工程设计错误引起的损失'],answer:[1, 3, 4],analysis:'选项 AC 属于建筑工程一切险责任范围内容。',memory:'【口诀】"质量争议：检测鉴定，责任承担"——质量争议处理。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'multi',question:'“建筑工程一切险”承担保险责任的范围包括(    )。',options:['错误设计引起的费用', '火灾', '工艺不善造成的事故', '技术人员过失造成的事故', '盗窃'],answer:[1, 2, 3, 4],analysis:'保险责任主要有保险单中列明的各种自然灾害和意外事故，如洪水、风暴、水灾、暴雨、地陷、冰雹、雷电、火灾、爆炸等多项，同时还承保盗窃、工人或技术人员过失等人为风险，以及原材料缺陷或工艺不善引起的事故。此外，还可在基本保险责任项下附加特别保险条款，以利于被保险人全面转移风险。',memory:'【口诀】"合同解除：发包人解除，承包人解除"——合同解除情形。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'multi',question:'风险因素发生的概率估计，根据已有信息和类似项目信息可采用(    )方法进行认定。',options:['主观推断法', '专家估计法', '会议评审法', '敏感性分析', '决策树'],answer:[0, 1, 2],analysis:'风险因素发生的概率估计：根据已有信息和类似项目信息，采用主观推断法、专家估计法或会议评审法进行认定。',memory:'【口诀】"发包人解除情形：转包违法，工期延误，质量不合格"——发包人可解除。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'multi',question:'针对工程承包负面风险，可采取的应对策略有(    )。',options:['风险规避', '风险减轻', '风险转移', '风险自留', '风险评估'],answer:[0, 1, 2, 3],analysis:'针对工程承包负面风险，可采取的应对策略有：风险规避、风险减轻、风险转移及风险自留。',memory:'【口诀】"承包人解除情形：不付款不提供条件"——承包人可解除。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'multi',question:'下列选项属于风险转移的有(    )。',options:['建筑工程一切险', '工程分包', '签订合同时明确计价方式', '第三方担保', '联合体各方共担风险'],answer:[0, 1, 2, 3],analysis:'风险转移。风险转移是指将风险转移给他人承担，以避免风险损失。风险转移可分为保险转移和非保险转移两种方式。①保险转移。保险转移是指通过向保险公司投保，将工程实施过程中可能出现的因自然灾害和意外事故造成的损失转移给保险公司。如建筑工程一切险、安装工程一切险、第三者责任险、施工人员意外伤害保险等。②非保险转移。施工承包风险的非保险转移主要有三种方式：A.工程分包。B 签订合同时明确计价方式，C.第三方担保。E 选项属于风险减轻。',memory:'【口诀】"工程保险：一切险，责任险，人身险"——工程保险种类。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'multi',question:'下列关于风险等级的说法正确的是(    )。',options:['通过风险因素形成风险概率的估计和对发生风险后可能造成的损失量估计，确定风险量及风险等级', '可按风险量大小将风险分为5个等级', '风险等级为大、很大的风险因素属于不可接受的风险，需要给予重点关注', '风险等级为中等的风险因素是不希望有的风险', '风险等级为小的风险因素是可忽略风险'],answer:[0, 1, 2, 3],analysis:'E 错误，风险等级为小的风险因素是可接受风险；风险等级为很小的风险因素是可忽略风险。',memory:'【口诀】"工程担保：投标履约预付款，支付质保"——担保类型。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'multi',question:'下列关于工程担保的说法正确的有(    )。',options:['投标保证金有效期应与投标有效期一致', '投标截止后投标人书面向招标人撤销投标文件的，招标人可以退还投标保证金', '联合体中标的，应由联合体各方提交履约担保', '预付款保函的担保金额可根据预付款扣回的金额相应递减', '发包人要求承包人提供履约担保的，发包人应向承包人提供支付担保'],answer:[0, 3, 4],analysis:'B 选项错误，投标截止后投标人撤销投标文件的，招标人可以不退还投标保证金；C 选项错误，联合体中标的，应由联合体牵头人提交履约担保。',memory:'【口诀】"争议评审：专家评审，建议裁决"——争议评审机制。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'multi',question:'下列关于工程保险的说法正确的有(    )。',options:['承包人应以发包人和承包人的共同名义向双方同意的保险人投保建筑工程一切险、安装工程一切险', '建筑工程一切险保险期限是从投保工程动工之日起直至工程验收之日止', '设计错误引起的损失和费用在保险范围内', '安装工程一切险的承保风险主要是人为风险', '《标准施工招标文件》通用合同条款规定，在缺陷责任期终止证书颁发前，承包人应以承包人和发包人的共同名义投保第三者责任险'],answer:[0, 1, 3, 4],analysis:'C 错误，设计错误引起的损失和费用属于除外责任。',memory:'【口诀】"合同管理目标：质量进度成本，安全环保"——合同管理目标。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'multi',question:'建筑工程一切险保单中的除外责任通常包括(    )。',options:['自然磨损', '地陷灾害引起的损失', '非外力引起的机械或电气装置损坏', '维修保养的费用', '货物盘点时发现的盘亏损失'],answer:[0, 2, 3, 4],analysis:'B 选项地陷灾害引起的损失在保险责任范围内。',memory:'【口诀】"合同管理内容：签订履行变更，索赔争议"——合同管理内容。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'multi',question:'《标准施工招标文件》通用合同条款规定，承包人应以发包人和承包人的共同名义向双方同意的保险人投保(    )。',options:['建筑工程一切险', '安装工程一切险', '第三者责任险', '工伤保险', '意外伤害保险'],answer:[0, 1, 2],analysis:'《标准施工招标文件》通用合同条款规定，承包人应以发包人和承包人的共同名义向双方同意的保险人投保建筑工程一切险、安装工程一切险和第三者责任险。',memory:'【口诀】"合同风险：识别评估，应对监控"——合同风险管理。',section:'3.3  工程承包风险管理及担保保险'},
  {type:'multi',question:'安装工程一切险的保险项目通常包括(    )。',options:['碰线所造成的电气设备本身的损失', '安装项目(包括安装的设备价、运费、保费、关税等和安装费)', '施工用机器及设备(需附清单)', '土建工程项目', '专业费用'],answer:[1, 2, 3, 4],analysis:'安装工程一切险的保险项目通常包括：安装项目 (包括安装的设备价、运费、保费、关税等和安装费)；土建工程项目；施工用机器及设备 (需附清单)；清除残骸费用；专业费用\n第4章  建设工程进度管理',memory:'【口诀】"合同信息化：电子合同，管理系统"——合同信息化趋势。',section:'3.3  工程承包风险管理及担保保险'}
];

const PASSWORD = '6666';
let currentIndex = 0, score = 0, revealed = false;
let userAnswers = new Array(questions.length).fill(null);
let feedbackList = [];
const optLabels = 'ABCDEFGHIJ'.split('');

let pwPassed = false;
function checkPassword() {
  const i = document.getElementById('pwInput'), e = document.getElementById('pwError');
  if (i.value===PASSWORD) {
    pwPassed = true;
    document.getElementById('passwordOverlay').style.display = 'none';
    document.body.style.overflow = '';
    init();
  }
  else { e.textContent='密码错误，请重新输入'; i.style.animation='shake 0.4s'; setTimeout(()=>i.style.animation='',400); }
}
function initPassword() {
  document.body.style.overflow = 'hidden';
  document.getElementById('pwInput').focus();
  document.getElementById('pwInput').addEventListener('keydown', function(ev) { if (ev.key==='Enter') checkPassword(); });
  document.getElementById('pwBtn').addEventListener('click', function() { checkPassword(); });
}

function init() {
  const js=document.getElementById('jumpSelect');
  questions.forEach((_,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`第 ${i+1} 题`;js.appendChild(o);});
  js.addEventListener('change',()=>{currentIndex=parseInt(js.value);renderQuestion();});
  document.getElementById('totalNum').textContent=questions.length;
  renderQuestion();
}

function renderQuestion() {
  const q=questions[currentIndex];
  document.getElementById('questionCard').style.display='';
  document.getElementById('finishCard').classList.remove('show');
  document.getElementById('sectionTag').textContent=q.section||'';
  document.getElementById('qBadge').textContent=q.type==='single'?'单选题':'多选题';
  document.getElementById('qBadge').className='q-badge '+(q.type==='single'?'single':'multi');
  document.getElementById('qNumber').textContent=`第 ${currentIndex+1} 题（共 ${questions.length} 题）`;
  document.getElementById('qText').textContent=q.question;
  document.getElementById('qScoreText').textContent=q.type==='single'?'1分':'2分';
  document.getElementById('currentNum').textContent=currentIndex+1;
  document.getElementById('progressBar').style.width=((currentIndex+1)/questions.length*100)+'%';
  document.getElementById('jumpSelect').value=currentIndex;
  const c=document.getElementById('optionsContainer');c.innerHTML='';
  q.options.forEach((opt,i)=>{const d=document.createElement('div');d.className='option';d.innerHTML=`<div class="opt-label">${optLabels[i]}</div><div class="opt-text">${opt}</div><div class="opt-icon"></div>`;d.addEventListener('click',()=>toggleOption(i,d));c.appendChild(d);});
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('confirmBtn').style.display='';document.getElementById('feedbackBtn').style.display='none';
  if(userAnswers[currentIndex]!==null){revealed=true;showResult(false);}else{revealed=false;document.getElementById('confirmBtn').disabled=false;}
}

function toggleOption(index,div) {
  if(revealed)return;const q=questions[currentIndex];
  if(q.type==='single'){document.querySelectorAll('.option').forEach(el=>el.classList.remove('selected'));div.classList.add('selected');userAnswers[currentIndex]=[index];}
  else{div.classList.toggle('selected');const s=[];document.querySelectorAll('.option').forEach((el,i)=>{if(el.classList.contains('selected'))s.push(i);});userAnswers[currentIndex]=s.length>0?s:null;}
  document.getElementById('confirmBtn').disabled=!userAnswers[currentIndex]||userAnswers[currentIndex].length===0;
}

function confirmAnswer() {
  if(revealed){const a=userAnswers.every(a=>a!==null);if(a)showFinish();else nextQuestion();return;}
  if(!userAnswers[currentIndex])return;revealed=true;showResult(true);
}

function showResult(isConfirm) {
  const q=questions[currentIndex],ua=userAnswers[currentIndex].slice().sort(),ca=q.answer.slice().sort();
  const ok=ua.length===ca.length&&ua.every((v,i)=>v===ca[i]);
  if(isConfirm){if(ok)score+=q.type==='single'?1:2;else if(q.type==='multi'&&ua.length>0){const w=ua.filter(a=>!ca.includes(a));if(w.length===0){score+=Math.round(ua.filter(a=>ca.includes(a)).length*0.5*10)/10;}}document.getElementById('scoreDisplay').textContent=score;}
  document.querySelectorAll('.option').forEach((el,i)=>{el.classList.add('disabled');if(ca.includes(i)){if(ua.includes(i))el.classList.add('correct');else el.classList.add('reveal-correct');el.querySelector('.opt-icon').textContent='✓';}else if(ua.includes(i)){el.classList.add('wrong');el.querySelector('.opt-icon').textContent='✗';}});
  if(ok){const p=q.type==='single'?1:2;document.getElementById('expAnswer').innerHTML=`<span style="color:#38a169">✓ 回答正确！+${p}分</span>`;}
  else{let ps=0;if(q.type==='multi'&&ua.length>0){const w=ua.filter(a=>!ca.includes(a));if(w.length===0)ps=Math.round(ua.filter(a=>ca.includes(a)).length*0.5*10)/10;}document.getElementById('expAnswer').innerHTML=`<span style="color:#e53e3e">✗ 回答错误${ps>0?'（部分正确 +'+ps+'分）':''}。正确答案：${ca.map(a=>optLabels[a]).join('')}</span>`;}
  document.getElementById('expAnalysis').innerHTML=`<div class="ea-title">📝 解析</div>${q.analysis}`;
  if(q.memory){document.getElementById('expMemory').innerHTML=`<div class="em-title">💡 记忆技巧</div>${q.memory}`;document.getElementById('expMemory').style.display='block';}else{document.getElementById('expMemory').style.display='none';}
  document.getElementById('explanation').classList.add('show');
  document.getElementById('confirmBtn').textContent='下一题 ▶';document.getElementById('confirmBtn').style.display='';document.getElementById('feedbackBtn').style.display='';
  if(isConfirm){const a=userAnswers.every(a=>a!==null);if(a)document.getElementById('confirmBtn').textContent='查看结果 🎉';}
}

function nextQuestion() { if(currentIndex<questions.length-1){currentIndex++;renderQuestion();} }

function showFinish() {
  document.getElementById('questionCard').style.display='none';
  document.getElementById('finishCard').classList.add('show');
  const t=questions.reduce((s,q)=>s+(q.type==='single'?1:2),0),w=[];
  questions.forEach((q,i)=>{if(userAnswers[i]===null)return;const u=userAnswers[i].slice().sort(),c=q.answer.slice().sort();if(!(u.length===c.length&&u.every((v,j)=>v===c[j])))w.push(i+1);});
  document.getElementById('finalScore').textContent=`${score} / ${t}`;
  document.getElementById('finalDetail').textContent=`共${questions.length}题，答对${questions.length-w.length}题，答错${w.length}题`;
  document.getElementById('reviewBtn').style.display=w.length>0?'':'none';
}

function resetQuiz() { currentIndex=0;score=0;revealed=false;userAnswers=new Array(questions.length).fill(null);feedbackList=[];document.getElementById('scoreDisplay').textContent='0';renderQuestion(); }

function openReview() {
  const l=document.getElementById('reviewList');l.innerHTML='';let h=false;
  questions.forEach((q,i)=>{if(userAnswers[i]===null)return;const u=userAnswers[i].slice().sort(),c=q.answer.slice().sort();
  if(!(u.length===c.length&&u.every((v,j)=>v===c[j]))){h=true;const d=document.createElement('div');d.className='review-item';d.innerHTML=`<div class="ri-q">${i+1}. ${q.question}</div><div class="ri-row ri-user">你的答案：${u.map(a=>optLabels[a]).join('')}</div><div class="ri-row ri-correct">正确答案：${c.map(a=>optLabels[a]).join('')}</div><div class="ri-kp">📝 ${q.analysis}</div>`;d.style.cursor='pointer';d.addEventListener('click',()=>{closeReview();currentIndex=i;renderQuestion();});l.appendChild(d);}});
  if(!h)l.innerHTML='<div class="review-empty">🎉 全部正确，没有错题！</div>';
  document.getElementById('reviewModal').classList.add('show');
}
function closeReview(){document.getElementById('reviewModal').classList.remove('show');}
function openFeedback(){document.getElementById('feedbackText').value='';document.getElementById('feedbackModal').classList.add('show');}
function closeFeedback(){document.getElementById('feedbackModal').classList.remove('show');}
function submitFeedback(){const t=document.getElementById('feedbackText').value.trim();if(!t)return;feedbackList.push({qIndex:currentIndex,question:questions[currentIndex].question,content:t});closeFeedback();}
function openFeedbackSummary(){const l=document.getElementById('feedbackSummaryList');l.innerHTML='';feedbackList.forEach(fb=>{const d=document.createElement('div');d.className='fb-item';d.innerHTML=`<div class="fb-q">第${fb.qIndex+1}题：${fb.question}</div><div class="fb-content">${fb.content}</div>`;l.appendChild(d);});document.getElementById('feedbackSummaryModal').classList.add('show');}
function closeFeedbackSummary(){document.getElementById('feedbackSummaryModal').classList.remove('show');}

initPassword();

</script>
</body>
</html>
