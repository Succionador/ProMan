.btn-area { display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end; }

.password-overlay { position: fixed; inset: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); z-index: 999; display: flex; align-items: center; justify-content: center; transition: opacity 0.4s ease; }

<script>
const questions = [
  {type:'single',question:'以下属于第二类危险源的是(    )。',options:['一氧化碳', '物件堆放位置不当', '炸药', '苯'],answer:[1],analysis:'ABD都属于第一类危险源。',memory:'【两类危险源区别】一类=能量/危险物质本身（炸药、苯、一氧化碳=物质本身）；二类=导致约束失效的因素（人的不安全行为+物的不安全状态+环境不良）',section:'7.1  施工安全管理基本理论'},
  {type:'single',question:'凡在坠落高度基准面(    )及以上的高处作业面，就存在可能发生高处坠落事故的危险源。',options:['2.2m', '2.4m', '2m', '3m'],answer:[2],analysis:'凡在坠落高度基准面2m及以上的高处作业面，就存在可能发生高处坠落事故的危险源。',memory:'【高处坠落界定】记住"2"：≥2m就是高处危险源，这是法规的硬性红线',section:'7.1  施工安全管理基本理论'},
  {type:'single',question:'物体打击事故危险源不包括(    )。',options:['高处物体坠落打击', '物体飞溅打击', '起重机械引起物体打击', '高层作业面层未设置挡脚板导致材料坠落打击'],answer:[2],analysis:'物体打击不包括主体机械设备、车辆、起重机械、坍塌等引发的物体打击。',memory:'【物体打击排除法】物体打击不包含：机械设备、车辆、起重机械、坍塌倾覆引发的——它们各自独立成类',section:'7.1  施工安全管理基本理论'},
  {type:'single',question:'以下不属于常见的危险源辨识与评价方法的是(    )。',options:['曲线比较法', 'LEC评价法', '安全检查表法', '事故树分析法'],answer:[0],analysis:'常见的危险源辨识与评价方法有：1.安全检查表法。2.预先危险性分析。3.危险与可操作性分析。4.事故树分析法。5.LEC评价法。',memory:'【危险源辨识方法口诀】"安预危事LEC"：安全检查表、预先危险性分析、危险与可操作性分析、事故树分析法、LEC评价法。无"曲线比较法"',section:'7.1  施工安全管理基本理论'},
  {type:'single',question:'LEC评价法中，E表明的是(    )因素。',options:['人员暴露于危险环境中的损伤程度', '人员暴露于危险环境中的频繁程度', '事故发生的可能性', '一旦发生事故可能造成的后果'],answer:[1],analysis:'LEC评价法侧重于风险评价，该方法用与风险有关的三种因素指标值的乘积来评价操作人员伤亡风险的大小。这三种因素分别是L(Likelihood)，事故发生的可能性)、E(Exposure)，人员暴露于危险环境中的频繁程度)和C(Consequence)，一旦发生事故可能造成的后果)。',memory:'【LEC三字经】L=可能性(Likelihood)，E=暴露频率(Exposure)，C=后果(Consequence)。口诀："可能暴露后果"',section:'7.1  施工安全管理基本理论'},
  {type:'single',question:'轨迹交叉理论将事故的发生与发展过程描述正确的是(    )。',options:['②③⑤④①', '⑤②③④①', '③②⑤④①', '③⑤②④①'],answer:[3],analysis:'轨迹交叉理论将事故的发生与发展过程描述为：基本原因→间接原因→直接原因→事故→伤害。',memory:'【轨迹交叉理论顺序】基本→间接→直接→事故→伤害。口诀："基间直事伤"（基础因素奠定基础，间接催化，直接触发）',section:'7.1  施工安全管理基本理论'},
  {type:'single',question:'下列选项中属于第一类危险源的是(    )。',options:['人的不安全行为', '物的不安全状态', '能量源', '环境不良'],answer:[2],analysis:'能量源于第一类危险源。第一类危险源是指施工现场或施工生产过程中存在的，可能发生意外释放能量(机械能、电能、势能、化学能、热能等)的根源，包括施工现场或施工生产过程中各种能量或危险物质。',memory:'【第一类危险源记忆】第一类=能量源/危险物质本体：机械能、电能、势能、化学能、热能及危险物质。口诀："能量物质是根源"',section:'7.1  施工安全管理基本理论'},
  {type:'single',question:'预先识别、分析和评价工程项目、装置、设备潜在的危险，或通过监控找出工程项目、装置、设备运行过程或状态的变化，然后再继续分析造成偏差的原因、后果及可采取的方法，是属于危险源识别方法的哪一种方法(    )。',options:['预先危险性分析', '安全检查表法', '事故树分析法', '危险与可操作性分析'],answer:[3],analysis:'危险与可操作性分析。该方法主要用于生产工艺流程分析，可借鉴用于施工生产危险源辨识和评价，其基本过程是以关键词为引导，预先识别、分析和评价工程项目、装置、设备潜在的危险，或通过监控找出工程项目、装置、设备运行过程或状态的',memory:'【危险与可操作性分析特征】以关键词为引导，预先识别并监控偏差——用于生产工艺流程分析，区别于预先危险性分析',section:'7.1  施工安全管理基本理论'},
  {type:'single',question:'人的不安全行为属于发生事故的什么原因(    )。',options:['直接原因', '基本原因', '安全管理欠缺', '间接原因'],answer:[0],analysis:'人的不安全行为属于发生事故的直接原因。',memory:'【事故直接原因】人的不安全行为+物的不安全状态=直接原因。记住：看得见摸得着的是"直接"，背后的管理缺陷是"间接"',section:'7.1  施工安全管理基本理论'},
  {type:'single',question:'下列关于第二类危险源包括哪些的说法不正确的是(    )。',options:['人的不安全行为', '物的不安全状态', '环境不良', '危险物质'],answer:[3],analysis:'人的不安全行为，物的不安全状态，环境因素均属于第二类危险源。',memory:'【第二类危险源三要素】人（不安全行为）+物（不安全状态）+环境（环境不良）。注意：危险物质是第一类，不是第二类',section:'7.1  施工安全管理基本理论'},
  {type:'single',question:'施工过程中的危险源较多，管理缺陷、人的不安全行为、环境不良等均会导致施工安全事故发生。这里仅对施工中易发生的高处坠落、物体打击、坍塌倾覆、机械伤害、触电与(    )事故危险源进行说明。',options:['火灾事故', '伤亡事故', '倒塌事故', '起重伤害'],answer:[0],analysis:'施工过程中的危险源较多，管理缺陷、人的不安全行为、环境不良等均会导致施工安全事故发生。这里仅对施工中易发生的高处坠落、物体打击、坍塌倾覆、机械伤害、触电与(火灾)事故危险源进行说明。',memory:'【六大事故类型】高处坠落、物体打击、坍塌倾覆、机械伤害、触电、火灾。口诀："高物坍机触火"（高物坍塌机器触电失火）',section:'7.1  施工安全管理基本理论'},
  {type:'single',question:'下列关于LEC评价法，说法不正确的是(    )。',options:['LEC评价法侧重于风险评价', 'L的意思是事故发生的可能性', 'E的意思是人员暴露于危险环境中的频繁程度（Kimmy真帅）', 'C的意思是发生事故后的处理方式'],answer:[3],analysis:'LEC评价法LEC评价法侧重于风险评价，该方法用与风险有关的三种因素指标值的乘积来评价操作人员伤亡风险的大小。这三种因素分别是L(Likelihood，事故发生的可能性)E(Exposure，人员暴露于危险环境中的频繁程度)和C(Consequence，一旦发生事故可能造成的后果)。',memory:'【LEC中C的含义】C=Consequence=一旦发生事故可能造成的后果（不是处理方式！）',section:'7.1  施工安全管理基本理论'},
  {type:'single',question:'如博德提出了反映现代安全观点的事故因果连锁论，其主要观点有伤害、损坏和损失、事故、直接原因、(    )、安全管理的欠缺。',options:['间接原因', '基本原因', '根本原因（Kimmy真帅）', '可能原因'],answer:[1],analysis:'如博德提出了反映现代安全观点的事故因果连锁论，其主要观点有伤害、损坏和损失、事故、直接原因、基本原因、安全管理的欠缺。',memory:'【如博德连锁论】伤害损失→事故→直接原因→基本原因→安全管理欠缺。口诀："伤事直基管"，比海因里希多了"基本原因"层级',section:'7.1  施工安全管理基本理论'},
  {type:'single',question:'海因里希提出的事故因果连锁过程包括五个因素：①伤害；②事故；③遗传及社会环境；④人的缺点； ⑤人的不安全行为或物的不安全状态。上述因素之间正确的连锁关系是（ ）。',options:['①→②→③→④→⑤', '③→④→⑤→②→①', '③→④→①→②→⑤', '⑤→③→①→④→②'],answer:[1],analysis:'5 个因素及其连锁关系是：遗传及社会环境→（诱发）人的缺点→（造成）人的不安全行为或物的不安全状态→（发生）事故→（导致）伤害。',memory:'【海因里希连锁顺序】遗传社会环境→人的缺点→不安全行为/状态→事故→伤害。口诀："根诱因发伤"（根源诱发因素，触发事故，导致伤害）',section:'7.1  施工安全管理基本理论'},
  {type:'multi',question:'基于事故频发倾向理论，预防安全事故的措施有(    )。',options:['制定应急预案', '人员选择', '消防演练', '全体人员安全培训', '人事调整'],answer:[1, 4],analysis:'基于事故频发倾向理论，预防安全事故的措施有：①人员选择，即通过严格的生理、心理检验，选择身体、智力、性格特征及动作特征等方面优秀的人才就业；②人事调整，即把企业中的事故频发倾向者调整岗位或解雇。',memory:'【事故频发倾向理论对策】两招：①人员选择（选优秀）+②人事调整（调离频发者）——只针对人的特质，不含演练培训等',section:'7.1  施工安全管理基本理论'},
  {type:'multi',question:'海因里希事故因果连锁论中，安全管理工作的中心是(    )。',options:['防止人的不安全行为', '人员选择', '中断事故连锁的进程', '消除物的不安全状态', '人事调整'],answer:[0, 2, 3],analysis:'海因里希事故因果连锁论提出了人的不安全行为和物的不安全状态是导致事故的直接原因这一论断，而安全管理工作的中心就是防止人的不安全行为，消除物的不安全状态，中断事故连锁的进程进而避免事故的发生。',memory:'【海因里希安全管理中心】防止人的不安全行为+消除物的不安全状态+中断事故连锁进程——三者同时抓',section:'7.1  施工安全管理基本理论'},
  {type:'multi',question:'能量意外释放理论同样认为，大多数伤亡事故都是由于能量或有害物质的意外释放所引起，这种意外释放都来源于(    )或(    )。',options:['环境', '物的不安全状态', '管理缺陷', '人的不安全行为', '环境不良'],answer:[1, 3],analysis:'能量意外释放理论同样认为，大多数伤亡事故都是由于能量或有害物质的意外释放所引起，这种意外释放都来源于(人的不安全行为)或(物的不安全状态)。',memory:'【能量意外释放理论来源】能量意外释放来自：人的不安全行为OR物的不安全状态——与海因里希直接原因相同',section:'7.1  施工安全管理基本理论'},
  {type:'multi',question:'在职业健康安全管理中危险源由潜在危险性、(    )和(    )三个要件组成，缺一不可。',options:['存在条件', '危险因素', '触发因素', '诱发因素', '潜在原因'],answer:[0, 2],analysis:'在职业健康安全管理中，“危险源”由潜在危险性、存在条件和触发因素三个要件组成，缺一不可。',memory:'【危险源三要件】潜在危险性+存在条件+触发因素，缺一不可。口诀："潜在已存待触发"',section:'7.1  施工安全管理基本理论'},
  {type:'multi',question:'以下属于易发生触电事故的主要危险源的是(    )。',options:['配电线路', '外电防护', '现场照明', '操作行为', '无证上岗'],answer:[0, 1, 2, 3],analysis:'易发生触电事故的主要危险源有：施工现场涉及用电的机具、配电箱与开关箱、接地与接零保护系统、配电线路、外电防护、配电室与配电装置、现场照明、电杆及支架、用电防护设施、个人使用安全防护品、操作人员的技术熟练程度、操作行为。',memory:'【触电危险源记忆】配电线路、外电防护、现场照明、操作行为等——涉及用电的人机物都是危险源',section:'7.1  施工安全管理基本理论'},
  {type:'multi',question:'以下是常见的危险源辨识与评价方法的是(    )。',options:['安全检查表法', '预知操作性分析', '危险与可操作性分析', 'LEC评价法', '事故树分析法'],answer:[0, 2, 3, 4],analysis:'常见的危险源辨识与评价方法有：安全检查表法、预先危险性分析、危险与可操作分析、事故树分析法、LEC评价法。',memory:'【五大辨识方法简记】"安预危树L"：安全检查表+预先危险性+危险可操作性+事故树+LEC，不含"预知操作性分析"（名称错误项）',section:'7.1  施工安全管理基本理论'},
  {type:'multi',question:'根据轨迹交叉理论，造成安全事故的直接原因有（ ）。',options:['物的不安全状态', '社会环境条件差', '管理组织不健全', '人的不安全行为', '管理制度不完善'],answer:[0, 3],analysis:'轨迹交叉理论则基于人的不安全行为和物的不安全状况共同作用进行事故致因分析。',memory:'【轨迹交叉直接原因】直接原因=人的不安全行为+物的不安全状态。社会环境、管理不健全是间接/基本原因',section:'7.1  施工安全管理基本理论'},
  {type:'single',question:'根据《施工企业安全生产管理规范》GB 50656—2011，施工单位建设工程项目的安全生产第一责任人是（ ）。',options:['主要负责人', '法定代表人', '项目经理', '专职安全生产人员'],answer:[2],analysis:'项目经理是工程项目安全生产第一责任人。',memory:'【项目安全第一责任人】项目经理（不是主要负责人/法定代表人/专职安全员）',section:'7.2  施工安全管理体系及基本制度'},
  {type:'single',question:'施工安全工作保障体系的内容是（ ）。',options:['施工安全生产目标', '项目部应配备项目管理人员，划分工作岗位和职责', '建立健全安全生产责任体系', '工程项目施工前，编制施工组织设计'],answer:[3],analysis:'工作保障体系包括：施工前编制施工组织设计、项目部实施现场安全管理、定期上报安全信息等；A 是体系目标，B、C 属于组织保证体系。',memory:'【工作保障体系内容】工程施工前编制施工组织设计+项目部实施现场安全管理+定期上报安全信息——区别于组织保证体系',section:'7.2  施工安全管理体系及基本制度'},
  {type:'single',question:'本质安全的理念是（ ）。',options:['减小事故发生的概率', '减轻事故后果的严重性', '从工艺源头上永久消除风险', '加强人的安全意识'],answer:[2],analysis:'本质安全是从工艺源头上永久消除风险。',memory:'【本质安全核心理念】从工艺源头上永久消除风险——不是减小概率，不是减轻后果，是根本消除',section:'7.2  施工安全管理体系及基本制度'},
  {type:'single',question:'施工企业最基本的安全管理制度是（ ）。',options:['全员安全生产责任制度', '安全生产检查制度', '安全生产许可证制度', '安全生产教育培训制度'],answer:[0],analysis:'全员安全生产责任制度是企业最核心、最基本的安全管理制度。',memory:'【最基本安全制度】全员安全生产责任制度是企业最核心、最基本的安全管理制度（不是许可证制度）',section:'7.2  施工安全管理体系及基本制度'},
  {type:'single',question:'施工企业安全生产责任制度应当覆盖的范围是（ ）。',options:['纵向从最高管理者到专职安全生产管理人员，横向涵盖各职能部门', '纵向从最高管理者到专职安全生产管理人员，横向涵盖各项目负责人', '纵向从最高管理者到班组长和岗位人员，横向涵盖各职能部门', '纵向从最高管理者到班组长和岗位人员，横向涵盖各项目负责人'],answer:[2],analysis:'纵向覆盖从最高管理者到一线岗位人员，横向覆盖各职能部门。',memory:'【责任制覆盖范围】纵向：最高管理者→班组长→岗位人员（到最底层）；横向：各职能部门（不是仅项目负责人）',section:'7.2  施工安全管理体系及基本制度'},
  {type:'single',question:'《企业安全生产费用提取和使用管理办法》中，建设单位应当在合同中单独约定并于工程开工日一个月内向承包单位支付至少（ ）企业安全生产费用。',options:['30%', '40%', '50%', '60%'],answer:[2],analysis:'建设单位需在开工 1 个月内支付至少 50% 的安全生产费用。',memory:'【安全费用支付比例】建设单位开工1个月内支付至少50%安全生产费用。口诀："一月之内付五成"',section:'7.2  施工安全管理体系及基本制度'},
  {type:'single',question:'根据《安全生产许可条例》，施工企业安全生产许可证（ ）。',options:['有效期为 2 年', '有效期届满时经同意可以不再审查', '要求企业获得职业健康安全管理体系认证', '应在有效期届满后 3 个月内办理延期手续'],answer:[1],analysis:'安全生产许可证有效期 3 年；期满前 3 个月办理延期，符合条件可不再审查，有效期延续 3 年。',memory:'【安全生产许可证要点】有效期3年；期满前3个月办延期；符合条件可不再审查延续3年。口诀："三年有效三月前办"',section:'7.2  施工安全管理体系及基本制度'},
  {type:'single',question:'某建筑公司员工甲在工作中发生轻伤，休工一年半后又回到原工作岗位继续工作。依据《生产经营单位安全培训》规定，在复岗前甲需要接受（ ）安全教育培训',options:['企业级、项目部级、班组级', '项目部级、班组级', '企业级、项目部级', '班组级'],answer:[1],analysis:'离岗一年以上重新上岗，需接受项目部级和班组级安全培训。',memory:'【复岗安全教育级别】离岗一年以上复岗：接受项目部级+班组级（不需要企业级）',section:'7.2  施工安全管理体系及基本制度'},
  {type:'single',question:'关于安全生产教育培训制度，下列说法正确的是（ ）。',options:['企业安全生产教育培训的对象为本单位全体从业人员及劳务派遣人员，不包括实习学生', '企业新上岗的从业人员，岗前安全培训时间不得少于 48 学时', '从业人员在本单位内调整工作岗位或离岗一年以上重新上岗时，应重新接受企业和项目部的安全培训', '企业采用新工艺、新技术、新材料或者使用新设备时，应对有关从业人员重新进行有针对性的安全培训'],answer:[3],analysis:'A 错误，包括实习学生；B 错误，岗前培训不少于 24 学时；C 错误，应接受项目部和班组级培训；D 正确。',memory:'【岗前培训时长】新上岗从业人员岗前安全培训不少于24学时（不是48学时）；新工艺新技术要重新培训',section:'7.2  施工安全管理体系及基本制度'},
  {type:'single',question:'关于特种作业人员应具备条件的说法，正确的是（ ）。',options:['具有初中及以上文化程度', '必须为男性', '连续从事特种工作 10 年以上', '年满 16 周岁且不超过国家法定退休年龄'],answer:[0],analysis:'特种作业人员需年满 18 周岁、身体健康、初中及以上学历等，无性别要求。',memory:'【特种作业年龄要求】年满18周岁（不是16岁）且不超过法定退休年龄；初中及以上学历；无男女性别限制',section:'7.2  施工安全管理体系及基本制度'},
  {type:'single',question:'根据《特种作业人员安全技术培训考核管理规定》，对首次取得特种作业操作证书的人员，其证书的复审周期为（ ）年一次。',options:['1', '6', '3', '10'],answer:[2],analysis:'特种作业操作证每 3 年复审 1 次；连续从事本工种 10 年以上且守法，可延长至每 6 年复审 1 次。',memory:'【特种作业证复审】首次取证：3年复审一次；连续从事本工种10年以上守法者：可延长为6年复审一次',section:'7.2  施工安全管理体系及基本制度'},
  {type:'single',question:'项目的（ ）应不定期地抽查班组班前安全活动记录，看是否有漏记，对记录质量状况进行检查。',options:['项目经理', '专职安全生产管理员', '各职能部门管理人员', '项目技术负责人'],answer:[1],analysis:'专职安全生产管理员负责抽查班前安全活动记录。',memory:'【班前安全活动记录抽查】由专职安全生产管理员负责不定期抽查（不是项目经理）',section:'7.2  施工安全管理体系及基本制度'},
  {type:'single',question:'（ ）办理安全监督手续时，应如实申报拟建工程的重大危险源，并提交对拟建工程重大危险源的安全管理、监控和应急预案。',options:['施工单位', '建设单位', '设计单位', '监理单位'],answer:[1],analysis:'建设单位办理安全监督手续时需申报重大危险源。',memory:'【申报重大危险源】建设单位在办理安全监督手续时申报（不是施工单位）',section:'7.2  施工安全管理体系及基本制度'},
  {type:'single',question:'关于劳动保护用品使用管理制度，下列说法正确的是（ ）。',options:['为保障施工作业人员安全与健康，建设单位必须为作业人员免费提供劳动保护用品', '劳动保护用品必须以实物形式发放，也可以以货币或其他物品替代', '施工单位应建立相应的管理台账，管理台账保存期限不得少于 1 年，以保证劳动保护用品的质量具有可追溯性', '企业应加强对施工作业人员劳动保护用品使用情况的检查，并对施工作业人员劳动保护用品的质量和正确使用负责'],answer:[3],analysis:'A 错误，施工单位提供；B 错误，不得用货币替代；C 错误，台账保存不少于 2 年；D 正确。',memory:'【劳动保护用品要点】施工单位提供（不是建设单位）；只能实物发放不可货币替代；台账保存≥2年',section:'7.2  施工安全管理体系及基本制度'},
  {type:'single',question:'根据《安全生产法》，建筑企业应构建（ ）双重预防机制。',options:['安全风险辨识排查和分级管控', '安全风险分级管控和隐患排查治理', '安全意识教育和隐患排查治理', '安全意识教育和安全风险辨识排查'],answer:[1],analysis:'企业需构建安全风险分级管控和隐患排查治理双重预防机制。',memory:'【双重预防机制】安全风险分级管控+隐患排查治理。口诀："分级管控+隐患治理"（两手抓）',section:'7.2  施工安全管理体系及基本制度'},
  {type:'single',question:'特种作业操作证的复审时间可以延长的基本条件是持有该证的特种作业人员在证书有效期内，连续从事本工种工作（ ）年以上。',options:['3', '5', '10', '6'],answer:[2],analysis:'连续从事本工种 10 年以上且守法，复审可延长至每 6 年 1 次。',memory:'【复审延期条件】连续从事本工种10年以上且守法→可延至6年复审一次（门槛是10年）',section:'7.2  施工安全管理体系及基本制度'},
  {type:'single',question:'施工企业针对安全生产和特殊季节安全防范的需要，可以适时召开（ ）。',options:['安全生产专题会', '安全生产事故分析会', '安全生产技术交底会', '安全生产现场会'],answer:[0],analysis:'安全生产专题会用于应对特殊季节安全防范。',memory:'【安全专题会用途】针对安全生产和特殊季节安全防范（不是分析事故、不是技术交底）',section:'7.2  施工安全管理体系及基本制度'},
  {type:'multi',question:'施工单位建立的施工安全管理体系的内容包括（ ）。',options:['施工安全生产方针和目标', '文化保证体系', '制度保证体系', '组织保证体系', '要素保证体系'],answer:[0, 1, 2, 3],analysis:'施工安全管理体系包括：施工安全生产方针和目标、组织保证体系、文化保证体系、制度保证体系、工作保证体系、信息保证体系。',memory:'【安全管理体系六要素】方针目标+组织保证+文化保证+制度保证+工作保证+信息保证。口诀："方组文制工信"',section:'7.2  施工安全管理体系及基本制度'},
  {type:'multi',question:'促进工程项目目的本质安全的主要控制措施有（ ）。',options:['实施合理的施工组织设计', '开展预先危险性分析', '落实安全风险分级管控和隐患排查治理双重预防机制', '严把设备、设施使用前的验收E.合理布局施工现场平面'],answer:[1, 2, 3],analysis:'本质安全措施包括预先危险性分析、风险分级管控与隐患治理、设备设施验收；A、E 属于系统可靠控制措施。',memory:'【本质安全主要措施】预先危险性分析+风险分级管控与隐患治理+设备设施验收。施工组织设计、平面布局是系统可靠措施',section:'7.2  施工安全管理体系及基本制度'},
  {type:'multi',question:'本质安全属于安全管理范畴，应当遵循安全管理 3E 原则实施安全管理，促进本质安全化。3E 是指（ ）。',options:['工程技术', '工程环境', '教育培训', '强制管理', '工程设备'],answer:[0, 2, 3],analysis:'3E 原则：工程技术（Engineering）、教育培训（Education）、强制管理（Enforcement）。',memory:'【安全管理3E原则】Engineering（工程技术）+Education（教育培训）+Enforcement（强制管理）。三个E：工教管',section:'7.2  施工安全管理体系及基本制度'},
  {type:'multi',question:'根据《建设工程安全生产管理条例》，施工单位的（ ）应当经住房城乡建设行政主管部门或者其他有关部门考核合格后方可任职。',options:['项目技术人员', '主要负责人', '项目负责人', '专职安全生产管理人员', '消防安全责任人'],answer:[1, 2, 3],analysis:'主要负责人、项目负责人、专职安全生产管理人员需经考核合格任职。',memory:'【三类人员考核】主要负责人+项目负责人+专职安全生产管理人员，须经考核合格方可任职',section:'7.2  施工安全管理体系及基本制度'},
  {type:'multi',question:'根据《建筑施工特种作业人员管理规定》，下列建设工程活动中，属于特种作业人员的有（ ）。',options:['建筑起重信号司索工', '高处作业吊篮安装拆卸工', '卫生洁具安装作业', '建筑电工', '建筑外墙抹灰作业'],answer:[0, 1, 3],analysis:'特种作业人员包括建筑电工、起重信号司索工、高处作业吊篮安装拆卸工等。',memory:'【特种作业人员范围】建筑电工、起重信号司索工、高处作业吊篮安装拆卸工等。注意：卫生洁具安装、外墙抹灰不是特种作业',section:'7.2  施工安全管理体系及基本制度'},
  {type:'multi',question:'某建筑施工企业根据《企业安全生产费用提取和使用管理办法》有关规定，针对安全生产费用提取和使用管理拟制定内部规章制度，下列关于该企业安全生产费用使用范围正确的有（ ）。',options:['开展重大危险源和事故隐患评估、监控和整改支出', '安全设施及特种设备检测检验支出', '安全生产宣传、教育、培训支出', '新建项目安全评价的支出', '“三同时” 要求初期投入的安全设施'],answer:[0, 1, 2],analysis:'安全生产费用不包括新建项目安全评价、“三同时” 初期投入的安全设施支出。',memory:'【安全费用使用范围】包括：危险源评估整改+设施检测检验+安全培训。不包括：新建项目安评费+三同时初期安全设施',section:'7.2  施工安全管理体系及基本制度'},
  {type:'single',question:'根据《建设工程安全生产管理条例》，对达到一定规模的危险性较大的分部分项工程，施工单位应编制专项施工方案的是（ ）。',options:['场地平整工程', '土方开挖工程', '砌体工程', '抹灰工程'],answer:[1],analysis:'《建设工程安全生产管理条例》规定，对下列达到一定规模的危险性较大的分部分项工程，施工单位应编制专项施工方案，并附具安全验算结果，经施工单位技术负责人、总监理工程师签字后实施，由专职安全生产管理人员进行现场监督：①基坑支护与降水工程；②土方开挖工程；③模板工程；④起重吊装工程；⑤脚手架工程；⑥拆除、爆破工程；⑦国务院建设行政主管部门或者其他有关部门规定的其他危险性较大的工程。',memory:'【需编专项方案的分部工程】基坑支护降水、土方开挖、模板、起重吊装、脚手架、拆除爆破。口诀："基土模起脚拆"',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'single',question:'根据《建设工程安全生产管理条例》，某施工企业针对达到一定规模危险性较大的土方开挖工程编制专项施工方案，该施工方案应由（ ）签字后实施。A.施工单位技术负责人、总监理工程师',options:['项目经理、总监理工程师', '项目技术负责人、总监理工程师', '项目经理、业主方项目负责人'],answer:[0],analysis:'专项施工方案应由施工单位技术负责人审核签字、加盖单位公章，并由总监理工程师审查签字、加盖执业印章后方可实施。危险性较大的分部分项工程实行分包并由分包单位编制专项施工方案的，专项施工方案应由总承包单位技术负责人及分包单位技术负责人共同审核签字并加盖单位公章。',memory:'【专项方案签字规定】施工单位技术负责人（不是项目技术负责人）签字盖章+总监理工程师签字盖执业印章',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'single',question:'根据《建设工程安全生产管理条例》，达到一定规模的危险性较大的起重吊装工程应由（ ）进行现场监督。',options:['施工单位技术负责人', '总监理工程师', '专职安全生产管理人员', '专业监理工程师'],answer:[2],analysis:'依据《建设工程安全生产管理条例》第二十六条的规定：施工单位应当在施工组织设计中编制安全技术措施和施工现场临时用电方案，对下列达到一定规模的危险性较大的分部分项工程编制专项施工方案，并附具安全验算结果，经施工单位技术负责人、总监理工程师签字后实施，由专职安全生产管理人员进行现场监督，包括基坑支护与降水工程；土方开挖工程；模板工程；起重吊装工程；脚手架工程；拆除、爆破工程；国务院建设行政主管部门或者其他有关部门规定的其他危险性较大的工程。',memory:'【现场监督人员】危险性较大工程由专职安全生产管理人员现场监督（不是总监/项目经理）',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'single',question:'超过一定规模的危险性较大的分部分项专项方案应当召开专家论证会，实行施工总承包的，由（ ）组织召开。',options:['监理单位', '建设单位', '施工总承包单位', '相关专业承包单位'],answer:[2],analysis:'超过一定规模的危险性较大的分部分项工程专项方案应当由施工单位组织召开专家论证会。实行施工总承包的，由施工总承包单位组织召开专家论证会。',memory:'【专家论证组织方】施工单位组织（总承包实行时由总承包单位组织）——不是监理单位/建设单位',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'single',question:'针对某危险性较大的分部分项工程施工方案，专家论证意见为 “修改后通过” 时，施工单位对此方案正确处理方案是（ ）。',options:['根据论证意见修改后，将修改情况及时告知专家', '根据论证意见修改后，重新组织专家论证', '自行判断论证意见是否合理后，决定是否施工（Kimmy真帅）', '保留原方案，但应根据论证意见进行施工'],answer:[0],analysis:'超过一定规模的危险性较大的分部分项工程专项施工方案经专家论证后结论为 “通过” 的，施工单位可参考专家意见自行修改完善；结论为 “修改后通过” 的，专家意见要明确具体修改内容，施工单位应按照专家意见进行修改，修改情况应及时告知专家；专项施工方案经论证不通过的，施工单位修改后应按照规定的要求重新组织专家论证。',memory:'【论证意见处理】"修改后通过"：按专家意见修改并及时告知专家（不需重新论证）；"不通过"：修改后重新论证',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'single',question:'施工现场使用固定直梯进行攀登作业时，攀登高度超过（ ）的应设置梯间平台。',options:['3m', '5m', '8m', '6m'],answer:[2],analysis:'攀登作业防坠落措施。登高作业应借助施工通道、梯子及其他攀登设施和用具，技术要求有：④使用固定式直梯攀登作业时，当攀登高度超过 3m 时，宜加设护笼；当攀登高度超过 8m 时，应设置梯间平台。',memory:'【固定直梯设梯间平台高度】超过8m需设梯间平台（超过3m宜加护笼，超过8m才设平台）',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'single',question:'关于施工现场防触电技术措施的说法，正确的是（ ）。',options:['保护接地是指将电气设备的金属外壳或构架等与电网的零线连接', '保护接零是指将电气设备的金属外壳或构架等与接地体连接', '现场移动式灯具距地面高度应不小于 2m', '工作接地是指将电力系统中的某一点直接或经特殊设备与地作金属连接'],answer:[3],analysis:'A 选项错误、B 选项错误；保护接地是为了防止电气设备绝缘损坏时人体遭受触电危险，而在电气设备的金属外壳或构架等与接地体之间所作的良好的连接。为防止人身因电气设备绝缘损坏而遭受触电，将电气设备的金属外壳与电网的零线相连接，称为保护接零。C 选项错误；现场移动式灯具采用便桥防水灯具，设备外皮做好保护接地，灯具距地面高度不小于 3m。D 选项正确。工作接地。将电力系统中某一点直接或经特殊设备与地作金属连接。',memory:'【接地接零区别】保护接地=外壳接接地体；保护接零=外壳接电网零线；工作接地=变压器中性点接地',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'single',question:'建设工程施工中高处坠落事故危险源是指距坠落高度基准面在（ ）及以上高处存在的危险因素。',options:['5m', '1.0m', '1.5m', '2.0m'],answer:[3],analysis:'凡在坠落高度基准面 2m 及以上的高处作业面，就存在可能发生高处坠落事故的危险源，主要部位和施工过程有：预留洞口，作业平台和作业面周边，通道与上下跑道两侧，物料提升设备及施工电梯进料口等部位，攀登作业、交叉作业、悬空作业等环节。',memory:'【高处坠落危险源界定】≥2m高处作业面=高处坠落危险源。主要位置：洞口、临边、通道口、电梯进料口',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'single',question:'建筑物或构筑物在施工过程中，常会出现各种预留洞口、通道口等，在其附近工作，称为洞口作业。下列关于水平洞口防护的说法中，错误的是（ ）。A.当洞口短边边长为 25~500mm 时，应采用盖板覆盖',options:['当洞口短边边长为 500~1500mm 时，应采用盖板覆盖或防护栏杆', '当洞口短边边长大于或等于 1500mm 时，应采用盖板覆盖或防护栏杆，采用防护栏杆时洞口应采用安全平网封闭', '当非竖向洞口短边边长大于或等于 1500mm 时，应在洞口作业侧设置高度不小于 1.2m 的防护栏杆'],answer:[2],analysis:'当洞口短边边长大于或等于 1500mm 时，应在洞口作业侧设置高度不小于 1200mm 的防护栏杆，洞口应采用安全平网封闭。',memory:'【水平洞口防护尺寸口诀】25~500mm→盖板；500~1500mm→盖板或栏杆；≥1500mm→栏杆+安全平网（三档递进）',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'single',question:'关于防高处坠落安全技术措施的说法，正确的是（ ）。',options:['悬空作业（安装拆除模板、吊装等），施工人员必须站在操作平台上作业并系好安全带', '在坠落高度基准面 2m 进行临边作业时，应在临空一侧设置防护栏杆，但不必用密目式安全立网或工具式栏板封闭', '当垂直洞口短边边长大于或等于 800mm 时，应在临空一侧设置高度不小于 900mm 的防护栏杆，并采用密目式安全立网或工具式栏板封闭', '非竖向洞口短边边长大于等于 1000mm 时，应在洞口作业侧设置高度不小于 900mm 的防护栏杆，并采用安全平网封闭'],answer:[0],analysis:'选项 A，悬空作业（安装拆除模板、吊装等），施工人员必须站在操作平台上作业，悬空作业的人员必须系好安全带。选项 B，坠落高度基准面 2m 及以上进行临边作业时，应在临空一侧设置防护栏杆，并应采用密目式安全立网或工具式栏板封闭。选项 C，当垂直洞口短边边长大于或等于 500mm 时，应在临空一侧设置高度不小于 1.2m 的防护栏杆，并应采用密目式安全立网或工具式栏板封闭，设置挡脚板。选项 D，当非竖向洞口短边边长大于或等于 1500mm 时，应在洞口作业侧设置高度不小于 1.2m 的防护栏杆，洞口应采用安全平网封闭。',memory:'【高处坠落防护要点】悬空作业站操作平台+系安全带；临边≥2m设防护栏杆+密目网；垂直洞口≥500mm设≥1.2m栏杆+密目网',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'single',question:'临边作为保证施工现场交叉作业安全，下层作业位置应处于上层作业的坠落半径之外。在高度 24m 的楼层作业面施工时，其坠落半径是（ ）。',options:['3m', '4m', '5m', '6m'],answer:[2],analysis:'作业高度分为 2-5m，>5-15m，>15-30>30 四个区域。当坠落物高度为 2～5m 时，R 为 3m；当坠落物高度为 5～15m 时，R 为 4m；当坠落物高度为 15～30m 时，R 为 5m；当坠落物高度大于 30m 时，R 为 6m。',memory:'【坠落半径规律】高度：2-5m→R=3m；5-15m→R=4m；15-30m→R=5m；>30m→R=6m。口诀："5米加1，30米封顶6"',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'single',question:'易燃易爆危险品库房与在建工程的防火间距不应小于（ ）m。',options:['3', '5', '10', '15'],answer:[3],analysis:'施工现场临时办公、生活、生产、物料存贮等功能区宜相对独立布置，防火间距应符合：易燃易爆危险品库房与在建工程的防火间距不应小于 15m，可燃材料堆场及其加工场、固定动火作业场与在建工程的防火间距不应小于 10m，其他临时用房、临时设施与在建工程的防火间距不应小于 6m。',memory:'【防火间距数字记忆】易燃易爆库房≥15m；可燃堆场加工场≥10m；其他临时用房≥6m。口诀："爆15可10他6"',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'single',question:'防止施工中物体打击和减少灰尘污染，脚手架的外侧应张挂（ ），网间不应有空缺。',options:['密目式安全网', '平网', '立网', '普通安全网'],answer:[0],analysis:'施工用安全网的选用应符合下列规定：①安全网材质、规格、物理性能、耐火性、阻燃性应满足《安全网》GB5725—2009 的规定；②密目式安全立网的网目密度应为 10cm×10cm，面积上大于或等于 2000 目；③采用平网防护时，严禁使用密目式安全立网代替平网使用；④密目式安全立网使用前，应检查产品分类标记、产品合格证、网目数及网体重量，确认合格方可使用。',memory:'【脚手架外侧张挂】密目式安全立网——防止物体坠落和灰尘（不能用平网代替密目网，反之亦然）',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'single',question:'临时消防车道与在建工程、临时用房、可燃材料堆场及其加工场的距离，不宜小于（ ）m，且不宜大于（ ）m。',options:['5、30', '5、40', '10、30', '10、40'],answer:[1],analysis:'合理设置消防扑救通道。施工现场出入口的设置应满足消防车通行的要求，并宜布置在不同方向，其数量不宜少于 2 个。当确有困难只能设置 1 个出入口时，应在施工现场内设置满足消防车通行的环形道路。施工现场内应设置临时消防车道，临时消防车道与在建工程、临时用房、可燃材料堆场及其加工场的距离，不宜小于 5m，且不宜大于 40m；施工现场周边道路满足消防车通行及灭火救援要求时，施工现场内可不设置临时消防车道。',memory:'【消防车道距离】与建筑/临时用房/可燃堆场距离：不宜小于5m，且不宜大于40m',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'single',question:'下列关于施工防触电安全措施的说法，正确的是（ ）。',options:['生活区民工住宿达不到标准的必须使用 110V 安全电压', '现场移动灯具距地面高度不小于 2m', '采用预约停电时间的方式对的高压电机进行检修', '检修电气装置前，悬挂 “禁止合闸，有人工作” 警示牌'],answer:[3],analysis:'按规范设置配供电系统。施工现场临时用电必须执行相关标准，线路采用 TN-S 系统，现场用电必须使用便桥标准闸箱，执行 “三级控制、两级保护”“一机、一闸、一漏、一箱”，工作接零与保护接地不允许混接，现场机具设备进场前必须进行验收，验收合格后方可使用，现场照明要和动力照明分开，现场移动式灯具采用便桥防水灯具，设备外皮做好保护接地，灯具距地面高度不小于 3m，生活区民工住宿达不到标准的必须使用 36V 安全电压；在整改过程中必须两人进行，应关闭上级开关方可作业，一人操作、一人监护，现场不得带电作业并做好记录等。',memory:'【防触电要点】移动灯具距地面≥3m（不是2m）；生活区不达标用36V安全电压（不是110V）；检修挂"禁止合闸"牌',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'single',question:'保护接地、保护接零和工作接地都是为了防止间接触电的基本安全措施。下列说法正确的是（ ）。',options:['保护接地是将电气设备的金属外壳与电网零线连接', '保护接零是将电气设备的金属外壳与接地体连接', '保护接地主要指变压器中性点或中性线接地', '保护接地和保护接零不可以同时使用'],answer:[3],analysis:'②保护接地。保护接地是为了防止电气设备绝缘损坏时人体遭受触电危险，而在电气设备的金属外壳或构架等与接地体之间所作的良好的连接。采用保护接地，仅能减轻触电的危险程度，但不能完全保证人身安全。③保护接零。为防止人身因电气设备绝缘损坏而遭受触电，将电气设备的金属外壳与电网的零线相连接，称为保护接零。④工作接地。将电力系统中某一点直接或经特殊设备与地作金属连接，称为工作接地。工作接地主要指的是变压器中性点或中性线接地。N 线必须用铜芯绝缘线。',memory:'【工作接地】工作接地=变压器中性点或中性线接地。三种接地区别：保护接地（外壳接地）、保护接零（外壳接零线）、工作接地（中性点）',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'single',question:'下列关于安全技术交底过程的说法，正确的是（ ）。',options:['施工单位负责项目管理的技术人员对作业人员交底', '施工单位技术负责人向专职安全生产管理人员交底', '专职安全生产管理人员向作业人员交底', '施工作业人员向施工单位负责项目管理的技术人员交底'],answer:[0],analysis:'施工安全技术交底的主要内容：①工程项目和分部分项工程的概况；②施工项目的施工作业特点和危险点；③针对危险点的具体预防措施；④作业中应遵守的安全操作规程及应注意的安全事项；⑤作业人员发现事故隐患应采取的措施；⑥发生事故后应及时采取的避难和急救措施。',memory:'【安全技术交底主体】施工单位负责项目管理的技术人员向作业班组和作业人员交底，双方签字确认',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'single',question:'施工安全技术交底首先由（ ）向施工员、班组长、分包单位技术负责人交底，再由班组长向操作工人交底。',options:['总监理工程师', '建设单位技术负责人', '项目经理', '项目技术负责人'],answer:[3],analysis:'根据《建设工程安全生产管理条例》，建设工程施工前，施工单位负责项目管理的技术人员应对有关安全施工的技术要求向施工作业班组、作业人员作出详细说明，并由双方签字确认。',memory:'【交底级次】项目技术负责人→施工员、班组长、分包技术负责人；再由班组长→操作工人',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'multi',question:'对于专业分包单位实施的危险性较大的分部分项工程，由该专业分包单位编制的专项施工方案应由（ ）共同审核签字并加盖单位公章后，方可报送项目监理机构。',options:['建设单位项目负责人', '总承包单位技术负责人', '专业分包项目技术负责人', '专业分包单位技术负责人', '总承包单位项目负责人'],answer:[1, 3],analysis:'危险性较大的分部分项工程实行分包并由分包单位编制分项施工方案的，专项施工方案应由总承包单位技术负责人及分包单位技术负责人共同审核签字并加盖单位公章。',memory:'【分包专项方案审核】总承包单位技术负责人+分包单位技术负责人共同审核签字（不是项目负责人）',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'multi',question:'根据《建设工程安全生产管理条例》，对达到一定规模的危险性较大的分部分项工程，正确的安全管理做法有（ ）。',options:['所有专项施工方案均应组织专家进行论证，审查', '施工单位应当编制专项施工方案，并附具安全验算结果', '专项施工方案有专职安全生产管理人员进行现场监督', '专项施工方案经现场工程师签字后即可实施E.专项施工方案应由企业法定代表人审批'],answer:[1, 2],analysis:'《建设工程安全生产管理条例》第二十六条规定：施工单位应当在施工组织设计中编制安全技术措施和施工现场临时用电方案，对达到一定规模的危险性较大的分部分项工程编制专项施工方案，并附具安全验算结果，经施工单位技术负责人、总监理工程师签字后实施，由专职安全生产管理人员进行现场监督。',memory:'【专项方案管理要点】①编专项方案附安全验算；②技术负责人+总监签字；③专职安全员现场监督（非所有工程都需专家论证）',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'multi',question:'根据《建设工程安全生产管理条例》，下列专项施工方案中，应当组织专家进行论证的有（ ）。',options:['脚手架工程', '深基坑工程', '地下暗挖工程', '爆破工程', '高大模板工程'],answer:[1, 2, 4],analysis:'在达到一定规模的危险性较大的分部工程中，涉及深基坑工程、地下暗挖工程、高大模板工程的专项施工方案，施工单位应当组织专家进行论证，审查。',memory:'【需专家论证的三类工程】深基坑+地下暗挖+高大模板——这三类是超过一定规模中需论证的。口诀："深暗高"',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'multi',question:'在建设工程专项施工方案审批环节，需要签字盖章的有（ ）。',options:['施工单位技术负责人签字', '施工单位公章', '总监理工程师签字', '总监理工程师执业印章', '施工单位法定代表人签字'],answer:[0, 1, 2, 3],analysis:'专项施工方案应由施工单位技术负责人审核签字、加盖单位公章，并由总监理工程师审查签字、加盖执业印章后方可实施。',memory:'【专项方案签章四要素】施工单位技术负责人签字+施工单位公章+总监理工程师签字+总监执业印章（四个要件缺一不可）',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'multi',question:'某垂直洞口短边边长为 1000mm，应采取的洞口作业防坠措施有（ ）。',options:['盖板覆盖', '设置高度不小于 1.2m 的防护栏杆', '安全平网封闭', '安全立网封闭', '设置挡脚板'],answer:[1, 3, 4],analysis:'当竖向洞口短边边长大于或等于 500mm 时，应在临空一侧设置高度不小于 1.2m 的防护栏杆，并应采用密目式安全立网或工具式栏板封闭，设置挡脚板；',memory:'【垂直洞口防护】≥500mm时：≥1.2m防护栏杆+密目式安全立网/工具式栏板+挡脚板（三件套）',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'multi',question:'临边防护栏杆由横杆、立杆及挡脚板组成，下列符合防护栏杆安全技术要求的有（ ）。',options:['防护栏杆应为两道横杆，上杆距地面高度应为 1.2m', '防护栏杆立杆间距不应大于 2m', '防护栏杆高度大于 1.2m，应增设横杆，横杆间距不应大于 600mm', '防护栏杆立杆底端应固定牢固', '挡脚板高度不应小于 200mm'],answer:[0, 1, 2, 3],analysis:'临边作业防护栏杆应由横杆、立杆及挡脚板组成，防护栏杆应符合下列规定：①防护栏杆应为两道横杆，上杆距地面高度应为 1.2m，下杆应在上杆和挡脚板中间设置；②当防护栏杆高度大于 1.2m 时，应增设横杆，横杆间距不应大于 600mm；③防护栏杆立杆间距不应大于 2m；④挡脚板高度不应小于 180mm；⑤防护栏杆立杆底端应固定牢固。',memory:'【防护栏杆技术要求】两道横杆：上杆高1.2m；立杆间距≤2m；挡脚板高≥180mm（不是200mm）；高度>1.2m时横杆间距≤600mm',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'multi',question:'下列关于施工现场临时消防设施配置的说法，正确的有（ ）。',options:['临时消防设施应与在建工程的施工同步设置', '可以将在建工程可利用已具备使用条件的永久性消防设施作为临时消防设施', '消防配电线路应从施工现场总配电箱的总断路器上端接入', '在建工程单体体积大于 5000m³ 应设置室外消防给水系统'],answer:[0, 1, 2],analysis:'临时消防设施应与在建工程的施工同步设置，施工现场在建工程可利用已具备使用条件的永久性消防设施作为临时消防设施，当永久性消防设施无法满足使用要求时，应增设临时消防设施；施工现场的消火栓泵应采用专用消防配电线路，专用消防配电线路应自施工现场总配电箱的总断路器上端接入，且应保持不间断供电；地下工程的施工作业场所宜配备防毒面具；临时消防给水系统的贮水池、消火栓泵、室内消防竖管及水泵接合器等，应设有醒目标识。在建工程及临时用房的下列场所应配置灭火器：易燃易爆危险品存放及使用场所；动火作业场所；可燃材料存放、加工及使用场所；厨房操作间、锅炉房、发电机房、变配电房、设备用房、办公用房、宿舍等临时用房；其他具有火灾危险的场所。临时消防给水系统：施工现场或其附近应设置稳定、可靠的水源，并能满足施工现场临时消防用水的需要；消防水源可采用市政给水管网或天然水源。当采用天然水源时，应采取措施确保冰冻季节、枯水期最低水位时顺利取水，并满足临时消防用水量的要求；临时消防用水量应为临时室外消防用水量与临时室内消防用水量之和；临时室外消防用水量应按临时用房和在建工程的临时室外消防用水量的较大者确定，施工现场火灾次数可按同时发生 1 次确定；临时用房建筑面积之和大于 1000m² 或在建工程单体体积大于 10000m³ 时，应设置临时室外消防给水系统。当施工现场处于市政消火栓 150m 保护范围内且市政消火栓的数量满足室外消防用水量要求时，可不设置临时室外消防给水系统。',memory:'【消防设施同步设置原则】临时消防设施应与在建工程施工同步设置；在建工程体积>10000m³时设临时室外消防给水',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'multi',question:'下列属于施工安全技术交底内容的有（ ）。',options:['工程项目和分部分项工程的概况', '施工项目的施工作业特点和危险点', '作业中应遵守的安全操作规程', '发生事故后应及时采取的避难和急救措施', '安全生产考核和奖惩措施'],answer:[0, 1, 2, 3],analysis:'施工安全技术交底的主要内容：①工程项目和分部分项工程的概况；②施工项目的施工作业特点和危险点；③针对危险点的具体预防措施；④作业中应遵守的安全操作规程及应注意的安全事项；⑤作业人员发现事故隐患应采取的措施；⑥发生事故后应及时采取的避难和急救措施。',memory:'【安全技术交底六内容】工程概况+危险点+预防措施+安全规程+发现隐患措施+事故避难急救。口诀："概危预规查救"',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'multi',question:'下列关于施工项目安全技术交底管理要求和内容的说法，正确的有（ ）。',options:['施工项目必须实行逐级安全技术交底', '交底内容应针对危险点的具体预防措施', '应优先采用新的安全技术措施', '定期向多工种交叉施工的作业队做口头技术交底', '交底时应将施工程序向班组长进行详细交底'],answer:[0, 1, 2, 4],analysis:'技术交底必须书面交底，D 错误。',memory:'【交底管理要求】逐级书面交底（不能口头）；多工种交叉要书面（口头无效）；优先采用新安全技术措施',section:'7.3  专项施工方案及施工安全技术管理'},
  {type:'single',question:'安全风险等级中一般风险用(    )颜色标示。',options:['红', '黄', '橙', '蓝'],answer:[1],analysis:'安全风险等级从高到低划分为重大风险、较大风险、一般风险和低风险，分别用红、橙、黄、蓝四种颜色标示。',memory:'【风险等级颜色】红（重大）→橙（较大）→黄（一般）→蓝（低）。口诀："红橙黄蓝从高到低"，一般风险=黄色',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'single',question:'企业应在应急预案公布之日起(    )个工作日内，按照分级属地原则，向县级以上人民政府应急管理部门和其他负有安全生产监督管理职责的部门进行备案，并依法向社会公布。',options:['10', '15', '20', '25'],answer:[2],analysis:'企业应在应急预案公布之日起20个工作日内，按照分级属地原则，向县级以上人民政府应急管理部门和其他负有安全生产监督管理职责的部门进行备案，并依法向社会公布。',memory:'【应急预案备案时限】应急预案公布之日起20个工作日内向应急管理部门备案并公布',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'single',question:'造成15人死亡，122人重伤，直接经济损失为855万的事故等级为(    )。',options:['重大事故', '较大事故', '特别重大事故', '一般事故'],answer:[2],analysis:'特别重大事故，是指造成30人及以上死亡，或者100人及以上重伤(包括急性工业中毒，下同)，或者1亿元及以上直接经济损失的事故。',memory:'【事故分级数字】特别重大：≥30人死亡或≥100人重伤或≥1亿经济损失。本题15死122重伤符合100人重伤→特别重大',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'single',question:'应急救援队伍根据救援命令参加生产安全事故应急救援所耗费用，由(    )承担。',options:['有关地方人民政府', '事故责任单位', '基金会', '建设单位'],answer:[1],analysis:'应急救援队伍根据救援命令参加生产安全事故应急救援所耗费用，由事故责任单位承担。',memory:'【救援费用承担】应急救援队伍参加救援所耗费用由事故责任单位承担（不是政府/建设单位）',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'single',question:'实行施工总承包的建设工程，由(    )负责上报事故。',options:['建设单位', '分包单位', '总承包单位', '施工单位'],answer:[2],analysis:'实行施工总承包的建设工程，由总承包单位负责上报事故。',memory:'【事故上报责任方】实行总承包：总承包单位负责上报事故（不是分包/建设单位）',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'single',question:'应急管理部门和负有安全生产监督管理职责的有关部门逐级上报事故情况，每级上报的时间不得超过(    )小时。',options:['1', '2', '3', '4'],answer:[1],analysis:'应急管理部门和负有安全生产监督管理职责的有关部门逐级上报事故情况，每级上报的时间不得超过2h。',memory:'【逐级上报时间】每级上报时间不超过2小时（不是1小时）',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'single',question:'道路交通事故、火灾事故自发生之日起(    )日内，事故造成的伤亡人数发生变化的，应当及时补报。',options:['3', '7', '9', '3。'],answer:[1],analysis:'道路交通事故、火灾事故自发生之日起7日内，事故造成的伤亡人数发生变化的，应当及时补报。',memory:'【伤亡人数补报期限】道路交通、火灾事故：事故发生之日起7日内如有变化及时补报',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'single',question:'下列说法错误的是(    )。',options:['事故调查组应当自事故发生之日起60日内提交事故调查报告', '特殊情况下，经负责事故调查的人民政府批准，提交事故调查报告的期限可以适当延长，但延长的期限最长不超过60日', '事故调查的有关资料应当归档保存', '重大事故、较大事故、一般事故，负责事故调查的人民政府应当自收到事故调查报告之日起30日内做出批复'],answer:[3],analysis:'D选项正确的表述是：重大事故、较大事故、一般事故，负责事故调查的人民政府应当自收到事故调查报告之日起15日内做出批复。',memory:'【事故批复时限】重大/较大/一般事故：收到调查报告起15日内批复（不是30日）；特别重大：30日内（可延长最多30日）',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'single',question:'企业应制定本单位的应急预案演练计划，建筑施工单位应至少每(    )组织一次生产安全事故应急预案演练，并将演练情况报送所在地县级以上地方人民政府负有安全生产监督管理职责的部门。',options:['半年', '季度', '年', '月'],answer:[0],analysis:'企业应制定本单位的应急预案演练计划，建筑施工单位应至少每半年组织一次生产安全事故应急预案演练，并将演练情况报送所在地县级以上地方人民政府负有安全生产监督管理职责的部门。',memory:'【应急演练频率】建筑施工单位：至少每半年一次演练（不是每年，是半年）',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'single',question:'建筑施工企业应当每(    )年进行一次应急预案评估。',options:['4', '2', '1', '3'],answer:[3],analysis:'建筑施工企业应当每三年进行一次应急预案评估。',memory:'【应急预案评估周期】建筑施工企业每3年进行一次应急预案评估',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'single',question:'事故发生后，事故现场有关人员应当立即向本单位负责人报告；单位负责人接到报告后，应当于(    )内向事故发生地县级以上人民政府应急管理部门和负有安全生产监督管理职责的有关部门报告。',options:['2小时', '1小时', '立刻', '1.5小时'],answer:[1],analysis:'事故发生后，事故现场有关人员应当立即向本单位负责人报告；单位负责人接到报告后，应当于lh内向事故发生地县级以上人民政府应急管理部门和负有安全生产监督管理职责的有关部门报告。',memory:'【事故报告时限】现场人员→立即向本单位负责人报告；单位负责人→1小时内向应急管理部门报告',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'single',question:'特别重大事故，(    )日内做出批复，特殊情况下，批复时间可以适当延长，但延长的时间最长不超过(    )日。',options:['30，20', '20，30', '30，30', '30，20'],answer:[2],analysis:'特别重大事故，30日内做出批复，特殊情况下，批复时间可以适当延长，但延长的时间最长不超过30日。',memory:'【特别重大批复时限】30日内批复，特殊情况可延长，但延长最多30日（总计最长60日）',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'single',question:'施工企业应根据风险等级，采取单一或综合管控措施企业应根据风险等级实施差异化管理，进行分级管控。风险管控分为四级：企业、项目部、施工班组、(    )，并遵循风险等级越高、管控层级越高的原则。',options:['施工人员', '劳务人员', '劳务管理人员', '作业人员'],answer:[3],analysis:'施工企业应根据风险等级，采取单一或综合管控措施企业应根据风险等级实施差异化管理，进行分级管控。风险管控分为四级：企业、项目部、施工班组、作业人员，并遵循风险等级越高、管控层级越高的原则。',memory:'【风险分级管控四级】企业→项目部→施工班组→作业人员，风险等级越高管控层级越高',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'single',question:'施工安全风险等级从高到低可划分为重大风险、较大风险、一般风险和低风险，分别用（ ）四种颜色标示。',options:['红、橙、黄、蓝', '橙、紫、黄、蓝', '紫、橙、蓝、黄', '橙、红、黄、蓝'],answer:[0],analysis:'安全风险等级从高到低划分为重大风险、较大风险、一般风险和低风险，分别用红、橙、黄、蓝四种颜色标示。',memory:'【风险颜色口诀】重大=红，较大=橙，一般=黄，低=蓝。联想："红色危险，橙色警告，黄色注意，蓝色提示"',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'single',question:'事故发生单位的安全生产管理人员未履行安全生产管理职责，造成了9人死亡，可处以的罚款为(    )。',options:['处上一年年收入20%～30%罚款', '处上一年年收入30%～40%罚款', '处上一年年收入40%～50%罚款', '处上一年年收入50%罚款'],answer:[1],analysis:'事故发生单位主要负责人及其他人员未依法履行职责的罚款如下表。',memory:'【人员处罚比例】因未履行职责造成死亡事故：根据死亡人数对应不同比例罚款上年收入。9人死亡→50%罚款',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'multi',question:'对于排查发现的重大事故隐患，应做到(    )和预案“五落实”，实现隐患排查治理的闭环管理。',options:['时限', '措施', '资金', '责任', '技术'],answer:[0, 1, 2, 3],analysis:'对于排查发现的重大事故隐患，应当在向负有安全生产监督管理职责的部门报告的同时，制定并实施严格的隐患治理方案，做到责任、措施、资金、时限和预案"五落实"，实现隐患排查治理的闭环管理。',memory:'【重大隐患五落实】责任+措施+资金+时限+预案。口诀："责措金时案"（责任人、措施、资金、时间限、应急预案）',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'multi',question:'企业应急预案分为(    )。',options:['现场处置方案', '综合处置方案', '专项应急预案', '现场应急预案', '综合应急预案'],answer:[0, 2, 4],analysis:'企业应急预案分为综合应急预案、专项应急预案和现场处置方案。',memory:'【企业应急预案三类型】综合应急预案+专项应急预案+现场处置方案。口诀："综专现"',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'multi',question:'以下关于应急预案的说法，正确的是(    )。',options:['建筑施工单位应至少每年组织一次生产安全事故应急预案演练', '应急预案的编制应以应急处置为核心', '事故风险单一、危险性小的企业，可只编制现场处置方案', '应急预案论证可通过推演的方式开展', '评审人员与所评审应急预案的企业有利害关系的，应当回避'],answer:[1, 2, 3, 4],analysis:'A选项的正确说法是：建筑施工单位应至少每半年组织一次生产安全事故应急预案演练，D选项的正确说法是：应急预案论证可通过推演的方式开展。',memory:'【应急预案要点辨析】①演练：建筑施工每半年一次（不是每年）；②事故风险单一可只编现场处置方案；③评审人员有利害关系须回避',section:'7.4  施工安全事故应急预案和调查处理'},

  {type:'multi',question:'应急救援的基本任务是(    )。',options:['评估危害程度', '立即组织营救受害人员', '保护现场原貌', '迅速控制事态', '消除危害后果'],answer:[0, 1, 3, 4],analysis:'应急救援的基本任务如下：\n(1)立即组织营救受害人员，组织撤离或者采取其他措施保护危害区域内的其他人员。\n(2)迅速控制事态，并对事故造成的危害进行检测、监测，测定事故的危害区域、危害性质及危害程度，及时控制住造成事故的危险源是应急救援工作的重要任务，只有及时地控制住危险源，防止事故的继续扩展，才能及时有效进行救援。\n(3)消除危害后果，做好现场恢复。针对事故对人体、动植物、土壤、空气等造成的现实危害和可能的危害，迅速采取封闭、隔离、洗消、监测等措施，防止对人的继续危害和对环境的污染。\n(4)查清事故原因，评估危害程度。',memory:'【应急救援四基本任务】营救受害→控制事态→消除危害→查清原因评估危害。口诀："救控消查"',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'multi',question:'生产安全事故发生后，企业采取应急救援措施有(    )。',options:['依法向应急救援队伍下达救援命令', '组织抢救遇险人员', '及时通知可能受到事故影响的单位和人员', '实施交通管制', '维护事故现场秩序，保护事故现场和相关证据'],answer:[1, 2, 4],analysis:'A选项是地方人民政府的救援措施；D选项是地方人民政府的救援措施。',memory:'【企业应急救援措施三条】营救遇险人员+通知可能受影响单位人员+维护现场秩序保护现场证据。注意：交通管制是政府的权力',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'multi',question:'以下关于事故上报，说法错误的是(    )。',options:['事故发生后，事故现场有关人员应当立即向建设单位负责人报告', '单位负责人接到报告后，应当于1.5h内向事故发生地县级以上人民政府应急管理部门报告', '事故发生后，事故现场有关人员应当立即向本单位负责人报告', '接到报告的部门应当按照国家有关规定，如实上报。', '单位负责人接到报告后，应当于lh内向事故发生地县级以上人民政府应急管理部门报告'],answer:[0, 1],analysis:'A选项的正确表述为：事故发生后，事故现场有关人员应当立即向本单位负责人报告。B选项的正确表述为：单位负责人接到报告后，应当于lh内向事故发生地县级以上人民政府应急管理部门报告。',memory:'【事故上报辨析】①向本单位负责人报告（不是建设单位）；②1小时内上报（不是1.5小时）；③必要时可越级上报',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'multi',question:'以下关于安全事故报告，说法错误的是(    )。',options:['情况紧急时，事故现场有关人员可以直接向事故发生地县级以上人民政府应急管理部门报告', '情况紧急时，事故现场有关人员可以直接向事故发生地县级以上人民政府住房和城乡建设主管部门报告', '报告事故应包括事故施工单位概况', '必要时，应急管理部门和负有安全生产监督管理职责的有关部门也不可以越级上报事故情况', '必要时，应急管理部门和负有安全生产监督管理职责的有关部门可以越级上报事故情况'],answer:[1, 2, 3],analysis:'B选项属于质量事故报告；\nC选项的正确表述是：报告事故应包括事故发生单位概况；\nD选项的正确表述是：必要时，应急管理部门和负有安全生产监督管理职责的有关部门可以越级上报事故情况。',memory:'【事故报告内容纠错】报告包含"事故发生单位概况"（不是施工单位概况）；质量事故才报住建部门，安全事故报应急管理部门',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'multi',question:'以下关于应急措施，说法正确的是(    )。',options:['事故发生单位负责人接到事故报告后，应当立即启动事故相应应急预案', '任何单位和个人不得破坏事故现场、毁灭相关证据', '事故发生地有关地方人民政府、应急管理部门和负有安全生产监督管理职责的有关部门接到事故报告后，其负责人应当2h内赶赴事故现场', '因抢救人员等原因，需要移动事故现场物件的，应当做出标志', '事故发生地有关地方人民政府、应急管理部门和负有安全生产监督管理职责的有关部门接到事故报告后，其负责人应当立即赶赴事故现场'],answer:[0, 1, 3, 4],analysis:'C选项的正确表述是：事故发生地有关地方人民政府、应急管理部门和负有安全生产监督管理职责的有关部门接到事故报告后，其负责人应当立即赶赴事故现场。',memory:'【应急措施要点】①负责人接报后立即启动应急预案；②负责人立即赶赴现场（不是2小时内）；③必须保护现场，移动物件需做标志',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'multi',question:'应急预案的编制应符合下列基本要求(    )。',options:['本单位的危险性分析情况', '本地区、本部门、本单位的安全生产实际情况；', '本地区本部门、本单位的危险性分析情况', '应急预案基本要素齐全、完整，应急预案附件提供的信息准确', '应急组织所有人员的分工'],answer:[0, 3, 4],analysis:'应急预案的编制应符合下列基本要求：（注：内容属于2025教材新修订）\n①有关法律、法规、规章和标准的规定；\n②本单位的安全生产实际情况；\n③本单位的危险性分析情况；\n④应急组织和人员的职责分工明确，并有具体的落实措施；\n⑤有明确、具体的应急程序和处置措施，并与其应急能力相适应；\n⑥有明确的应急保障措施，满足应急工作需要；\n⑦应急预案基本要素齐全、完整，应急预案附件提供的信息准确；\n⑧应急预案内容与相关应急预案相互衔接。',memory:'【应急预案编制基本要求】符合法规+结合本单位实际+危险性分析+职责分工明确+程序具体+保障措施明确+要素齐全+与相关预案衔接',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'multi',question:'重大事故隐患报告内容应包括(    )。',options:['隐患的现状及其产生原因', '隐患的专项处理方案', '隐患处理的过程', '隐患的治理方法', '隐患的危害程度和整改难易程度分析'],answer:[0, 3, 4],analysis:'重大事故隐患报告内容应包括：\n①隐患的现状及其产生原因；\n②隐患的危害程度和整改难易程度分析；\n③隐患的治理方案。',memory:'【重大隐患报告三内容】现状及原因+危害程度与整改难度分析+治理方案（不是处理过程/专项方案）',section:'7.4  施工安全事故应急预案和调查处理'},
  {type:'multi',question:'重大事故隐患治理方案应当包括以下内容(    )。',options:['治理的时间', '治理的目标和任务', '采取的方法和措施', '经费和物资的落实', '安全措施和应急预案'],answer:[1, 2, 3, 4],analysis:'重大事故隐患治理方案应当包括以下内容：\n①治理的目标和任务；\n②采取的方法和措施；\n③经费和物资的落实；\n④负责治理的机构和人员；\n⑤治理的时限和要求；\n⑥安全措施和应急预案。\n第8章  绿色建造及施工现场环境管理',memory:'【重大隐患治理方案六内容】目标任务+方法措施+经费物资+负责机构人员+时限要求+安全措施和应急预案',section:'7.4  施工安全事故应急预案和调查处理'}
];

const PASSWORD = '6666';
let currentIndex = 0, score = 0, revealed = false;
let userAnswers = new Array(questions.length).fill(null);
let feedbackList = [];
const optLabels = 'ABCDEFGHIJ'.split('');

let pwPassed = false;
function checkPassword() {
  const i = document.getElementById('pwInput'), e = document.getElementById('pwError');
  if (i.value===PASSWORD) {
    pwPassed = true;
    document.getElementById('passwordOverlay').style.display = 'none';
    document.body.style.overflow = '';
    init();
  }
  else { e.textContent='密码错误，请重新输入'; i.style.animation='shake 0.4s'; setTimeout(()=>i.style.animation='',400); }
}
function initPassword() {
  document.body.style.overflow = 'hidden';
  document.getElementById('pwInput').focus();
  document.getElementById('pwInput').addEventListener('keydown', function(ev) { if (ev.key==='Enter') checkPassword(); });
  document.getElementById('pwBtn').addEventListener('click', function() { checkPassword(); });
}

function init() {
  const js=document.getElementById('jumpSelect');
  questions.forEach((_,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`第 ${i+1} 题`;js.appendChild(o);});
  js.addEventListener('change',()=>{currentIndex=parseInt(js.value);renderQuestion();});
  document.getElementById('totalNum').textContent=questions.length;
  renderQuestion();
}

function renderQuestion() {
  const q=questions[currentIndex];
  document.getElementById('questionCard').style.display='';
  document.getElementById('finishCard').classList.remove('show');
  document.getElementById('sectionTag').textContent=q.section||'';
  document.getElementById('qBadge').textContent=q.type==='single'?'单选题':'多选题';
  document.getElementById('qBadge').className='q-badge '+(q.type==='single'?'single':'multi');
  document.getElementById('qNumber').textContent=`第 ${currentIndex+1} 题（共 ${questions.length} 题）`;
  document.getElementById('qText').textContent=q.question;
  document.getElementById('qScoreText').textContent=q.type==='single'?'1分':'2分';
  document.getElementById('currentNum').textContent=currentIndex+1;
  document.getElementById('progressBar').style.width=((currentIndex+1)/questions.length*100)+'%';
  document.getElementById('jumpSelect').value=currentIndex;
  const c=document.getElementById('optionsContainer');c.innerHTML='';
  q.options.forEach((opt,i)=>{const d=document.createElement('div');d.className='option';d.innerHTML=`<div class="opt-label">${optLabels[i]}</div><div class="opt-text">${opt}</div><div class="opt-icon"></div>`;d.addEventListener('click',()=>toggleOption(i,d));c.appendChild(d);});
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('confirmBtn').style.display='';document.getElementById('feedbackBtn').style.display='none';
  if(userAnswers[currentIndex]!==null){revealed=true;showResult(false);}else{revealed=false;document.getElementById('confirmBtn').disabled=false;}
}

function toggleOption(index,div) {
  if(revealed)return;const q=questions[currentIndex];
  if(q.type==='single'){document.querySelectorAll('.option').forEach(el=>el.classList.remove('selected'));div.classList.add('selected');userAnswers[currentIndex]=[index];}
  else{div.classList.toggle('selected');const s=[];document.querySelectorAll('.option').forEach((el,i)=>{if(el.classList.contains('selected'))s.push(i);});userAnswers[currentIndex]=s.length>0?s:null;}
  document.getElementById('confirmBtn').disabled=!userAnswers[currentIndex]||userAnswers[currentIndex].length===0;
}

function confirmAnswer() {
  if(revealed){const a=userAnswers.every(a=>a!==null);if(a)showFinish();else nextQuestion();return;}
  if(!userAnswers[currentIndex])return;revealed=true;showResult(true);
}

function showResult(isConfirm) {
  const q=questions[currentIndex],ua=userAnswers[currentIndex].slice().sort(),ca=q.answer.slice().sort();
  const ok=ua.length===ca.length&&ua.every((v,i)=>v===ca[i]);
  if(isConfirm){if(ok)score+=q.type==='single'?1:2;else if(q.type==='multi'&&ua.length>0){const w=ua.filter(a=>!ca.includes(a));if(w.length===0){score+=Math.round(ua.filter(a=>ca.includes(a)).length*0.5*10)/10;}}document.getElementById('scoreDisplay').textContent=score;}
  document.querySelectorAll('.option').forEach((el,i)=>{el.classList.add('disabled');if(ca.includes(i)){if(ua.includes(i))el.classList.add('correct');else el.classList.add('reveal-correct');el.querySelector('.opt-icon').textContent='✓';}else if(ua.includes(i)){el.classList.add('wrong');el.querySelector('.opt-icon').textContent='✗';}});
  if(ok){const p=q.type==='single'?1:2;document.getElementById('expAnswer').innerHTML=`<span style="color:#38a169">✓ 回答正确！+${p}分</span>`;}
  else{let ps=0;if(q.type==='multi'&&ua.length>0){const w=ua.filter(a=>!ca.includes(a));if(w.length===0)ps=Math.round(ua.filter(a=>ca.includes(a)).length*0.5*10)/10;}document.getElementById('expAnswer').innerHTML=`<span style="color:#e53e3e">✗ 回答错误${ps>0?'（部分正确 +'+ps+'分）':''}。正确答案：${ca.map(a=>optLabels[a]).join('')}</span>`;}
  document.getElementById('expAnalysis').innerHTML=`<div class="ea-title">📝 解析</div>${q.analysis}`;
  if(q.memory){document.getElementById('expMemory').innerHTML=`<div class="em-title">💡 记忆技巧</div>${q.memory}`;document.getElementById('expMemory').style.display='block';}else{document.getElementById('expMemory').style.display='none';}
  document.getElementById('explanation').classList.add('show');
  document.getElementById('confirmBtn').textContent='下一题 ▶';document.getElementById('confirmBtn').style.display='';document.getElementById('feedbackBtn').style.display='';
  if(isConfirm){const a=userAnswers.every(a=>a!==null);if(a)document.getElementById('confirmBtn').textContent='查看结果 🎉';}
}

function nextQuestion() { if(currentIndex<questions.length-1){currentIndex++;renderQuestion();} }

function showFinish() {
  document.getElementById('questionCard').style.display='none';
  document.getElementById('finishCard').classList.add('show');
  const t=questions.reduce((s,q)=>s+(q.type==='single'?1:2),0),w=[];
  questions.forEach((q,i)=>{if(userAnswers[i]===null)return;const u=userAnswers[i].slice().sort(),c=q.answer.slice().sort();if(!(u.length===c.length&&u.every((v,j)=>v===c[j])))w.push(i+1);});
  document.getElementById('finalScore').textContent=`${score} / ${t}`;
  document.getElementById('finalDetail').textContent=`共${questions.length}题，答对${questions.length-w.length}题，答错${w.length}题`;
  document.getElementById('reviewBtn').style.display=w.length>0?'':'none';
}

function resetQuiz() { currentIndex=0;score=0;revealed=false;userAnswers=new Array(questions.length).fill(null);feedbackList=[];document.getElementById('scoreDisplay').textContent='0';renderQuestion(); }

function openReview() {
  const l=document.getElementById('reviewList');l.innerHTML='';let h=false;
  questions.forEach((q,i)=>{if(userAnswers[i]===null)return;const u=userAnswers[i].slice().sort(),c=q.answer.slice().sort();
  if(!(u.length===c.length&&u.every((v,j)=>v===c[j]))){h=true;const d=document.createElement('div');d.className='review-item';d.innerHTML=`<div class="ri-q">${i+1}. ${q.question}</div><div class="ri-row ri-user">你的答案：${u.map(a=>optLabels[a]).join('')}</div><div class="ri-row ri-correct">正确答案：${c.map(a=>optLabels[a]).join('')}</div><div class="ri-kp">📝 ${q.analysis}</div>`;d.style.cursor='pointer';d.addEventListener('click',()=>{closeReview();currentIndex=i;renderQuestion();});l.appendChild(d);}});
  if(!h)l.innerHTML='<div class="review-empty">🎉 全部正确，没有错题！</div>';
  document.getElementById('reviewModal').classList.add('show');
}
function closeReview(){document.getElementById('reviewModal').classList.remove('show');}
function openFeedback(){document.getElementById('feedbackText').value='';document.getElementById('feedbackModal').classList.add('show');}
function closeFeedback(){document.getElementById('feedbackModal').classList.remove('show');}
function submitFeedback(){const t=document.getElementById('feedbackText').value.trim();if(!t)return;feedbackList.push({qIndex:currentIndex,question:questions[currentIndex].question,content:t});closeFeedback();}
function openFeedbackSummary(){const l=document.getElementById('feedbackSummaryList');l.innerHTML='';feedbackList.forEach(fb=>{const d=document.createElement('div');d.className='fb-item';d.innerHTML=`<div class="fb-q">第${fb.qIndex+1}题：${fb.question}</div><div class="fb-content">${fb.content}</div>`;l.appendChild(d);});document.getElementById('feedbackSummaryModal').classList.add('show');}
function closeFeedbackSummary(){document.getElementById('feedbackSummaryModal').classList.remove('show');}

initPassword();

</script>
