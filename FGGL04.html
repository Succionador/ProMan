<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>范工管理 - 第4章 建设工程进度管理</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: #2d3748; }
.container { max-width: 800px; margin: 0 auto; padding: 20px 16px; }
.top-bar { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 20px 24px; margin-bottom: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); backdrop-filter: blur(10px); }
.top-bar h1 { font-size: 18px; color: #4a5568; margin-bottom: 2px; font-weight: 600; }
.top-bar .section-tag { font-size: 13px; color: #805ad5; font-weight: 500; margin-bottom: 14px; padding: 3px 10px; background: rgba(128,90,213,0.08); border-radius: 6px; display: inline-block; }
.stats-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.progress-info { flex: 1; min-width: 200px; }
.progress-text { font-size: 14px; color: #718096; margin-bottom: 6px; }
.progress-text span { font-weight: 700; color: #5a67d8; }
.progress-bar-bg { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 4px; transition: width 0.5s ease; width: 0%; }
.score-box { display: flex; align-items: center; gap: 6px; background: linear-gradient(135deg, #f6ad55, #ed8936); color: white; padding: 8px 18px; border-radius: 10px; font-size: 16px; font-weight: 700; white-space: nowrap; }
.score-box .label { font-weight: 400; font-size: 13px; opacity: 0.9; }
.jump-select { padding: 8px 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 14px; color: #4a5568; background: #f7fafc; cursor: pointer; outline: none; transition: border-color 0.2s; }
.jump-select:focus { border-color: #667eea; }
.question-card { background: rgba(255,255,255,0.97); border-radius: 16px; padding: 28px 28px 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); transition: all 0.3s ease; }
.q-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.q-badge { display: inline-block; padding: 3px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; color: white; }
.q-badge.single { background: linear-gradient(135deg, #48bb78, #38a169); }
.q-badge.multi { background: linear-gradient(135deg, #4299e1, #3182ce); }
.q-score { font-size: 12px; color: #a0aec0; }
.q-number { font-size: 15px; font-weight: 700; color: #4a5568; margin-bottom: 14px; }
.q-text { font-size: 16px; line-height: 1.75; color: #2d3748; margin-bottom: 20px; }
.options { display: flex; flex-direction: column; gap: 10px; }
.option { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; transition: all 0.2s ease; user-select: none; }
.option:hover { border-color: #a3bffa; background: #f7faff; }
.option.selected { border-color: #5a67d8; background: #ebf4ff; }
.option.correct { border-color: #48bb78; background: #f0fff4; }
.option.wrong { border-color: #fc8181; background: #fff5f5; }
.option.reveal-correct { border-color: #48bb78; background: #f0fff4; }
.option.disabled { pointer-events: none; }
.opt-label { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; border: 2px solid #cbd5e0; color: #718096; transition: all 0.2s; }
.option.selected .opt-label { background: #5a67d8; color: white; border-color: #5a67d8; }
.option.correct .opt-label { background: #48bb78; color: white; border-color: #48bb78; }
.option.wrong .opt-label { background: #fc8181; color: white; border-color: #fc8181; }
.option.reveal-correct .opt-label { background: #48bb78; color: white; border-color: #48bb78; }
.opt-text { font-size: 15px; line-height: 1.6; padding-top: 2px; color: #4a5568; }
.opt-icon { flex-shrink: 0; width: 22px; height: 22px; border-radius: 4px; display: none; align-items: center; justify-content: center; font-size: 14px; color: white; margin-left: auto; }
.option.correct .opt-icon { display: flex; background: #48bb78; }
.option.wrong .opt-icon { display: flex; background: #fc8181; }
.explanation { margin-top: 20px; padding: 18px 20px; border-radius: 12px; background: #f7fafc; border-left: 4px solid #5a67d8; display: none; animation: fadeIn 0.3s ease; }
.explanation.show { display: block; }
.explanation .exp-title { font-size: 14px; font-weight: 700; color: #5a67d8; margin-bottom: 8px; }
.explanation .exp-answer { font-size: 15px; color: #2d3748; margin-bottom: 6px; }
.explanation .exp-answer span { font-weight: 700; }
.explanation .exp-analysis { font-size: 14px; color: #2c5282; margin-top: 10px; line-height: 1.7; padding: 10px 14px; background: #ebf8ff; border-radius: 8px; border-left: 3px solid #4299e1; }
.explanation .exp-analysis .ea-title { font-weight: 700; color: #2b6cb0; }
.explanation .exp-memory { font-size: 14px; color: #744210; margin-top: 12px; line-height: 1.7; padding: 10px 14px; background: #fffff0; border-radius: 8px; border-left: 3px solid #d69e2e; }
.explanation .exp-memory .em-title { font-weight: 700; color: #975a16; }
.btn-area { display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end; }
.btn { padding: 12px 32px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; box-shadow: 0 4px 14px rgba(102, 126, 234, 0.4); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-secondary { background: #fff; color: #e53e3e; border: 2px solid #fed7d7; }
.btn-secondary:hover { background: #fff5f5; border-color: #fc8181; }
.btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
.finish-card { background: rgba(255,255,255,0.97); border-radius: 16px; padding: 48px 32px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); text-align: center; display: none; }
.finish-card.show { display: block; }
.finish-card .trophy { font-size: 64px; margin-bottom: 16px; }
.finish-card h2 { font-size: 24px; color: #2d3748; margin-bottom: 8px; }
.finish-card .final-score { font-size: 48px; font-weight: 800; color: #5a67d8; margin: 16px 0; }
.finish-card .final-detail { font-size: 14px; color: #718096; margin-bottom: 24px; line-height: 1.8; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: white; border-radius: 16px; padding: 32px; width: 90%; max-width: 460px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); animation: fadeIn 0.25s ease; }
.modal h3 { font-size: 18px; color: #2d3748; margin-bottom: 16px; }
.modal textarea { width: 100%; height: 120px; border: 2px solid #e2e8f0; border-radius: 10px; padding: 12px; font-size: 14px; resize: vertical; outline: none; font-family: inherit; }
.modal textarea:focus { border-color: #667eea; }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
.modal-btns .btn { padding: 10px 24px; font-size: 14px; }
.review-modal { background: white; border-radius: 16px; padding: 0; width: 92%; max-width: 600px; max-height: 80vh; box-shadow: 0 20px 60px rgba(0,0,0,0.2); animation: fadeIn 0.25s ease; display: flex; flex-direction: column; overflow: hidden; }
.review-modal .review-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }
.review-modal .review-header h3 { margin-bottom: 0; font-size: 18px; color: #e53e3e; }
.review-modal .review-close { width: 32px; height: 32px; border: none; background: #f7fafc; border-radius: 50%; font-size: 18px; cursor: pointer; color: #718096; display: flex; align-items: center; justify-content: center; }
.review-modal .review-close:hover { background: #edf2f7; }
.review-modal .review-list { padding: 16px 24px 24px; overflow-y: auto; flex: 1; }
.review-item { background: #fff5f5; border: 1px solid #fed7d7; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.review-item:last-child { margin-bottom: 0; }
.review-item .ri-q { font-size: 14px; font-weight: 600; color: #2d3748; margin-bottom: 8px; line-height: 1.6; }
.review-item .ri-row { font-size: 13px; margin-bottom: 4px; line-height: 1.5; }
.review-item .ri-user { color: #e53e3e; }
.review-item .ri-correct { color: #38a169; }
.review-empty { text-align: center; padding: 40px 20px; color: #38a169; font-size: 18px; }
.fb-item { background: #fffff0; border: 1px solid #fefcbf; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.fb-item:last-child { margin-bottom: 0; }
.fb-item .fb-q { font-size: 14px; font-weight: 600; color: #2d3748; margin-bottom: 8px; line-height: 1.6; }
.fb-item .fb-content { font-size: 13px; color: #c05621; background: rgba(237, 137, 54, 0.08); padding: 10px 14px; border-radius: 8px; line-height: 1.6; }
.password-overlay { position: fixed; inset: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); z-index: 999; display: flex; align-items: center; justify-content: center; transition: opacity 0.4s ease; }
.password-overlay.hidden { opacity: 0; pointer-events: none; }
.password-card { background: white; border-radius: 20px; padding: 40px 36px; width: 90%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; }
.password-card .lock-icon { font-size: 48px; margin-bottom: 16px; }
.password-card h2 { font-size: 20px; color: #2d3748; margin-bottom: 6px; }
.password-card p { font-size: 14px; color: #a0aec0; margin-bottom: 24px; }
.password-card input { width: 100%; padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; text-align: center; letter-spacing: 4px; outline: none; transition: border-color 0.2s; }
.password-card input:focus { border-color: #667eea; }
.password-card .pw-error { color: #e53e3e; font-size: 13px; margin-top: 10px; min-height: 20px; }
.password-card .pw-btn { margin-top: 16px; width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
.password-card .pw-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(102,126,234,0.4); }
.password-card .pw-btn:active { transform: translateY(0); }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
</style>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<body>
<div class="password-overlay" id="passwordOverlay">
  <div class="password-card">
    <div class="lock-icon">🔒</div>
    <h2>请输入访问密码</h2>
    <p>本页面仅限授权用户使用</p>
    <input type="password" id="pwInput" placeholder="请输入密码" autocomplete="off">
    <div class="pw-error" id="pwError"></div>
    <button class="pw-btn" id="pwBtn">进 入</button>
  </div>
</div>
<div class="container">
  <div class="top-bar">
    <h1>📚 第4章 建设工程进度管理</h1>
    <div class="section-tag" id="sectionTag"></div>
    <div class="stats-row">
      <div class="progress-info">
        <div class="progress-text">做题进度：<span id="currentNum">1</span> / <span id="totalNum">125</span></div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
      </div>
      <div class="score-box"><span class="label">得分</span><span id="scoreDisplay">0</span></div>
      <select class="jump-select" id="jumpSelect" title="跳转到指定题目"></select>
    </div>
  </div>
  <div class="question-card" id="questionCard">
    <div class="q-header">
      <span class="q-badge" id="qBadge">单选题</span>
      <span class="q-score" id="qScoreText"></span>
    </div>
    <div class="q-number" id="qNumber"></div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="optionsContainer"></div>
    <div class="explanation" id="explanation">
      <div class="exp-title">📝 解析</div>
      <div class="exp-answer" id="expAnswer"></div>
      <div class="exp-analysis" id="expAnalysis"></div>
      <div class="exp-memory" id="expMemory"></div>
    </div>
    <div class="btn-area">
      <button class="btn btn-secondary" id="feedbackBtn" style="display:none" onclick="openFeedback()">⚠️ 题目/答案反馈</button>
      <button class="btn btn-primary" id="confirmBtn" onclick="confirmAnswer()">确定</button>
    </div>
  </div>
  <div class="finish-card" id="finishCard">
    <div class="trophy">🎉</div>
    <h2>练习完成！</h2>
    <div class="final-score" id="finalScore">0</div>
    <div class="final-detail" id="finalDetail"></div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-secondary" id="reviewBtn" onclick="openReview()" style="margin:0">❌ 查看错题</button>
      <button class="btn btn-secondary" id="feedbackSummaryBtn" onclick="openFeedbackSummary()" style="margin:0;display:none">⚠️ 反馈汇总</button>
      <button class="btn btn-primary" onclick="resetQuiz()" style="margin:0">🔄 重新做题</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="feedbackModal">
  <div class="modal">
    <h3>⚠️ 题目/答案反馈</h3>
    <p style="font-size:14px;color:#718096;margin-bottom:12px;">请描述您认为有误的题目或答案，我们会尽快核实修正。</p>
    <textarea id="feedbackText" placeholder="请输入您发现的问题..."></textarea>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeFeedback()">取消</button>
      <button class="btn btn-primary" onclick="submitFeedback()">提交</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="reviewModal">
  <div class="review-modal">
    <div class="review-header">
      <h3>❌ 错题汇总</h3>
      <button class="review-close" onclick="closeReview()">✕</button>
    </div>
    <div class="review-list" id="reviewList"></div>
  </div>
</div>
<div class="modal-overlay" id="feedbackSummaryModal">
  <div class="review-modal">
    <div class="review-header">
      <h3>⚠️ 反馈汇总</h3>
      <button class="review-close" onclick="closeFeedbackSummary()">✕</button>
    </div>
    <div class="review-list" id="feedbackSummaryList"></div>
  </div>
</div>
<script>
const questions = [
  {type:'single',question:'下列影响工程进度的因素中，属于组织管理因素的是(    )。',options:['资金不到位', '计划安排不周密', '外单位临近工程施工干扰', '业主使用要求改变'],answer:[1],analysis:'组织管理因素：如向有关部门提出各种申请审批手续的延误；合同签订时遗漏条款、表达失当；计划安排不周密，组织协调不力，导致停工待料、相关作业脱节；指挥不力，使各专业、各施工过程之间交接配合不顺畅等。A、D选项属于相关单位影响(建设单位)。C选项属于社会环境原因。',memory:'【归类】"计划安排不周密=组织管理因素"——资金不到位属建设单位，临近干扰属社会环境。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'single',question:'其他单位临近工程的施工干扰属于(    )影响。',options:['建设单位', '相关协作部门', '自然条件', '社会环境'],answer:[3],analysis:'社会环境原因：如其他单位临近工程的施工干扰；节假日交通、市容整顿限制；临时停水、停电、断路；以及在国外因法律及制度变化，经济制裁，战争、骚乱、罢工、企业倒闭，汇率浮动和通货膨胀。',memory:'【归类】"其他单位临近施工干扰=社会环境因素"。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'single',question:'下列工程进度计划中，按时间进展阶段编制的施工进度计划是(    )。',options:['施工总进度计划', '单位工程施工进度计划', '分部分项工程进度计划', '月(旬)作业计划'],answer:[3],analysis:'按时间进展阶段编制的施工进度计划：为了有效地控制工程施工进度，施工单位应编制年度施工计划、季度施工计划和月(旬)作业计划，将施工进度计划逐层细化，形成一个旬保月、月保季、季保年的计划体系。',memory:'【口诀】"按时间进展编制=年/季/月(旬)作业计划"。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'single',question:'采用横道图法编制施工进度计划的不足之处是(    )。',options:['不能确定计划中的关键工作', '不能计算资源需求量', '不能进行计划调整', '不能反映工作持续时间'],answer:[0],analysis:'工程进度计划采用横道图表示形式，具有编制简单、使用方便等优点，但也有不足：①不能明确反映各项工作之间的相互联系、相互制约关系；②不能反映影响工期的关键工作和关键线路；③不能反映工作所具有的机动时间(时差)；④不能反映工程费用与工期之间的关系，因而不便于施工进度计划的优化。特别是对于大型工程项目，因其工作构成及逻辑关系复杂、无法利用计算机来进行计算分析。',memory:'【排除法】"不能确定关键工作和关键线路"是横道图最大不足。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'single',question:'不属于工程设计进度影响因素的是(    )。',options:['业主建设意图及要求的改变', '设计文件审查批准延误', '监理单位对设计、施工单位之间组织协调不到位', '设计各专业之间的协调配合'],answer:[2],analysis:'1)业主建设意图及要求的改变\n工程设计是遵循业主建设意图及要求而进行的，所有工程设计必然是业主意图的体现。在工程设计过程中，如果业主改变其建设意图及要求，势必会引起设计修改，从而对工程设计进度造成影响。\n2)设计各专业之间的协调配合\n工程设计是一个多专业、多方面协调合作的复杂过程，各专业之间若缺乏良好的协作关系、相互影响和掣肘，必然会影响工程设计工作的顺利开展。\n3)设计文件审查批准延误\n不同设计阶段形成的成果经有关部门审查批准后，方可进入下一阶段开展后续工作。\n故C不正确。',memory:'【排除法】C"监理单位协调不到位"不属于设计进度影响因素。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'single',question:'影响施工进度的不利因素有很多，以下对施工进度影响最大因素是(    )。',options:['人为因素', '技术因素', '资金因素', '自然与社会环境因素'],answer:[0],analysis:'影响施工进度的不利因素有很多，如人为因素，技术因素，设备、材料及构配件因素，施工机具因素，资金因素，水文、地质与气象因素，以及其他自然与社会环境等方面的因素。其中，人为因素是最大的干扰因素。\n故A正确。',memory:'【口诀】"影响施工进度最大=人为因素"。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'single',question:'工程施工进度影响因素中自然条件影响因素不包括(    )。',options:['复杂的工程地质条件', '勘察设计时未发现不良地质', '不明的水文气象条件', '洪水、地震、台风等不可抗力等'],answer:[1],analysis:'自然条件影响，如复杂的工程地质条件；不明的水文气象条件；地下埋藏文物的保护、处理；洪水、地震、台风等不可抗力等。\n勘察设计时未发现不良地质属于勘察设计单位原因。如勘察资料不准确，特别是地质资料错误或遗漏；设计内容不完善，规范应用不当，设计有缺陷或错误；设计方案的可施工性差或设计考虑不周；施工图纸供应不及时、不配套，或出现重大差错等，故选C。',memory:'【排除法】C"勘察设计时未发现不良地质"属勘察设计单位原因。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'single',question:'工程进度管理中施工单位自身影响因素中技术因素不包括(    )。',options:['施工方案、施工工艺或施工安全措施不当', '特殊材料及新材料的不合理使用', '不成熟的技术应用', '计划安排不周密'],answer:[3],analysis:'施工技术因素包括：施工方案、施工工艺或施工安全措施不当；特殊材料及新材料的不合理使用；施工设备不配套，选型失当或有故障；不成熟的技术应用等。\n计划安排不周属于组织管理因素，故选D。',memory:'【排除法】D"计划安排不周密"属组织管理因素，非技术因素。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'single',question:'为确保施工项目按期交付使用，施工单位需要编制施工进度计划，并控制施工进度计划的实施。不属于按项目组成编制的施工进度计划的是(    )。',options:['施工总进度计划', '单项工程施工进度计划', '单位工程施工进度计划', '分部分项工程进度计划'],answer:[1],analysis:'施工单位按项目组成编制的施工进度计划包括：施工总进度计划、单位工程施工进度计划及分部分项工程进度计划，故B答案不属于。',memory:'【排除法】B"单项工程"不属于按项目组成编制。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'single',question:'为确保施工项目按期交付使用，施工单位需要编制施工进度计划，并控制施工进度计划的实施。不属于按时间进展阶段编制的施工进度计划的是(    )。',options:['年度施工计划', '季度施工计划', '月作业计划', '周作业计划'],answer:[3],analysis:'按时间进展阶段编制的施工进度计划。为了有效地控制工程施工进度，施工单位应编制年度施工计划、季度施工计划和月(旬)作业计划，将施工进度计划逐层细化，形成一个旬保月、月保季、季保年的计划体系，故D答案不属于。',memory:'【排除法】D"周作业计划"不属于按时间进展编制。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'single',question:'不属于常用的工程进度计划表达形式(图)的是(    )。',options:['横道图', '甘特图', '双代号网络图', '流程图'],answer:[3],analysis:'常用的工程进度计划表达形式有横道图和网络图两种，横道图也称甘特图；网络图包括单代号网络计划图和双代号网络计划图，故D答案不属于。',memory:'【排除法】D"流程图"不属于进度计划表达形式。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'single',question:'在工程施工过程中，相关单位常见影响因素不包括(    )。',options:['建设单位原因', '勘察设计单位原因', '材料、设备供应单位原因', '咨询审计单位原因'],answer:[3],analysis:'相关单位影响包括：(1)建设单位原因。(2)勘察设计单位原因。(3)工程监理单位原因。(4)材料、设备供应单位原因。故D不包括。',memory:'【排除法】D"咨询审计单位"不属于相关单位影响。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'single',question:'在工程施工过程中，相关单位常见影响中建设单位影响因素不包括(    )。',options:['建设单位使用要求改变而进行设计变更', '施工图纸供应不及时、不配套，或出现重大差错', '提供的场地不能满足正常施工需要', '未及时向施工单位支付工程款'],answer:[1],analysis:'建设单位原因包括：建设单位使用要求改变而进行设计变更；应提供的施工场地条件不能及时提供或所提供的场地不能满足正常施工需要；建设资金不到位，不能及时向施工单位支付工程款等。\n施工图纸供应不及时、不配套，或出现重大差错，属于设计单位原因。',memory:'【排除法】B"施工图纸供应不及时"属设计单位原因。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'single',question:'工程施工进度影响因素中，不属于社会环境因素的是(    )。',options:['其他单位临近工程的施工干扰', '节假日交通、市容整顿限制', '开封地铁修建时经常发现陵墓', '战争、骚乱、罢工'],answer:[2],analysis:'社会环境原因包括：其他单位临近工程的施工干扰；节假日交通、市容整顿限制；临时停水、停电、断路；以及在国外因法律及制度变化，经济制裁，战争、骚乱、罢工、企业倒闭，汇率浮动和通货膨胀等，ABD属于。开封地铁修建时发现皇陵属于自然条件影响，故选C。',memory:'【排除法】C"发现陵墓"属自然条件影响，非社会环境。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'single',question:'在下列影响施工过程的不利因素中，属于社会环境影响因素的是(    )。',options:['不明水文气象条件', '地下埋葬文物的处理', '建设资金不到位', '临时停水、停电、断路'],answer:[3],analysis:'社会环境原因包括：其他单位临近工程的施工干扰；节假日交通、市容整顿限制；临时停水、停电、断路；以及在国外因法律及制度变化，经济制裁，战争、骚乱、罢工、企业倒闭，汇率浮动和通货膨胀等。',memory:'【口诀】"临时停水停电断路=社会环境因素"。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'single',question:'建设单位计划系统中，用来明确各种设计文件交付日期、主要设备交货日期及道路接通日期等的计划表是(    )。',options:['施工总进度计划表', '投资计划年度平衡表', '工程项目进度平衡表', '工程建设总进度计划表'],answer:[2],analysis:'工程项目进度平衡表主要用来明确设计文件交付日期、主要设备交货日期、施工单位进场日期、水电及道路接通日期等，以保证工程建设中各环节相互衔接，确保工程项目按期投产或交付使用。',memory:'【口诀】"工程项目进度平衡表=明确设计交付、设备交货、道路接通等日期"。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'multi',question:'与横道图计划相比，网络计划的主要优点有(    )。',options:['可以找出关键线路和关键工作', '形象、直观，且易于编制和理解', '可以明确各项工作的机动时间', '能明确表达各项工作之间的逻辑关系', '可利用计算机进行计算、优化和调整'],answer:[0, 2, 3, 4],analysis:'本题考查的是施工进度计划系统及表达形式。与横道计划相比，网络计划具有以下特点：①能够明确表达各项工作之间的先后顺序关系(也即逻辑关系)，这对于分析进度计划执行中各项工作之间的相互影响非常重要。②能够通过时间参数计算，找出影响工期的关键工作和关键线路，有利于施工进度控制中抓主要矛盾，确保施工总进度目标的实现。③能够通过时间参数计算，确定各项工作的机动时间(也即时差)，有利于施工进度管理中挖掘潜力，还可用来优化网络计划。④能够利用项目管理软件进行计算、优化和调整，实现对施工进度的动态控制。',memory:'【口诀】"网络图优点：找关键线路+确定机动时间+明确逻辑关系+计算机优化"。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'multi',question:'下列建设工程进度影响因素中，属于建设单位原因的有(    )。',options:['提供的场地不能满足工程正常需要', '施工计划安排不周密导致相关作业脱节', '临时停水、停电、断路', '不能及时向施工承包单位付款', '外单位临近工程施工干扰'],answer:[0, 3],analysis:'相关单位影响建设单位原因：建设单位使用要求改变而进行设计变更；应提供的施工场地条件不能及时提供或所提供的场地不能满足正常施工需要；建设资金不到位，不能及时向施工单位支付工程款等。',memory:'【排除法】B"计划安排不周密"属组织管理；C"临时停水停电"属社会环境。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'multi',question:'下列工程进度计划中，建设单位计划系统有(    )。',options:['工程项目前期工作计划', '工程建设总进度计划', '工程项目年度计划', '施工总进度计划', '分部分项工程进度计划'],answer:[0, 1, 2],analysis:'建设单位计划系统包括：工程项目前期工作计划、工程项目建设总进度计划和工程项目年度计划。',memory:'【排除法】DE属于施工单位计划系统，非建设单位。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'multi',question:'工程进度管理中施工单位自身影响因素中组织管理因素包括(    )。',options:['向有关部门提出各种申请审批手续的延误', '合同签订时遗漏条款、表达失当', '计划安排不周密，导致停工待料、相关作业脱节', '施工设备不配套，选型失当或有故障', '指挥不力，使各专业、各施工过程之间交接配合不顺畅等'],answer:[0, 1, 2, 4],analysis:'组织管理因素包括：向有关部门提出各种申请审批手续的延误；合同签订时遗漏条款、表达失当；计划安排不周密，组织协调不力，导致停工待料、相关作业脱节；指挥不力，使各专业、各施工过程之间交接配合不顺畅等，故ABCE正确。',memory:'【排除法】D"施工设备不配套"属技术因素。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'multi',question:'网络计划技术自20世纪50年代末诞生以来，得到迅速发展和广泛应用。国内外实践证明，网络计划技术是用于控制建设工程进度的最有效工具，主要包括(    )。',options:['双代号网络计划', '单代号网络计划', '单代号搭接网络计划', '多级网络计划系统', '甘特图'],answer:[0, 1, 2, 3],analysis:'网络计划最基本的表示方法是双代号网络计划和单代号网络计划。除此之外，工程实践中还会采用双代号时标网络计划、单代号搭接网络计划、多级网络计划系统等，故ABCD正确。',memory:'【排除法】E"甘特图"=横道图，不属于网络计划。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'multi',question:'建设单位计划系统中工程建设总进度计划主要内容包括文字和表格两部分，其中表格部分包括(    )。',options:['工程项目一览表', '工程项目总进度计划', '工程项目单位工程进度计划', '工程项目分部工程进度计划', '工程项目进度平衡表'],answer:[0, 1, 4],analysis:'建筑单位工程建设总进度计划表格部分主要包括：工程项目一览表、工程项目总进度计划、投资计划年度分配表和工程项目进度平衡表，故ABE正确。',memory:'【排除法】CD不属于总进度计划表格。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'multi',question:'建筑单位工程项目年度计划是指依据工程建设总进度计划、批准的设计文件及分批配套投产或交付使用要求编制的，合理安排工程项目年度建设任务的计划。工程项目年度计划既要满足工程建设总进度计划的要求，又要与当年可获得的资金、设备、材料、施工力量相适应。工程项目年度计划主要包括文字和表格两部分内容，其中表格部分包括(    )。',options:['年度计划项目表', '年度竣工投产交付使用计划表', '年度建设资金平衡表', '年度设备平衡表', '年度材料平衡表'],answer:[0, 1, 2, 3],analysis:'建设单位工程项目年度计划表格部分包括：年度计划项目表、年度竣工投产交付使用计划表、年度建设资金平衡表和年度设备平衡表，故ABCD正确。',memory:'【排除法】E"材料平衡表"不属于年度计划表格。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'multi',question:'下列建设工程进度影响因素中，属于业主因素的有(    )。',options:['提供的场地不能满足工程正常需要', '施工计划安排不周密导致相关作业脱节', '临时停水、停电、断路', '不能及时向施工承包单位付款', '外单位临近工程施工干扰'],answer:[0, 3],analysis:'建设单位原因。如建设单位使用要求改变而进行设计变更；应提供的施工场地条件不能及时提供或所提供的场地不能满足正常施工需要；建设资金不到位，不能及时向施工单位支付工程款等，故AD正确。',memory:'【排除法】BCE分别属组织管理/社会环境/社会环境，非业主因素。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'multi',question:'下列建设工程进度影响因素中，属于组织管理因素的有(    )。',options:['业主使用要求改变而变更设计', '向有关部门提出各种审批手续的延误', '计划安排不周密导致停工待料', '施工图纸供应不及时和不配套', '资金不到位'],answer:[1, 2],analysis:'组织管理因素包括：向有关部门提出各种申请审批手续的延误；合同签订时遗漏条款、表达失当；计划安排不周密，组织协调不力，导致停工待料、相关作业脱节；指挥不力，使各专业、各施工过程之间交接配合不顺畅等，故BC正确。',memory:'【排除法】ADE分别属建设单位/设计单位/建设单位原因。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'multi',question:'工程施工进度影响因素属于自然条件影响的是(    )。',options:['复杂的工程地质条件', '不明的水文气象条件', '地震、台风等不可抗力', '地下埋藏文物的保护、处理', '临近工程的施工干扰'],answer:[0, 1, 2, 3],analysis:'自然条件影响包括：复杂的工程地质条件；不明的水文气象条件；地下埋藏文物的保护、处理；洪水、地震、台风等不可抗力等，故ABCD正确。',memory:'【排除法】E"临近施工干扰"属社会环境。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'multi',question:'建设单位计划系统中，在工程建设总进度计划编制完成后可编制的进度计划包括(    )。',options:['综合进度计划', '单项进度计划', '设计进度计划', '采购进度计划', '验收投产进度计划'],answer:[0, 2, 3, 4],analysis:'建设单位计划系统中，在工程建设总进度计划编制完成后可编制的进度计划包括：综合进度计划、设计进度计划、采购进度计划、施工进度计划和验收投产进度计划等，故ACDE正确。',memory:'【排除法】B"单项进度计划"不属于后续编制的计划。',section:'4.1  工程进度影响因素与进度计划系统'},
  {type:'single',question:'在下列施工组织方式中，施工现场的组织、管理比较简单的组织方式是(    )。',options:['平行施工', '依次施工', '搭接施工', '流水施工'],answer:[1],analysis:'本题考查的是流水施工特点。依次施工组织方式具有以下特点：\n(1)没有充分利用工作面进行施工，工期较长；\n(2)如果按专业组建工作队，则各专业工作队不能连续作业、工作出现间歇，劳动力和施工机具等资源无法均衡使用；\n(3)如果由一个工作队完成全部施工任务，则不能实现专业化施工，不利于提高劳动生产率和工程质量；\n(4)单位时间内投入劳动力、施工机具等资源量较少，有利于资源供应的组织；\n(5)只有一个工作队进行施工作业，施工现场的组织管理比较简单。',memory:'【口诀】"依次施工管理最简单=只有一个工作队"。',section:'4.2  流水施工进度计划'},
  {type:'single',question:'在有足够工作面和资源的前提下，施工工期最短的施工组织方式是(    )。',options:['依次施工', '搭接施工', '平行施工', '流水施工'],answer:[2],analysis:'本题考查的是流水施工特点。平行施工组织方式具有以下特点：\n(1)能够充分利用工作面进行施工，工期短；\n(2)如果每一施工对象均按专业组建工作队，则各专业工作队不能连续作业，工作出现间歇，劳动力和施工机具等资源无法均衡使用；\n(3)如果由一个工作队完成一个施工对象的全部施工任务，则不能实现专业化施工，不利于提高劳动生产率和工程质量；\n(4)单位时间内投入的劳动力、施工机具等资源成倍增加，不利于资源供应的组织；\n(5)有多个专业工作队在现场施工，施工现场组织管理比较复杂。',memory:'【口诀】"平行施工工期最短=充分利用工作面"。',section:'4.2  流水施工进度计划'},
  {type:'single',question:'工程项目组织依次施工的特点是(    )。',options:['能充分利用工作面进行施工，工期短', '能由一个工作队完成全部工作任务，有利于专业化作业', '单位时间内利用的施工机具少，有利于调配施工机具', '专业工作队连续施工，有利于最大限度地搭接施工'],answer:[2],analysis:'本题考查的是流水施工特点。选项A错误，是平行施工的特点。选项B错误，依次施工不能实现专业化施工。选项D错误，专业工作队不能连续作业，有时间间歇。',memory:'【排除法】A"能充分利用工作面"是平行施工特点；B错，依次不能专业化。',section:'4.2  流水施工进度计划'},
  {type:'single',question:'下列选项中，不属于流水施工的垂直图表示法的优点是(    )。',options:['施工过程及其先后顺序表达清楚', '时间和空间状况形象直观', '编制起来比横道图方便', '斜向进度线的斜率可以直观地表示出各施工过程的进展速度'],answer:[2],analysis:'本题考查的是流水施工的表达方式。采用垂直图表达流水施工的优点是：施工过程及其先后顺序表达清楚，不仅时间和空间状况形象直观，而且斜向进度线的斜率还可直观反映各施工过程的进展速度。',memory:'【排除法】C"编制比横道图方便"错。',section:'4.2  流水施工进度计划'},
  {type:'single',question:'流水施工参数中，流水步距的含义是(    )。',options:['相邻两个专业工作队相继开始施工的最小间隔时间', '相邻两个施工段相继开始施工的最小间隔时间', '相邻两个施工过程之间因组织安排需要增加的间隔等待时间', '相邻两个施工段之间因工艺安排需要增加的间隔等待时间'],answer:[0],analysis:'本题考查的是流水施工参数。流水步距是指组织流水施工时，相邻两个专业工作队相继开始施工的最小间隔时间。',memory:'【定义】"流水步距=相邻两个专业工作队相继开始施工的最小间隔时间"。',section:'4.2  流水施工进度计划'},
  {type:'single',question:'下列流水施工参数中，用来表达流水施工在时间安排上所处状态的参数是(    )。',options:['流水强度和流水段数', '流水段数和流水步距', '流水步距和流水节拍', '流水节拍和流水强度'],answer:[2],analysis:'本题考查的是流水施工参数。时间参数是指在组织流水施工时，用以表达流水施工在时间安排上所处状态的参数，主要包括流水节拍、流水步距和流水施工工期等。',memory:'【口诀】"时间参数=流水节拍+流水步距+流水施工工期"。',section:'4.2  流水施工进度计划'},
  {type:'single',question:'建设工程组织流水施工时，用来表达流水施工在施工工艺方面进展状态的参数(    )。',options:['流水强度和施工过程', '流水节拍和施工段', '工作面和施工过程', '流水步距和施工段'],answer:[0],analysis:'工艺参数是指在组织流水施工时，用以表达流水施工在施工工艺方面进展状态的参数，通常包括施工过程和流水强度两个参数。',memory:'【口诀】"工艺参数=施工过程+流水强度"。',section:'4.2  流水施工进度计划'},
  {type:'single',question:'某工程有3个施工过程，分4个施工段组织固定节拍流水施工，流水节拍为4天，该工程存在提前插入的时间为1天，3天的工艺间歇时间，则流水施工工期为(    )天。',options:['25', '26', '27', '28'],answer:[1],analysis:'本题考查的是流水施工的基本组织方式。T=固定节拍流水施工工期=(施工过程数+施工段数-1)×流水节拍+间歇时间-插入时间=(3+4-1)×4+3-1=26(天)。',memory:'【计算】"固定节拍=(m+n-1)×t+间歇-插入=(4+3-1)×4+3-1=26天"。',section:'4.2  流水施工进度计划'},
  {type:'single',question:'某工程有3个施工过程，分3个施工段组织固定节拍流水施工，流水节拍为2天。各施工过程之间存在2天的工艺间歇时间，则流水施工工期为(    )天。',options:['10', '12', '14', '16'],answer:[2],analysis:'流水施工工期=(3+3-1)×2+2×2=14天。',memory:'【计算】"固定节拍=(m+n-1)×t+ΣZ=(3+3-1)×2+2×2=14天"。',section:'4.2  流水施工进度计划'},
  {type:'single',question:'某工程有三个施工过程，划分为5个施工段组织加快的成倍节拍流水施工，各施工过程的流水节拍分别为4天、6天和4天，则参加流水施工的专业工作队总数为(    )个。',options:['4', '5', '6', '7'],answer:[3],analysis:'流水步距K=2；施工过程1：4/2=2个；施工过程2：6/2=3个；施工过程3：4/2=2个；工作队总数N=2+3+2=7个。',memory:'【计算】"成倍节拍：K=GCD=2，队数=4/2+6/2+4/2=2+3+2=7"。',section:'4.2  流水施工进度计划'},
  {type:'single',question:'某工程有3个施工过程，划分为4个施工段组织加快的成倍节拍流水施工，各施工过程流水节拍分别是6天、6天和9天，则该工程的流水步距和专业工作队总数分别是(    )。',options:['3和7', '3和6', '2和7', '2和6'],answer:[0],analysis:'各施工过程流水节拍分别是6天、6天和9天，最大公约数为3，因此流水步距为3天，专业工作队数=6/3+6/3+9/3=7。',memory:'【计算】"成倍节拍：K=GCD(6,6,9)=3，队数=6/3+6/3+9/3=7"。',section:'4.2  流水施工进度计划'},
  {type:'single',question:'建设工程组织非节奏流水施工时，计算流水步距的基本步骤是(    )。',options:['取最大值—错位相减—累加数列', '错位相减—累加数列—取最大值', '累加数列—错位相减—取最大值', '累加数列—取最大值—错位相减'],answer:[2],analysis:'本题考查的是流水施工的基本组织方式。计算流水步距的基本步骤是累加数列→错位相减→取最大值。',memory:'【排序】"非节奏流水步距=累加数列→错位相减→取最大值"。',section:'4.2  流水施工进度计划'},
  {type:'single',question:'工程项目组织非节奏流水施工的特点是(    )。',options:['相邻施工过程的流水步距相等', '各施工段上的流水节拍相等', '施工段之间没有空闲时间', '专业工作队数等于施工过程数'],answer:[3],analysis:'非节奏流水施工的基本特点：①各施工过程在各施工段上的流水节拍不全相等；②相邻施工过程的流水步距不尽相等；③专业工作队数等于施工过程数；④各专业工作队在各施工段上能够连续作业，但有的施工段之间可能有空闲时间。',memory:'【口诀】"非节奏特点：节拍不全等、步距不尽等、队数=过程数、段间可能有空闲"。',section:'4.2  流水施工进度计划'},
  {type:'single',question:'时间参数是指在组织流水施工时，用以表达流水施工在时间安排上所处状态的参数，组织建设工程流水施工时，相邻两个施工过程相继开始施工的最小间隔时间称为(    )。',options:['流水节拍', '时间间隔', '间歇时间', '流水步距'],answer:[3],analysis:'时间参数是指在组织流水施工时，用以表达流水施工在时间安排上所处状态的参数，主要包括流水节拍、流水步距和流水施工工期等。流水步距是指两个相邻专业工作队相继开始施工的最小间隔时间，故D正确。',memory:'【定义】"流水步距=相邻两个专业工作队相继开始施工的最小间隔时间"。',section:'4.2  流水施工进度计划'},
  {type:'single',question:'在流水施工中，用来表达流水施工在空间布置上开展状态的参数是(    )。',options:['流水强度', '施工过程', '流水段', '流水节拍'],answer:[2],analysis:'施工段也称为流水段，是指在组织流水施工时，将拟建工程在平面上划分成若干个劳动量相等或大致相等的施工区段。划分施工段的目的是充分利用工作面组织流水施工。施工段数目通常用m表示。故C正确。',memory:'【口诀】"空间参数=工作面+施工段"。',section:'4.2  流水施工进度计划'},
  {type:'single',question:'时间参数是指在组织流水施工时，用以表达流水施工在时间安排上所处状态的参数，不包括(    )。',options:['流水段', '流水节拍', '流水步距', '流水施工工期'],answer:[0],analysis:'时间参数是指在组织流水施工时，用以表达流水施工在时间安排上所处状态的参数，主要包括流水节拍、流水步距和流水施工工期等。故A不属于。',memory:'【排除法】A"流水段"属空间参数，非时间参数。',section:'4.2  流水施工进度计划'},
  {type:'multi',question:'与依次施工，平行施工方式相比，流水施工方式的特点有(    )。',options:['施工现场组织管理简单', '有利于实现专业化施工', '相邻专业工作队之间能够最大限度地进行搭接作业', '单位时间内投入的资源量较为均衡', '施工工期最短'],answer:[1, 2, 3],analysis:'本题考查的是流水施工特点。流水施工组织方式具有以下特点：(1)尽可能利用工作面进行施工，工期较短；(2)各工作队实现专业化施工，有利于提高施工技术水平和劳动效率，也有利于提高工程质量；(3)专业工作队能够连续施工，同时使相邻专业工作队之间能够最大限度地进行搭接作业；(4)单位时间内投入的劳动力、施工机具等资源较为均衡，有利于资源供应的组织；(5)为施工现场的文明施工和科学管理创造了有利条件。',memory:'【口诀】"流水施工特点：专业化+连续搭接+资源均衡+文明施工"。',section:'4.2  流水施工进度计划'},
  {type:'multi',question:'下列各类参数中，属于流水施工参数的有(    )。',options:['工艺参数', '定额参数', '空间参数', '时间参数', '机械参数'],answer:[0, 2, 3],analysis:'本题考查的是流水施工参数。流水施工参数有工艺参数、空间参数、时间参数。',memory:'【口诀】"流水参数三类型：工艺+空间+时间"。',section:'4.2  流水施工进度计划'},
  {type:'multi',question:'下列流水施工参数中，用来表达流水施工在空间布置上开展状态的参数有(    )。',options:['流水能力', '施工过程', '流水强度', '工作面', '施工段'],answer:[3, 4],analysis:'空间参数是指在组织流水施工时，用以表达流水施工在空间布置上开展状态的参数。空间参数通常包括工作面和施工段。',memory:'【口诀】"空间参数=工作面+施工段"。',section:'4.2  流水施工进度计划'},
  {type:'multi',question:'采用加快的成倍节拍流水施工方式的特点有(    )。',options:['相邻施工过程的流水步距相等', '不同施工过程的流水节拍成倍数关系', '专业工作队数等于施工过程数', '流水步距等于流水节拍的最大值', '各专业工作队能够在施工段上连续作业'],answer:[0, 1, 4],analysis:'本题考查的是流水施工的基本组织方式。加快的成倍节拍流水施工特点。加快的成倍节拍流水施工具有以下特点：①同一施工过程在各个施工段上的流水节拍均相等；不同施工过程的流水节拍为倍数关系。②相邻施工过程的流水步距相等，且等于流水节拍的最大公约数。③专业工作队数大于施工过程数。对于流水节拍大的施工过程，可按其倍数增加相应专业工作队数目。④各专业工作队在施工段上能够连续作业，施工段之间没有空闲时间。',memory:'【排除法】C"队数=过程数"错，D"步距=最大节拍"错应为GCD。',section:'4.2  流水施工进度计划'},
  {type:'multi',question:'建设工程组织流水施工时，划分施工段原则(    )。',options:['每个施工段需要有足够工作面', '施工段数要满足合理组织流水施工要求', '施工段界限要尽可能与结构界限相吻合', '同一专业工作队在同施工段劳动量比相等', '施工段必须在同一平面内划分'],answer:[0, 1, 2],analysis:'由于施工段内的施工任务由专业工作队依次完成，因而在两个施工段之间容易形成一个施工缝。同时，由于施工段数量多少，将直接影响流水施工效果。为合理划分施工段，应遵循下列原则：(1)各施工段的劳动量应大致相等，相差幅度不宜超过15%，以保证施工在连续、均衡的条件下进行。(2)每个施工段要有足够的工作面，以保证相应数量的工人、主导施工机械的生产效率。(3)施工段的界限应尽可能与结构界限(如沉降缝、伸缩缝等)相吻合，或设在对建筑结构整体性影响小的部位，以保证建筑结构的整体性。(4)施工段数目要满足合理组织流水施工的要求。施工段数目过多，会降低施工速度，延长工期；施工段过少，不利于充分利用工作面，可能造成窝工。(5)对于多层建筑物、构筑物或需要分层施工的工程，应既分施工段，又分施工层，各专业工作队依次完成第一施工层中各施工段任务后，再转入第二施工层的施工段上作业，依此类推。以确保相应专业队在施工段与施工层之间，组织连续、均衡、有节奏地流水施工。故ABC正确。',memory:'【排除法】E"必须同一平面"错。划分原则：劳动量大致等+足够工作面+界限吻合+满足流水。',section:'4.2  流水施工进度计划'},
  {type:'multi',question:'建设工程组织非节奏流水施工的特点有(    )。',options:['各专业工作队不能在施工段上连续作业', '相邻施工过程的流水步距不尽相等', '各施工段的流水节拍相等', '专业工作队数等于施工过程数', '施工段之间没有空闲时间'],answer:[1, 3],analysis:'非节奏流水施工特点包括：①各施工过程在各施工段上的流水节拍不全相等；②相邻施工过程的流水步距不尽相等；③专业工作队数等于施工过程数；④各专业工作队能够在施工段上连续作业，但有的施工段之间可能有空闲时间。',memory:'【排除法】A"不能连续"错，非节奏专业队可连续但段间可能有空闲。',section:'4.2  流水施工进度计划'},
  {type:'multi',question:'有节奏流水施工是指在组织流水施工时，每一个施工过程在各施工段上的流水节拍都各自相等的流水施工，可分为(    )。',options:['等节奏流水施工', '异节奏流水施工', '固定节拍流水施工', '全等节拍流水施工', '非节奏流水施工'],answer:[0, 1, 2, 3],analysis:'有节奏流水施工是指在组织流水施工时，每一个施工过程在各施工段上的流水节拍都各自相等的流水施工，又可分为等节奏流水施工和异节奏流水施工。等节奏流水施工是指在有节奏流水施工中，各施工过程的流水节拍都相等的流水施工，也称为固定节拍流水施工或全等节拍流水施工。故ABCD正确。',memory:'【排除法】E"非节奏"不属于有节奏。有节奏=等节奏+异节奏。',section:'4.2  流水施工进度计划'},
  {type:'single',question:'某网络计划如下图，逻辑关系正确的是(    )。',options:['A完成后同时进行CF', 'AB均完成后进行E', 'F的紧前工作是DE', 'E的紧前工作是BD'],answer:[3],analysis:'A选项错误，C工作和F工作不可能同时；B选项错误，A工作与E工作无关；C选项错误，F的紧前工作是CE。',memory:'【解析】根据网络图判断F紧前=CE非DE。',section:'4.3  工程网络计划技术'},
  {type:'single',question:'根据《工程网络计划技术规程》JQJ/T121-2015，网络图存在的绘图错误是(    )。',options:['编号相同的工作', '多个起点节点', '相同的节点编号', '无箭尾节点的箭线'],answer:[0],analysis:'工作①②有两个。',memory:'【口诀】"编号相同的工作=绘图错误"。',section:'4.3  工程网络计划技术'},
  {type:'single',question:'工程网络计划资源优化的目标是(    )。',options:['工期固定条件下寻求资源均衡', '工期固定条件下寻求资源需求最小', '资源供应充足条件下寻求最短工期', '寻求资源需求最小时的工期安排'],answer:[0],analysis:'资源优化分为两种：即“资源有限，工期最短”的优化和“工期固定，资源均衡”的优化。',memory:'【口诀】"资源优化=资源有限工期最短+工期固定资源均衡"。',section:'4.3  工程网络计划技术'},
  {type:'single',question:'工程总费用由直接费和间接费组成。随着工期的缩短，直接费和间接费的变化规律是(    )。',options:['直接费减少，间接费增加', '直接费和间接费均增加', '直接费增加，间接费减少', '直接费和间接费均减少'],answer:[2],analysis:'直接费会随着工期的缩短而增加。间接费一般会随着工期的缩短而减少。',memory:'【口诀】"工期缩短→直接费增加、间接费减少"。',section:'4.3  工程网络计划技术'},
  {type:'single',question:'在工程网络计划中，关于计划工期的说法，正确的是(    )。',options:['当有要求工期时，计划工期不大于要求工期', '当未规定要求工期时，计划工期可小于计算工期', '根据网络计划确定计划工期时，计划工期须等于计算工期', '根据网络计划确定计划工期时，可不考虑要求工期'],answer:[0],analysis:'选项B错误，当未规定要求工期时，计划工期等于计算工期。选项C错误，根据网络计划确定计划工期时，计划工期可等于计算工期。选项D错误，根据网络计划确定计划工期时，需考虑要求工期。计划工期是指根据要求工期和计算工期所确定的作为实施目标的工期。当已规定了要求工期时，计划工期不应超过要求工期；当未规定要求工期时，计划工期等于计算工期。',memory:'【口诀】"计划工期≤要求工期；无要求时=计算工期"。',section:'4.3  工程网络计划技术'},
  {type:'single',question:'工程网络计划中，工作的最迟开始时间是指在不影响(    )的前提下，必须开始的最迟时刻。',options:['紧后工作最早开始', '紧前工作最迟开始', '整个任务按期完成', '所有后续工作机动时间'],answer:[2],analysis:'工作的最迟开始时间是指在不影响整个任务按期完成的前提下，本工作必须开始的最迟时刻。',memory:'【定义】"最迟开始=不影响整个任务按期完成"。',section:'4.3  工程网络计划技术'},
  {type:'single',question:'某工作网络计划中，工作N的持续时间是1天，最早第14天上班时刻开始，工作N的三个紧前工作A、B、C的最早完成时间分别是第9天，第11天，第13天下班时刻，则工作B与工作N的时间间隔是(    )天。',options:['0', '2', '1', '4'],answer:[1],analysis:'N工作最早开始时间为第13天，B工作最早完成时间为第11天，所以时间间隔为13-11=2天。',memory:'【计算】"时间间隔=紧后最早开始-本早完=13-11=2天"。',section:'4.3  工程网络计划技术'},
  {type:'single',question:'某工程双代号时标网络计划如下图(时间单位：天)，工作A的总时差为(    )天。',options:['0', '1', '2', '3'],answer:[1],analysis:'工作总时差的判定应从网络计划的终点节点开始，逆着箭线方向依次进行。工作A的总时差为自波+后波=0+1=1天。',memory:'【口诀】"时标网络总时差=本波+后波"。',section:'4.3  工程网络计划技术'},
  {type:'single',question:'某网络计划中，工作A有三项紧后工作B、C和D，B、C、D工作的持续时间分别为10天、12天、7天，B、C、D工作的最迟完成时间分别为第15天、18天第10天，则工作A的最迟完成的时间是第(    )天。',options:['5', '3', '8', '6'],answer:[1],analysis:'工作A的最迟完成时间=紧后工作的最迟开始时间的最小值=min(15-10；18-12；10-7)=min(5；6；3)=3。',memory:'【计算】"最迟完成=紧后最迟开始取最小=min(5,6,3)=3"。',section:'4.3  工程网络计划技术'},
  {type:'single',question:'某网络计划中，工作Q有两项紧前工作M、N，M、N工作的持续时间分别为4天、5天，M、N工作的最早开始时间分别为第9天、第11天，则工作Q的最早开始时间是第(    )天。',options:['9', '13', '15', '16'],answer:[3],analysis:'工作Q的最早开始时间=紧前工作的最早完成时间的最大值=max(9+4；11+5)=max(13；16)=16。',memory:'【计算】"最早开始=紧前最早完成取最大=max(13,16)=16"。',section:'4.3  工程网络计划技术'},
  {type:'single',question:'某工程网络计划中，工作N的最早完成时间为第17天，持续时间为2天；该工作有三项紧后工作，它们的最早开始时间分别为第20天、第22天和第23天，最迟开始时间分别为第24天，第23天和第25天，工作N的总时差和自由时差分别为(    )天。',options:['2；1', '4；1', '4；3', '6；3'],answer:[3],analysis:'自由时差=min(紧后工作最早开始-本工作最早完成)=min(20-17；22-17；23-17)=3天；总时差=最迟完成时间-最早完成时间(24；23；25)-17=23-17=6天。',memory:'【计算】"FF=min(20,22,23)-17=3；TF=min(24,23,25)-17=6"。',section:'4.3  工程网络计划技术'},
  {type:'single',question:'某工程单代号网络图如图，计算工期为(    )。',options:['24', '26', '30', '27'],answer:[2],analysis:'计算工期=2+8+10+10=30天。',memory:'【计算】根据具体网络图计算工期。',section:'4.3  工程网络计划技术'},
  {type:'single',question:'关于双代号网络计划关键线路的说法，正确的是(    )。',options:['一个网络计划可能有几条关键线路', '在网络计划执行中，关键线路始终不会改变', '关键线路是总的工作持续时间最短的线路', '关键线路上的工作总时差为零'],answer:[0],analysis:'关键线路是总的工作持续时间最长的线路。一个网络计划可能有一条，或几条关键线路，在网络计划执行过程中，关键线路有可能转移。关键工作的总时差不一定为零。当计划工期等于计算工期时，关键工作的总时差就等于零。',memory:'【口诀】"关键线路=总持续时间最长，可多条，可转移"。',section:'4.3  工程网络计划技术'},
  {type:'single',question:'关于网络计划中关键线路正确的是(    )。',options:['—个网络计划只能有一条关键线路', '全部由关键工作组成的线路是关键线路', '全部由关键节点组成的线路是关键线路', '总持续时间最长的线路是关键线路'],answer:[3],analysis:'选项A错误，一个网络计划可能有一条或几条关键线路；选项B错误，在单代号网络计划下，自始至终全部由关键工作组成，且时间间隔为零的线路为关键线路；选项C错误，全部由关键节点组成的线路不一定是关键线路。',memory:'【排除法】A"只能一条"错；B"全部关键工作"错；C"全部关键节点"错。',section:'4.3  工程网络计划技术'},
  {type:'single',question:'下列建设工程进度计划编制工作中，属于绘制网络图阶段工作内容的是(    )。',options:['确定网络计划目标', '安排劳动力、原材料和施工机具', '分析各项工作之间的逻辑关系', '确定关键路线和关键工作'],answer:[2],analysis:'网络图绘制阶段主要包括工程项目分解、确定逻辑关系和绘制网络图等工作。其中确定逻辑关系，根据施工方案、有关资源供应情况和施工经验等，既要考虑施工程序或工艺技术过程，又要考虑组织安排及资源调配需要，以此来分析确定各项工作之间的逻辑关系。故C正确。',memory:'【口诀】"绘制阶段=项目分解+确定逻辑关系+绘制网络图"。',section:'4.3  工程网络计划技术'},
  {type:'single',question:'该分部工程双代号网络图如下图所示，图中错误是(    )。',options:['存在循环回路', '节点编号有误', '存在多个起点节点', '存在多个终点节点'],answer:[2],analysis:'①⑥为多个起点节点。故答案选C。',memory:'【口诀】"多个起点节点=绘图错误"。',section:'4.3  工程网络计划技术'},
  {type:'single',question:'工程网络计划中，工作的最迟开始时间是指在不影响(    )的前提下，必须开始的最迟时刻。',options:['紧后工作最早开始', '紧前工作最迟开始', '整个任务按期完成', '所有后续工作机动时间'],answer:[2],analysis:'最迟完成时间在不影响整个任务按期完成的前提下，本工作必须完成的最迟时刻，故C正确。',memory:'【定义】"最迟开始=不影响整个任务按期完成"。',section:'4.3  工程网络计划技术'},
  {type:'single',question:'某工程双代号网络计划如下图所示，其关键线路有(    )条。',options:['1', '2', '3', '4'],answer:[2],analysis:'①②⑦⑧⑨，①③⑥⑦⑧⑨，①④⑤⑨，故C正确。',memory:'【计算】关键线路需找所有最长线路。',section:'4.3  工程网络计划技术'},
  {type:'single',question:'某工程双代号网络计划如下图所示，其中工作G的最早开始时间为(    )。',options:['6', '9', '10', '12'],answer:[1],analysis:'',memory:'【计算】最早开始=紧前最早完成取最大。',section:'4.3  工程网络计划技术'},
  {type:'single',question:'某工程双代号网络计划如下图所示，工作D的最早开始时间和最迟开始时间分别是(    )。',options:['2和5', '4和5', '2和7', '4和7'],answer:[0],analysis:'',memory:'【计算】最早开始和最迟开始需分别正向和逆向。',section:'4.3  工程网络计划技术'},
  {type:'single',question:'某工程网络计划如下图所示，工作D的最迟开始时间和总时差分别是(    )。',options:['6和2', '6和4', '7和2', '7和3'],answer:[3],analysis:'',memory:'【计算】最迟开始=最迟完成-持续，总时差=最迟-最早。',section:'4.3  工程网络计划技术'},
  {type:'multi',question:'某工程工作逻辑关系如下表，C工作的紧后工作有(    )。',options:['工作H', '工作G', '工作F', '工作E', '工作D'],answer:[0, 2, 3],analysis:'C工作的紧后工作等同于该工作的紧前工作有C工作，对应表格，依次有工作E、F、H。',memory:'【计算】C紧后=看哪些工作紧前含C。',section:'4.3  工程网络计划技术'},
  {type:'multi',question:'某工程双代号网络计划如下图所示，图中出现的错误有(    )。',options:['多个起点节点', '多个终点节点', '存在循环回路', '箭线上引出箭线', '存在无箭头的工作'],answer:[0, 1, 3],analysis:'本题考查的是双代号网络计划。图中不存在循环回路，不存在无箭头的工作。',memory:'【解析】根据具体图形判断错误类型。',section:'4.3  工程网络计划技术'},
  {type:'multi',question:'某工程双代号网络计划如下图所示，图中出现的错误有(    )。',options:['节点编号有误', '多个起点节点', '多个终点节点', '箭线交叉表达有误', '存在循环回路'],answer:[1, 3],analysis:'本题考查的是双代号网络计划。①、②多个起点节点；③⑥和④⑤、⑤⑦和⑥⑧箭线交叉表达有误。',memory:'【计算】根据具体网络图判断。',section:'4.3  工程网络计划技术'},
  {type:'multi',question:'当计算工期超过计划工期时，可压缩关键工作的持续时间以满足要求。在确定缩短持续时间的关键工作时，宜选择(    )。',options:['有多项紧前工作的工作', '缩短持续时间而不影响质量和安全的工作', '有充足备用资源的工作', '缩短持续时间所增加的费用相对较少的工作', '单位时间消耗资源量大的工作'],answer:[1, 2, 3],analysis:'工期优化：通过压缩关键工作的持续以满足要求工期目标的过程。\n应考虑下列因素：\n①缩短持续时间对质量和安全影响不大的工作；\n②有充足备用资源的工作；\n③缩短持续时间所需增加费用最少的工作。',memory:'【口诀】"优化选择：质量和安全影响不大+充足资源+费用最少"。',section:'4.3  工程网络计划技术'},
  {type:'multi',question:'关于工程网络计划中关键线路的说法，正确的有(    )。',options:['关键线路上相邻两项工作之间的时距均为零', '关键线路上的工作是关键工作', '关键节点组成的线路是关键线路', '双代号时标网络计划中无波形线的线路是关键线路', '单代号网络计划中时间间隔均为零的线路是关键线路'],answer:[1, 3, 4],analysis:'选项A错误，所谓时距，就是在搭接网络计划中相邻两项工作之间的时间差值，与关键线路并无直接联系；选项C错误，关键节点组成的线路不一定为关键线路。',memory:'【排除法】A"时距均为零"与搭接网络有关；C"关键节点线路"不一定关键。',section:'4.3  工程网络计划技术'},
  {type:'multi',question:'工程网络计划中，关键线路是指(    )。',options:['双代号时标网络计划中无波形线', '单代号网络计划中时间间隔均为零', '双代号网络计划中由关键节点组成', '单代号网络计划中由关键工作组成', '双代号时标网络计划中无虚箭线'],answer:[0, 1],analysis:'选项C错误，在双代号网络计划中，关键线路上的节点称为关键节点。关键工作两端的节点必为关键节点，但两端为关键节点的工作不一定是关键工作；选项D错误，单代号网络计划中由关键工作组成的线路不一定是关键线路，总时差最小的工作为关键工作。将这些关键工作相连，并保证相邻两项关键工作之间的时间间隔为零而构成的线路就是关键线路；选项E错误，在关键线路上可能有虚工作存在。',memory:'【排除法】CDE均错，关键线路需满足特定条件。',section:'4.3  工程网络计划技术'},
  {type:'multi',question:'某双代号网络计划如下图(图中粗实线为关键工作)，若计划工期等于计算工期，则自由时差一定等于总时差且不为零的工作有(    )。',options:['①→②', '③→⑤', '②→⑦', '④→⑤', '⑥→⑧'],answer:[3, 4],analysis:'自由时差一定等于总时差且不为零的工作指的是，以关键节点作为结束节点的非关键工作，所以是④→⑤工作和⑥→⑧工作。',memory:'【口诀】"FF=TF且不为零=以关键节点为结束的非关键工作"。',section:'4.3  工程网络计划技术'},
  {type:'multi',question:'双代号时标网络计划如下图所示，关于时间参数及关键线路的说法，正确的有(    )。',options:['A工作的总时差为1，自由时差为0', 'C工作的总时差为0，自由时差为0', 'B工作的总时差为1，自由时差为1', 'H工作的最早完成时间为9，最迟完成时间为9', '①→②→④→⑥→⑦→⑧→⑨→⑪是关键线路'],answer:[1, 2],analysis:'关键线路有两条：①→③→⑤→⑦→⑧→⑨→⑪，①→④→⑥→⑦→⑧→⑨→⑪。选项A错误，A工作的总时差和自由时差均为0；选项D错误，H工作的最早完成时间为9，最迟完成时间为10；选项E错误，该线路为非关键线路。',memory:'【计算】根据时标网络图分析。',section:'4.3  工程网络计划技术'},
  {type:'multi',question:'某工程单代号网络计划如下图所示，时间参数正确的有(    )。',options:['工作G的最早开始时间为10', '工作G的最迟开始时间为13', '工作E的最早完成时间为13', '工作E的最迟完成时间为15', '工作D的总时差为1'],answer:[1, 2, 4],analysis:'',memory:'【计算】根据具体网络图分析。',section:'4.3  工程网络计划技术'},
  {type:'multi',question:'某工程单代号网络计划如下图所示(图中节点上方数字为节点编号)，其中关键线路是(    )。',options:['1-2-3-8', '1-2-3-6-8', '1-2-5-6-8', '1-2-5-7-8', '1-4-7-8'],answer:[1, 3],analysis:'',memory:'【计算】关键线路=时间间隔均为零的线路。',section:'4.3  工程网络计划技术'},
  {type:'single',question:'下列工作中，属于建设工程进度监测系统过程中工作内容的是(    )。',options:['分析进度偏差产生的原因', '分析进度偏差对工期的影响', '确定工期的限制条件', '比较实际进度与计划进度'],answer:[3],analysis:'选项ABC属于施工进度调整系统过程中的内容。',memory:'【排除法】"比较实际与计划进度"=监测过程，ABC属调整。',section:'4.4  施工进度控制'},
  {type:'single',question:'工程网络计划中，某工作实际进度拖后超过总时差，则该工作实际进度偏差对后续工作及总工期的影响是(    )。',options:['影响后续工作，也影响总工期', '不影响后续工作，也不影响总工期', '影响后续工作，但不影响总工期', '不影响后续工作，但影响总工期'],answer:[0],analysis:'如果工作的进度偏差大于该工作的总时差，则此进度偏差必将影响其后续工作和总工期。',memory:'【口诀】"偏差>总时差→影响后续+总工期"。',section:'4.4  施工进度控制'},
  {type:'single',question:'工程进度计划实施中检查发现，某工作进度拖后5天，该工作总时差和自由时差分别是6天和2天，则该工作实际进度偏差对总工期及后续工作的影响是(    )。',options:['影响总工期，但不影响后续工作', '不影响总工期，但影响后续工作（Kimmy真帅）', '既不影响总工期，也不影响后续工作', '影响总工期，也影响后续工作'],answer:[1],analysis:'当工作实际进度拖后的时间(偏差)超过该工作的自由时差，但未超过该工作的总时差时，则该工作实际进度偏差会影响该工作后续工作的正常进行，但不会影响总工期。',memory:'【口诀】"FF<偏差<TF→影响后续不影响总工期"。',section:'4.4  施工进度控制'},
  {type:'single',question:'当利用S曲线比较工程项目的实际进度与计划进度时，如果检查日期实际进展点落在计划S曲线的左侧，则该实际进展点与计划S曲线在水平方向的距离表示工程项目(    )。',options:['实际超额完成的任务量', '实际拖欠的任务量', '实际进度拖后的时间', '实际进度超前的时间'],answer:[3],analysis:'若工程实际进展点落在计划S曲线左侧，表明此时实际进度超前。',memory:'【口诀】"S曲线左侧=超前，右侧=拖后"。',section:'4.4  施工进度控制'},
  {type:'single',question:'通过缩短某些工作的持续时间对施工进度计划进行调整的方法，其主要特点是(    )。',options:['增加网络计划中的关键线路', '不改变工作之间的先后顺序关系', '增加工作之间的时间间隔', '不改变网络计划中的非关键线路'],answer:[1],analysis:'通过压缩某些工作的持续时间来缩短工期，这种调整方法的特点是不改变施工进度计划中工作之间的逻辑关系，通过采取增加资源投入、提高劳动效率等措施，来缩短某些工作的持续时间，以达到加快施工进度、缩短工期的目的。',memory:'【口诀】"压缩持续时间=不改变逻辑关系，增加资源提高效率"。',section:'4.4  施工进度控制'},
  {type:'single',question:'调整施工进度计划可采取的组织措施是(    )。',options:['增加工作面', '改善劳动条件', '改进施工工艺', '调整施工方法'],answer:[0],analysis:'组织措施：(1)增加工作面，组织更多的施工队伍；(2)增加每天的施工时间(如采用三班制等)；(3)增加劳动力和施工机械的数量。',memory:'【口诀】"组织措施=增加工作面+增加施工时间+增加劳动力和机械"。',section:'4.4  施工进度控制'},
  {type:'single',question:'调整施工进度计划时，为了缩短某些工作的持续时间，可采取的技术措施之一是(    )。',options:['增加施工机械的数量', '实行包干加奖励', '改善外部配合条件', '采用更先进的施工机械'],answer:[3],analysis:'选项A属于组织措施；选项B属于经济措施；选项C属于其他配套措施。',memory:'【排除法】A属组织措施；B属经济措施；C属其他措施。',section:'4.4  施工进度控制'},
  {type:'single',question:'下列施工进度计划调整措施中，属于组织措施的是(    )。',options:['改善外部配合条件', '采用更先进的施工机械', '实施强有力的组织调度', '增加工作面'],answer:[3],analysis:'A、C选项属于其他配套措施；B选项属于技术措施。',memory:'【排除法】AC属其他措施；B属技术措施。',section:'4.4  施工进度控制'},
  {type:'single',question:'施工进度监测系统过程与施工进度调整系统过程各流程排序，①实施施工进度计划②实际进度与进度计划比较分析③调整施工进度计划④分析进度偏差产生原因⑤收集整理实施进度数据',options:['①②⑤③④', '①③②⑤④', '①⑤②④③', '①⑤③②④（Kimmy真帅）'],answer:[2],analysis:'',memory:'【排序】"实施①→收集⑤→比较②→分析④→调整③"。',section:'4.4  施工进度控制'},
  {type:'single',question:'某工作实施过程中的S曲线如下图所示，图中a和b两点的进度偏差状态是(    )。',options:['a点进度拖后和b点进度拖后', 'a点进度拖后和b点进度超前', 'a点进度超前和b点进度拖后', 'a点进度超前和b点进度超前'],answer:[2],analysis:'利用曲线法进行实际进度与计划进度比较，可以获得以下信息：(1)工程实际进展状况。若工程实际进展点落在计划曲线左侧(如上图中的a点)，表明此时实际进度超前；若工程实际进展点落在计划曲线右侧(如上图中的b点)，表明此时实际进度拖后；若工程实际进展点正好落在计划曲线上，则表示此时实际进度与计划进度一致。',memory:'【口诀】"S曲线左侧=超前，右侧=拖后"。',section:'4.4  施工进度控制'},
  {type:'single',question:'进度计划实施过程中，一旦发现进度偏差，应采取措施对进度计划进行调整，下列工作中属于进度调整系统过程的是(    )。',options:['对实际进度数据进行加工处理', '将实际进度与计划进度进行对比分析', '计算进度偏差', '分析进度偏差对后续工作和总工期的影响（Kimmy真帅）'],answer:[3],analysis:'调整系统过程包括：1)分析进度偏差产生原因；2)分析进度偏差对后续工作及总工期的影响；3)确定后续工作及总工期的限制条件；4)调整工程进度计划。故D正确。',memory:'【口诀】"调整过程=分析原因→分析影响→确定限制→调整计划"。',section:'4.4  施工进度控制'},
  {type:'single',question:'调整工程进度计划时，通过增加劳动力和施工机械的数量缩短某些工作持续时间的措施属于(    )。',options:['经济措施', '技术措施', '组织措施', '合同措施'],answer:[2],analysis:'增加劳动力和机械数量属于组织措施。故C正确。',memory:'【口诀】"增加劳动力和机械=组织措施"。',section:'4.4  施工进度控制'},
  {type:'single',question:'某工程网络计划中，工作M的自由时差为2天，总时差为5天。实施中进度检查时发现该工作的持续时间延长了4天，则工作M的实际进度(    )。',options:['不影响总工期，但将其紧后工作的最早开始时间推迟了2天', '既不影响总工期，也不影响其后续工作的正常进行', '将使总工期延长4天，但其后续工作的正常进行', '将其后续工作的最早开始不影响时间推迟4天，并使总工期延长1天'],answer:[0],analysis:'工作M的自由时差为2天，总时差为5天，实施进度检查时发现该工作的持续时间延长了四天，小于总时差，大于自由时差2天，因此工作M的实际进度是不影响总工期，但将其紧后工作的最早开始时间推迟2天。故A正确。',memory:'【口诀】"FF<偏差<TF→影响紧后最早开始但不影响总工期"。',section:'4.4  施工进度控制'},
  {type:'single',question:'施工进度计划调整方法，当工程实际进度偏差影响到后续工作、总工期而需要调整施工进度计划时，不属于调整方法的是(    )。',options:['压缩某些工作的持续时间', '改变某些工作的逻辑关系', '通过压缩某些工作的持续时间并改变该工作的逻辑关系', '将关键工作变成非关键工作'],answer:[3],analysis:'当工程实际进度偏差影响到后续工作、总工期而需要调整施工进度计划时，调整方法主要有两种：一是通过压缩某些工作的持续时间来缩短工期；二是通过改变某些工作的逻辑关系来缩短工期。在实际工作中，可根据具体情况选用上述方法或综合应用上述方法调整施工进度计划。故选D。',memory:'【排除法】D"将关键变非关键"不是调整方法。',section:'4.4  施工进度控制'},
  {type:'multi',question:'某双代号时标网络计划执行过程中的实际进度前锋线如下图所示，计划工期为12周，图中正确的信息有(    )。',options:['工作E进度正常，不影响总工期', '工作G进度拖延1周，影响总工期1周', '工作H进度拖延1周，影响总工期1周', '工作I最早开始时间调后1周，计算工期不变', '根据第7周末的检查结果，压缩工作K的持续时间1周，计划工期不变'],answer:[0, 1, 4],analysis:'选项C错误，工作H进度拖延1周，但是其总时差为2周，不影响总工期；选项D错误，工作I为关键工作，若调后1周，则工期拖延1周。',memory:'【解析】关键工作拖延=影响总工期。',section:'4.4  施工进度控制'},
  {type:'multi',question:'某工程双代号时标网络计划执行到第30天和第70天时，检查其实际进度绘制的前锋线如图所示，由此可得到正确的结论有(    )。',options:['第30天检查时，工作C实际进度提前10天，不影响总工期', '第30天检查时，工作D实际进度正常，不影响总工期', '第70天检查时，工作G实际进度拖后10天，影响总工期', '第70天检查时，工作F实际进度拖后10天，不影响总工期', '第70天检查时，工作H实际进度正常，不影响总工期'],answer:[1, 2, 4],analysis:'选项A错误，第30天检查时，工作C实际进度拖后10天，工作C是关键工作，影响总工期。选项D错误，第70天检查时，工作F实际进度拖后10天，工作F是关键工作，影响总工期。',memory:'【解析】关键工作拖延=必影响总工期。',section:'4.4  施工进度控制'},
  {type:'multi',question:'采用S曲线比较法比较工程实际进度与计划进度时，可获得的信息有(    )。',options:['工程实际拥有的总时差', '工程实际进展情况', '工程实际进度超前或拖后的时间', '工程实际超额或拖欠完成的任务量', '后期工程进度预测值'],answer:[1, 2, 3, 4],analysis:'采用S曲线比较法比较工程实际进度与计划进度时，可获得的信息：①工程实际进展情况；②实际进度超前或拖后的时间；③实际超额或拖欠的任务量；④后期工程进度预测。',memory:'【口诀】"S曲线信息：实际进展+时间偏差+任务量偏差+后期预测"。',section:'4.4  施工进度控制'},
  {type:'multi',question:'当工程实际进度偏差影响到后续工作、总工期而需要调整进度计划时，可采用(    )等方法改变某些工作的逻辑关系。',options:['增加资源投入量', '提高劳动效率', '将顺序进行的工作改为平行作业', '将顺序进行的工作改为搭接作业', '分段组织流水作业'],answer:[2, 3, 4],analysis:'当施工进度计划中影响后续工作(后续工作的拖延有限制时)及总工期的工作之间逻辑关系允许改变时，可以通过改变其逻辑关系，将顺序作业的工作改为平行作业、搭接作业或分段组织流水作业等，均可有效缩短工期。',memory:'【口诀】"改变逻辑关系=顺序改平行/搭接/流水"。',section:'4.4  施工进度控制'},
  {type:'multi',question:'为压缩某些工作的持续时间，通常需要采取下列措施(    )。',options:['组织措施', '技术措施', '经济措施', '其他配套措施', '风险措施'],answer:[0, 1, 2, 3],analysis:'为压缩某些工作的持续时间，通常需要采取下列措施来达到目的：(1)组织措施；(2)技术措施；(3)经济措施；(4)其他配套措施。',memory:'【口诀】"压缩措施=组织+技术+经济+其他配套"。',section:'4.4  施工进度控制'},
  {type:'multi',question:'以下进度计划调整方法和措施，属于组织措施的有(    )。',options:['增加工作面，组织更多施工队伍', '采用更先进的施工机械', '增加劳动力和施工机械数量', '改善外部配合条件', '实行包干奖励'],answer:[0, 2],analysis:'组织措施包括：增加工作面，组织更多施工队伍；增加每天施工时间，采用加班或多班制施工方式；增加劳动力和施工机械数量。B选项属于技术措施，D选项属于其他配套措施，E选项属于经济措施。',memory:'【排除法】B技术措施，D其他措施，E经济措施。',section:'4.4  施工进度控制'},
  {type:'multi',question:'以下进度计划调整方法和措施，属于经济措施的是(    )。',options:['增加工作面，组织更多施工队伍', '采用更先进的施工机械', '提高奖金数额', '改善外部配合条件', '实行包干奖励'],answer:[2, 4],analysis:'经济措施，如实行包干奖励；提高奖金数额；对所采取的技术措施给予相应经济补偿等。A选项属于组织措施，B选项属于技术措施，D选项属于其他配套措施。',memory:'【排除法】A组织措施，B技术措施，D其他措施。',section:'4.4  施工进度控制'},
  {type:'multi',question:'某工程网络计划中，工作N的自由时差为5天，计划执行过程中检查发现，工作N的工作时间延后了3天，其他工作均正常，此时(    )。',options:['工作N的总时差不变，自由时差减少3天', '总工期不会延长', '工作N的总时差减少3天', '工作N的最早完成时间推迟3天', '工作N将会影响紧后工作'],answer:[1, 2, 3],analysis:'自由时差是指在不影响其紧后工作最早开始的前提下，可以利用的机动时间。总时差是指在不影响总工期的前提下，可以利用的机动时间。工作拖延3天，其自由时差为5天，自由时差少了3天，故并不影响总工期。某工作的总时差=min(其紧后工作的总时差的最小值+本工作的自由时差)，其他工作正常，自由时差减少了3天，则总时差减少3天。某工作的自由时差=其紧后工作的最早开始时间-本工作的最早完成时间，其他工作正常，工作N拖延了3天，故工作N的最早完成时间拖延了3天。故BCD正确。',memory:'【口诀】"拖延<FF无影响；FF<拖延<TF：TF减少+不影响工期+影响紧后"。',section:'4.4  施工进度控制'},
  {type:'multi',question:'某钢筋工程计划进度和实际进度S曲线如下图所示，从图中可以看出(    )。',options:['第1天末该工程实际拖欠的工程量为120t', '第2天末实际进度比计划进度超前1d', '第3天末实际拖欠的工程量60t', '第4天末实际进度比计划进度拖后1d', '第4天末实际拖欠工程量60t'],answer:[2, 3],analysis:'第1天末该工程实际超额完成的工程量为=200-80=120t；第2天末实际进度比计划进度超前，但不能确定是1d；第3天末实际拖欠的工程量=310-250=60t；第4天末实际进度与计划进度第3天的工程量相同，因此进度拖后1d；第4天末实际拖欠的工程量=380-310=70t。故CD正确。\n第5章  建设工程质量管理',memory:'【解析】S曲线水平距离=时间偏差，垂直距离=工程量偏差。',section:'4.4  施工进度控制'}
];

const PASSWORD = '6666';
let currentIndex = 0, score = 0, revealed = false;
let userAnswers = new Array(questions.length).fill(null);
let feedbackList = [];
const optLabels = 'ABCDEFGHIJ'.split('');

let pwPassed = false;
function checkPassword() {
  const i = document.getElementById('pwInput'), e = document.getElementById('pwError');
  if (i.value===PASSWORD) {
    pwPassed = true;
    document.getElementById('passwordOverlay').style.display = 'none';
    document.body.style.overflow = '';
    init();
  }
  else { e.textContent='密码错误，请重新输入'; i.style.animation='shake 0.4s'; setTimeout(()=>i.style.animation='',400); }
}
function initPassword() {
  document.body.style.overflow = 'hidden';
  document.getElementById('pwInput').focus();
  document.getElementById('pwInput').addEventListener('keydown', function(ev) { if (ev.key==='Enter') checkPassword(); });
  document.getElementById('pwBtn').addEventListener('click', function() { checkPassword(); });
}

function init() {
  const js=document.getElementById('jumpSelect');
  questions.forEach((_,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`第 ${i+1} 题`;js.appendChild(o);});
  js.addEventListener('change',()=>{currentIndex=parseInt(js.value);renderQuestion();});
  document.getElementById('totalNum').textContent=questions.length;
  renderQuestion();
}

function renderQuestion() {
  const q=questions[currentIndex];
  document.getElementById('questionCard').style.display='';
  document.getElementById('finishCard').classList.remove('show');
  document.getElementById('sectionTag').textContent=q.section||'';
  document.getElementById('qBadge').textContent=q.type==='single'?'单选题':'多选题';
  document.getElementById('qBadge').className='q-badge '+(q.type==='single'?'single':'multi');
  document.getElementById('qNumber').textContent=`第 ${currentIndex+1} 题（共 ${questions.length} 题）`;
  document.getElementById('qText').textContent=q.question;
  document.getElementById('qScoreText').textContent=q.type==='single'?'1分':'2分';
  document.getElementById('currentNum').textContent=currentIndex+1;
  document.getElementById('progressBar').style.width=((currentIndex+1)/questions.length*100)+'%';
  document.getElementById('jumpSelect').value=currentIndex;
  const c=document.getElementById('optionsContainer');c.innerHTML='';
  q.options.forEach((opt,i)=>{const d=document.createElement('div');d.className='option';d.innerHTML=`<div class="opt-label">${optLabels[i]}</div><div class="opt-text">${opt}</div><div class="opt-icon"></div>`;d.addEventListener('click',()=>toggleOption(i,d));c.appendChild(d);});
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('confirmBtn').style.display='';document.getElementById('feedbackBtn').style.display='none';
  if(userAnswers[currentIndex]!==null){revealed=true;showResult(false);}else{revealed=false;document.getElementById('confirmBtn').disabled=false;}
}

function toggleOption(index,div) {
  if(revealed)return;const q=questions[currentIndex];
  if(q.type==='single'){document.querySelectorAll('.option').forEach(el=>el.classList.remove('selected'));div.classList.add('selected');userAnswers[currentIndex]=[index];}
  else{div.classList.toggle('selected');const s=[];document.querySelectorAll('.option').forEach((el,i)=>{if(el.classList.contains('selected'))s.push(i);});userAnswers[currentIndex]=s.length>0?s:null;}
  document.getElementById('confirmBtn').disabled=!userAnswers[currentIndex]||userAnswers[currentIndex].length===0;
}

function confirmAnswer() {
  if(revealed){const a=userAnswers.every(a=>a!==null);if(a)showFinish();else nextQuestion();return;}
  if(!userAnswers[currentIndex])return;revealed=true;showResult(true);
}

function showResult(isConfirm) {
  const q=questions[currentIndex],ua=userAnswers[currentIndex].slice().sort(),ca=q.answer.slice().sort();
  const ok=ua.length===ca.length&&ua.every((v,i)=>v===ca[i]);
  if(isConfirm){if(ok)score+=q.type==='single'?1:2;else if(q.type==='multi'&&ua.length>0){const w=ua.filter(a=>!ca.includes(a));if(w.length===0){score+=Math.round(ua.filter(a=>ca.includes(a)).length*0.5*10)/10;}}document.getElementById('scoreDisplay').textContent=score;}
  document.querySelectorAll('.option').forEach((el,i)=>{el.classList.add('disabled');if(ca.includes(i)){if(ua.includes(i))el.classList.add('correct');else el.classList.add('reveal-correct');el.querySelector('.opt-icon').textContent='✓';}else if(ua.includes(i)){el.classList.add('wrong');el.querySelector('.opt-icon').textContent='✗';}});
  if(ok){const p=q.type==='single'?1:2;document.getElementById('expAnswer').innerHTML=`<span style="color:#38a169">✓ 回答正确！+${p}分</span>`;}
  else{let ps=0;if(q.type==='multi'&&ua.length>0){const w=ua.filter(a=>!ca.includes(a));if(w.length===0)ps=Math.round(ua.filter(a=>ca.includes(a)).length*0.5*10)/10;}document.getElementById('expAnswer').innerHTML=`<span style="color:#e53e3e">✗ 回答错误${ps>0?'（部分正确 +'+ps+'分）':''}。正确答案：${ca.map(a=>optLabels[a]).join('')}</span>`;}
  document.getElementById('expAnalysis').innerHTML=`<div class="ea-title">📝 解析</div>${q.analysis}`;
  if(q.memory){document.getElementById('expMemory').innerHTML=`<div class="em-title">💡 记忆技巧</div>${q.memory}`;document.getElementById('expMemory').style.display='block';}else{document.getElementById('expMemory').style.display='none';}
  document.getElementById('explanation').classList.add('show');
  document.getElementById('confirmBtn').textContent='下一题 ▶';document.getElementById('confirmBtn').style.display='';document.getElementById('feedbackBtn').style.display='';
  if(isConfirm){const a=userAnswers.every(a=>a!==null);if(a)document.getElementById('confirmBtn').textContent='查看结果 🎉';}
}

function nextQuestion() { if(currentIndex<questions.length-1){currentIndex++;renderQuestion();} }

function showFinish() {
  document.getElementById('questionCard').style.display='none';
  document.getElementById('finishCard').classList.add('show');
  const t=questions.reduce((s,q)=>s+(q.type==='single'?1:2),0),w=[];
  questions.forEach((q,i)=>{if(userAnswers[i]===null)return;const u=userAnswers[i].slice().sort(),c=q.answer.slice().sort();if(!(u.length===c.length&&u.every((v,j)=>v===c[j])))w.push(i+1);});
  document.getElementById('finalScore').textContent=`${score} / ${t}`;
  document.getElementById('finalDetail').textContent=`共${questions.length}题，答对${questions.length-w.length}题，答错${w.length}题`;
  document.getElementById('reviewBtn').style.display=w.length>0?'':'none';
}

function resetQuiz() { currentIndex=0;score=0;revealed=false;userAnswers=new Array(questions.length).fill(null);feedbackList=[];document.getElementById('scoreDisplay').textContent='0';renderQuestion(); }

function openReview() {
  const l=document.getElementById('reviewList');l.innerHTML='';let h=false;
  questions.forEach((q,i)=>{if(userAnswers[i]===null)return;const u=userAnswers[i].slice().sort(),c=q.answer.slice().sort();
  if(!(u.length===c.length&&u.every((v,j)=>v===c[j]))){h=true;const d=document.createElement('div');d.className='review-item';d.innerHTML=`<div class="ri-q">${i+1}. ${q.question}</div><div class="ri-row ri-user">你的答案：${u.map(a=>optLabels[a]).join('')}</div><div class="ri-row ri-correct">正确答案：${c.map(a=>optLabels[a]).join('')}</div><div class="ri-kp">📝 ${q.analysis}</div>`;d.style.cursor='pointer';d.addEventListener('click',()=>{closeReview();currentIndex=i;renderQuestion();});l.appendChild(d);}});
  if(!h)l.innerHTML='<div class="review-empty">🎉 全部正确，没有错题！</div>';
  document.getElementById('reviewModal').classList.add('show');
}
function closeReview(){document.getElementById('reviewModal').classList.remove('show');}
function openFeedback(){document.getElementById('feedbackText').value='';document.getElementById('feedbackModal').classList.add('show');}
function closeFeedback(){document.getElementById('feedbackModal').classList.remove('show');}
function submitFeedback(){const t=document.getElementById('feedbackText').value.trim();if(!t)return;feedbackList.push({qIndex:currentIndex,question:questions[currentIndex].question,content:t});closeFeedback();}
function openFeedbackSummary(){const l=document.getElementById('feedbackSummaryList');l.innerHTML='';feedbackList.forEach(fb=>{const d=document.createElement('div');d.className='fb-item';d.innerHTML=`<div class="fb-q">第${fb.qIndex+1}题：${fb.question}</div><div class="fb-content">${fb.content}</div>`;l.appendChild(d);});document.getElementById('feedbackSummaryModal').classList.add('show');}
function closeFeedbackSummary(){document.getElementById('feedbackSummaryModal').classList.remove('show');}

initPassword();

</script>
</body>
</html>
