<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: #2d3748; }
.container { max-width: 800px; margin: 0 auto; padding: 20px 16px; }
.top-bar { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 20px 24px; margin-bottom: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); backdrop-filter: blur(10px); }

.stats-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.progress-info { flex: 1; min-width: 200px; }

.score-box { display: flex; align-items: center; gap: 6px; background: linear-gradient(135deg, #f6ad55, #ed8936); color: white; padding: 8px 18px; border-radius: 10px; font-size: 16px; font-weight: 700; white-space: nowrap; }
.score-box .label { font-weight: 400; font-size: 13px; opacity: 0.9; }
.jump-select { padding: 8px 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 14px; color: #4a5568; background: #f7fafc; cursor: pointer; outline: none; transition: border-color 0.2s; }
.jump-select:focus { border-color: #667eea; }
.question-card { background: rgba(255,255,255,0.97); border-radius: 16px; padding: 28px 28px 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); transition: all 0.3s ease; }
.q-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.q-badge { display: inline-block; padding: 3px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; color: white; }
.q-badge.single { background: linear-gradient(135deg, #48bb78, #38a169); }
.q-badge.multi { background: linear-gradient(135deg, #4299e1, #3182ce); }
.q-score { font-size: 12px; color: #a0aec0; }
.q-number { font-size: 15px; font-weight: 700; color: #4a5568; margin-bottom: 14px; }
.q-text { font-size: 16px; line-height: 1.75; color: #2d3748; margin-bottom: 20px; }
.options { display: flex; flex-direction: column; gap: 10px; }
.option { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; transition: all 0.2s ease; user-select: none; }
.option:hover { border-color: #a3bffa; background: #f7faff; }
.option.selected { border-color: #5a67d8; background: #ebf4ff; }
.option.correct { border-color: #48bb78; background: #f0fff4; }
.option.wrong { border-color: #fc8181; background: #fff5f5; }
.option.reveal-correct { border-color: #48bb78; background: #f0fff4; }
.option.disabled { pointer-events: none; }
.opt-label { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; border: 2px solid #cbd5e0; color: #718096; transition: all 0.2s; }
.option.selected .opt-label { background: #5a67d8; color: white; border-color: #5a67d8; }
.option.correct .opt-label { background: #48bb78; color: white; border-color: #48bb78; }
.option.wrong .opt-label { background: #fc8181; color: white; border-color: #fc8181; }
.option.reveal-correct .opt-label { background: #48bb78; color: white; border-color: #48bb78; }
.opt-text { font-size: 15px; line-height: 1.6; padding-top: 2px; color: #4a5568; }
.opt-icon { flex-shrink: 0; width: 22px; height: 22px; border-radius: 4px; display: none; align-items: center; justify-content: center; font-size: 14px; color: white; margin-left: auto; }
.option.correct .opt-icon { display: flex; background: #48bb78; }
.option.wrong .opt-icon { display: flex; background: #fc8181; }
.explanation { margin-top: 20px; padding: 18px 20px; border-radius: 12px; background: #f7fafc; border-left: 4px solid #5a67d8; display: none; animation: fadeIn 0.3s ease; }
.explanation.show { display: block; }
.explanation .exp-title { font-size: 14px; font-weight: 700; color: #5a67d8; margin-bottom: 8px; }
.explanation .exp-answer { font-size: 15px; color: #2d3748; margin-bottom: 6px; }
.explanation .exp-answer span { font-weight: 700; }
.explanation .exp-analysis { font-size: 14px; color: #2c5282; margin-top: 10px; line-height: 1.7; padding: 10px 14px; background: #ebf8ff; border-radius: 8px; border-left: 3px solid #4299e1; }
.explanation .exp-analysis .ea-title { font-weight: 700; color: #2b6cb0; }
.explanation .exp-memory { font-size: 14px; color: #744210; margin-top: 12px; line-height: 1.7; padding: 10px 14px; background: #fffff0; border-radius: 8px; border-left: 3px solid #d69e2e; }
.explanation .exp-memory .em-title { font-weight: 700; color: #975a16; }
.btn-area { display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end; }
.btn { padding: 12px 32px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; box-shadow: 0 4px 14px rgba(102, 126, 234, 0.4); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-secondary { background: #fff; color: #e53e3e; border: 2px solid #fed7d7; }
.btn-secondary:hover { background: #fff5f5; border-color: #fc8181; }
.btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
.finish-card { background: rgba(255,255,255,0.97); border-radius: 16px; padding: 48px 32px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); text-align: center; display: none; }
.finish-card.show { display: block; }
.finish-card .trophy { font-size: 64px; margin-bottom: 16px; }
.finish-card h2 { font-size: 24px; color: #2d3748; margin-bottom: 8px; }
.finish-card .final-score { font-size: 48px; font-weight: 800; color: #5a67d8; margin: 16px 0; }
.finish-card .final-detail { font-size: 14px; color: #718096; margin-bottom: 24px; line-height: 1.8; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: white; border-radius: 16px; padding: 32px; width: 90%; max-width: 460px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); animation: fadeIn 0.25s ease; }
.modal h3 { font-size: 18px; color: #2d3748; margin-bottom: 16px; }
.modal textarea { width: 100%; height: 120px; border: 2px solid #e2e8f0; border-radius: 10px; padding: 12px; font-size: 14px; resize: vertical; outline: none; font-family: inherit; }
.modal textarea:focus { border-color: #667eea; }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
.modal-btns .btn { padding: 10px 24px; font-size: 14px; }
.review-modal { background: white; border-radius: 16px; padding: 0; width: 92%; max-width: 600px; max-height: 80vh; box-shadow: 0 20px 60px rgba(0,0,0,0.2); animation: fadeIn 0.25s ease; display: flex; flex-direction: column; overflow: hidden; }
.review-modal .review-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }
.review-modal .review-header h3 { margin-bottom: 0; font-size: 18px; color: #e53e3e; }
.review-modal .review-close { width: 32px; height: 32px; border: none; background: #f7fafc; border-radius: 50%; font-size: 18px; cursor: pointer; color: #718096; display: flex; align-items: center; justify-content: center; }
.review-modal .review-close:hover { background: #edf2f7; }
.review-modal .review-list { padding: 16px 24px 24px; overflow-y: auto; flex: 1; }
.review-item { background: #fff5f5; border: 1px solid #fed7d7; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.review-item:last-child { margin-bottom: 0; }
.review-item .ri-q { font-size: 14px; font-weight: 600; color: #2d3748; margin-bottom: 8px; line-height: 1.6; }
.review-item .ri-row { font-size: 13px; margin-bottom: 4px; line-height: 1.5; }
.review-item .ri-user { color: #e53e3e; }
.review-item .ri-correct { color: #38a169; }
.review-empty { text-align: center; padding: 40px 20px; color: #38a169; font-size: 18px; }
.fb-item { background: #fffff0; border: 1px solid #fefcbf; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.fb-item:last-child { margin-bottom: 0; }
.fb-item .fb-q { font-size: 14px; font-weight: 600; color: #2d3748; margin-bottom: 8px; line-height: 1.6; }
.fb-item .fb-content { font-size: 13px; color: #c05621; background: rgba(237, 137, 54, 0.08); padding: 10px 14px; border-radius: 8px; line-height: 1.6; }
.password-overlay { position: fixed; inset: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); z-index: 999; display: flex; align-items: center; justify-content: center; transition: opacity 0.4s ease; }
.password-overlay.hidden { opacity: 0; pointer-events: none; }
.password-card { background: white; border-radius: 20px; padding: 40px 36px; width: 90%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; }
.password-card .lock-icon { font-size: 48px; margin-bottom: 16px; }
.password-card h2 { font-size: 20px; color: #2d3748; margin-bottom: 6px; }
.password-card p { font-size: 14px; color: #a0aec0; margin-bottom: 24px; }
.password-card input { width: 100%; padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; text-align: center; letter-spacing: 4px; outline: none; transition: border-color 0.2s; }
.password-card input:focus { border-color: #667eea; }
.password-card .pw-error { color: #e53e3e; font-size: 13px; margin-top: 10px; min-height: 20px; }
.password-card .pw-btn { margin-top: 16px; width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
.password-card .pw-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(102,126,234,0.4); }
.password-card .pw-btn:active { transform: translateY(0); }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
</style>

<body>
<div class="password-overlay" id="passwordOverlay">
  <div class="password-card">
    <div class="lock-icon">🔒</div>
    <h2>请输入访问密码</h2>
    <p>本页面仅限授权用户使用</p>
    <input type="password" id="pwInput" placeholder="请输入密码" autocomplete="off">
    <div class="pw-error" id="pwError"></div>
    <button class="pw-btn" id="pwBtn">进 入</button>
  </div>
</div>
<div class="container">
  <div class="top-bar">
    <h1>📚 第1章 建设工程项目组织、规划与控制</h1>
    <div class="section-tag" id="sectionTag"></div>
    <div class="stats-row">
      <div class="progress-info">
        <div class="progress-text">做题进度：<span id="currentNum">1</span> / <span id="totalNum">125</span></div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
      </div>
      <div class="score-box"><span class="label">得分</span><span id="scoreDisplay">0</span></div>
      <select class="jump-select" id="jumpSelect" title="跳转到指定题目"></select>
    </div>
  </div>
  <div class="question-card" id="questionCard">
    <div class="q-header">
      <span class="q-badge" id="qBadge">单选题</span>
      <span class="q-score" id="qScoreText"></span>
    </div>
    <div class="q-number" id="qNumber"></div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="optionsContainer"></div>
    <div class="explanation" id="explanation">
      <div class="exp-title">📝 解析</div>
      <div class="exp-answer" id="expAnswer"></div>
      <div class="exp-analysis" id="expAnalysis"></div>
      <div class="exp-memory" id="expMemory"></div>
    </div>
    <div class="btn-area">
      <button class="btn btn-secondary" id="feedbackBtn" style="display:none" onclick="openFeedback()">⚠️ 题目/答案反馈</button>
      <button class="btn btn-primary" id="confirmBtn" onclick="confirmAnswer()">确定</button>
    </div>
  </div>
  <div class="finish-card" id="finishCard">
    <div class="trophy">🎉</div>
    <h2>练习完成！</h2>
    <div class="final-score" id="finalScore">0</div>
    <div class="final-detail" id="finalDetail"></div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-secondary" id="reviewBtn" onclick="openReview()" style="margin:0">❌ 查看错题</button>
      <button class="btn btn-secondary" id="feedbackSummaryBtn" onclick="openFeedbackSummary()" style="margin:0;display:none">⚠️ 反馈汇总</button>
      <button class="btn btn-primary" onclick="resetQuiz()" style="margin:0">🔄 重新做题</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="feedbackModal">
  <div class="modal">
    <h3>⚠️ 题目/答案反馈</h3>
    <p style="font-size:14px;color:#718096;margin-bottom:12px;">请描述您认为有误的题目或答案，我们会尽快核实修正。</p>
    <textarea id="feedbackText" placeholder="请输入您发现的问题..."></textarea>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeFeedback()">取消</button>
      <button class="btn btn-primary" onclick="submitFeedback()">提交</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="reviewModal">
  <div class="review-modal">
    <div class="review-header">
      <h3>❌ 错题汇总</h3>
      <button class="review-close" onclick="closeReview()">✕</button>
    </div>
    <div class="review-list" id="reviewList"></div>
  </div>
</div>
<div class="modal-overlay" id="feedbackSummaryModal">
  <div class="review-modal">
    <div class="review-header">
      <h3>⚠️ 反馈汇总</h3>
      <button class="review-close" onclick="closeFeedbackSummary()">✕</button>
    </div>
    <div class="review-list" id="feedbackSummaryList"></div>
  </div>
</div>
<script>
const questions = [
  {type:'single',question:'根据《国务院关于加强固定资产投资项目资本金管理的通知》，基础设施领域项目通过发行权益型、股权类金融工具筹措的资本金，不得超过项目资本金总额的（ ）。',options:['20%', '30%', '40%', '50%'],answer:[3],analysis:'根据《国务院关于加强固定资产投资项目资本金管理的通知》，基础设施领域和国家鼓励发展的行业项目，鼓励项目法人和项目投资方通过发行权益型、股权类金融工具筹措资本金，但不得超过项目资本金总额的50%。',memory:'【数字联想】权益融资上限50%——"五五开"，半壁江山顶天了。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'关于项目资本金的说法，正确的是（ ）。',options:['项目资本金是债务性资金', '项目法人承担项目资本金的利息', '投资者可抽回项目资本金', '投资者可转让项目资本金'],answer:[3],analysis:'根据《国务院关于加强固定资产投资项目资本金管理的通知》，项目资本金作为项目总投资中由投资者认缴的出资额，对投资项目来说必须是非债务性资金，项目法人不承担这部分资金的任何债务和利息；投资者可按其出资比例依法享有所有者权益，也可转让其出资，但不得以任何方式抽回。',memory:'【口诀】"非债不息不可抽，转让可以走"——资本金四大特征：非债务性、不担利息、不可抽回、可转让。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'根据《国务院关于固定资产投资项目试行资本金制度的通知》，铁路、公路项目，项目资本金占项目总投资的最低比例为（ ）。',options:['20%', '25%', '30%', '35%'],answer:[0],analysis:'城市轨道交通项目，港口、沿海及内河航运项目，铁路、公路项目，保障性住房和普通商品住房项目，玉米深加工项目，电力等其他项目，项目资本金占项目总投资的最低比例为20%',memory:'【归类】铁路公路与轨道、港口、保障房同属最低20%。口诀："铁公基，两成起"。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'根据《国务院关于固定资产投资项目试行资本金制度的通知》，除国家对采用高新技术成果有特别规定外，固定资产投资项目资本金中以工业产权、非专利技术作价出资的比例不得超过该项目资本金总额的（ ）。',options:['10%', '15%（Kimmy真帅）', '20%', '50%'],answer:[2],analysis:'以工业产权、非专利技术作价出资的比例不得超过投资项目资本金总额的20%，国家对采用高新技术成果有特别规定的除外。',memory:'【对比】权益融资上限50% vs 无形资产出资上限20%。口诀："股权五成顶，技术两成封"。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'根据《国务院关于投资体制改革的决定》，实行核准制的项目，企业仅需向政府提交（ ）。',options:['项目建议书', '项目可行性研究报告', '项目申请书', '开工报告'],answer:[2],analysis:'企业投资建设实行核准制的项目，仅需向政府提交项目申请书，不再经过批准项目建议书、可行性研究报告和开工报告的程序。',memory:'【口诀】"目录以内核核准(交申请书)，目录以外备案"——核准制交申请书。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'根据《国务院关于投资体制改革的决定》，对于采用资本金注入方式的政府投资工程项目，政府投资主管部门需要严格审批的内容是（ ）。',options:['资金申请报告和施工方案', '初步设计和概算', '施工组织设计和预算', '预算和开工报告'],answer:[1],analysis:'政府投资项目（直接投资和资本金注入），审批项目建议书和可行性研究报告，除特殊情况外，不再审批开工报告，但要严格审批初步设计和概算。',memory:'【口诀】政府直投+资本金注入："建议书+可研"审批，"初设+概算"严审。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'根据《国务院关于投资体制改革的决定》，对于采用投资补助、转贷和贷款贴息方式的政府投资项目，政府投资主管部门只审批（ ）。',options:['项目建议书', '项目可行性研究报告', '项目申请书', '资金申请报告'],answer:[3],analysis:'对于企业使用政府补助、转贷、贴息投资建设的项目，政府只审批资金申请报告。',memory:'【口诀】"补助转贷贴息，只审资金申请"——只批资金申请报告。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'根据《国务院关于投资体制改革的决定》，对于企业投资《政府核准的投资项目目录》以外的项目，投资决策实行的制度是（ ）。',options:['审批制', '核准制', '备案制', '公示制'],answer:[2],analysis:'对《政府核准的投资项目目录》以外的企业投资项目，实行备案制。',memory:'【关键词】目录之外=备案制。"目录以内核准，目录以外备案"。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'固定资产投资项目的资本金是指在项目总投资中的（ ）。',options:['建筑安装工程费用与设备及工器具费用总和', '铺底流动资金', '建筑安装工程费用', '投资者认缴的出资额'],answer:[3],analysis:'资本金是指在项目总投资中由投资者认缴的出资额。',memory:'【定义】资本金=投资者认缴的出资额。关键词：认缴、出资额、非债务。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'对于采用资本金注入方式的政府投资项目，投资决策主管部门需从投资决策角度审批文件是（ ）。',options:['项目建议书和可行性研究报告', '可行性报告和资金概算报告', '初步设计和开工报告', '项目建议书和初步设计'],answer:[0],analysis:'投资决策阶段的文件包括项目建议书和可行性研究报告。初步设计和概算是设计阶段的文件，不属于投资决策角度审批的核心内容。',memory:'【口诀】"投资决策两件事：建议书+可研"——审批建议书和可研报告。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'公路、铁路、城建、社会民生等领域的补短板基础设施项目，在投资回报机制明确、收益可靠、风险可控的前提下，可以适当降低项目最低资本金比例，但下调不得超过（ ）百分点。',options:['3', '5', '6', '10'],answer:[1],analysis:'公路、铁路、城建、物流、生态环保、社会民生等领域的补短板基础设施项目，在满足条件的前提下可适当降低资本金比例，但下调不得超过五个百分点。',memory:'【数字】补短板基建项目资本金下调不超过5个百分点。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'根据《国务院关于调整固定资产投资项目资本金比例的通知》，投资项目资本金最低比例要求为 40% 的是（ ）。',options:['钢铁、电解铝项目', '水泥项目', '机场项目', '普通商品住房项目'],answer:[0],analysis:'钢铁、电解铝项目资本金比例为40%；水泥项目为 35%；机场项目为 25%；普通商品住房项目为 20%。',memory:'【排序】钢铁电解铝40% > 水泥35% > 机场25% > 住房20%。口诀："钢四水三五二五"。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'对于实行项目资本金制度的投资项目，用来确定资本金的项目总投资是指该投资项目的（ ）之和。',options:['固定资产投资与全部流动资金', '固定资产投资与铺底流动资金', '建设投资与建设期贷款利息', '工程费用与预备费'],answer:[1],analysis:'所谓项目资本金，是指在项目总投资中由投资者认缴的出资额。这里的总投资，是指投资项目的固定资产投资与铺底流动资金之和。',memory:'【定义】总投资=固定资产投资+铺底流动资金。注意"铺底"非"全部"。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'（ ）是工程建设实施阶段的首要环节，在工程建设中发挥龙头作用。',options:['竣工验收', '工程勘察设计', '建设准备', '工程施工'],answer:[1],analysis:'工程勘察设计是工程建设实施阶段的首要环节，为工程施工提供依据，发挥龙头作用。',memory:'【口诀】"勘察设计是龙头，造价重点看设计"。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'工程建设实施程序中，确定和控制工程造价的重点阶段是（ ）。',options:['竣工验收', '工程设计（Kimmy真帅）', '建设准备', '工程施工'],answer:[1],analysis:'工程设计阶段是技术与经济结合的关键，是确定和控制工程造价的重点阶段。',memory:'【口诀】"造价重点在设计"——设计阶段是确定和控制造价的重点阶段。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'工程总概算是在（ ）阶段编制。',options:['可行性研究', '初步设计', '技术设计', '施工图设计'],answer:[1],analysis:'工程总概算应在初步设计阶段编制，用于控制项目总投资。',memory:'【口诀】"初设编概算，施工图编预算"。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'对于政府投资项目，当投资概算超过（ ）时，项目单位应当向相关部门报告。',options:['投资估算的 10%', '投资估算的 20%', '工程总概算的 10%', '工程总概算的 20%'],answer:[0],analysis:'对于政府投资项目，经批准的投资概算是投资控制的最高限额。如因条件变化导致投资概算超过投资估算的 10%，项目单位应当向相关部门报告。',memory:'【数字】"概算超估算10%，超过就要报告"。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'关于建设程序中各阶段工作的说法，错误的是（ ）。',options:['在初步设计或技术设计的基础上进行施工图设计，使其达到施工安装的要求', '工程开始拆除旧建筑物和搭建临时建筑物时即可算作工程的正式开工', '生产准备阶段是由建设阶段转入生产经营阶段的重要衔接阶段', '竣工验收是考核建设成果、检验设计和施工质量的关键步骤'],answer:[1],analysis:'建设工程新开工时间是指工程设计文件中规定的任何一项永久性工程第一次正式破土开槽的开',memory:'【关键词】"正式破土开槽"才算开工，拆旧建临时不算。记住"永久性工程"。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'建设工程缺陷责任期的起算时间是（ ）之日。',options:['工程质量评估报告提交', '工程预验收合格', '工程接收证书颁发', '工程竣工验收合格'],answer:[3],analysis:'竣工合格之日起进入缺陷责任期',memory:'【口诀】"缺陷责任竣工算"——缺陷责任期从竣工验收合格之日起算。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'下列工作内容中，属于工程建设实施阶段的是（ ）。',options:['可行性研究和初步设计', '投资估算和设计概算', '初步设计和工程施工', '工程施工和工程保修'],answer:[2],analysis:'可行性研究、投资估算属于投资决策阶段；D 中的工程保修属于运营维护阶段。',memory:'【分类】实施阶段：勘察设计→建设准备→施工→生产准备→竣工验收。可研属决策阶段。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'建设工程开工时间是指工程建设文件中规定的任何一项永久性工程（ ）的时间。',options:['施工场地既有建筑物开始拆除', '施工场地平整或临时设施开始施工', '施工用临时道路开始施工', '第一次正式破土开槽开始施工'],answer:[3],analysis:'工程开工时间是指该工程设计文件中规定的任何一项永久性工程第一次正式破土开槽开始施工的时间。不需开槽的工程，正式开始打桩的时间就是开工时间。',memory:'【口诀】"开工看破土开槽，不开槽看打桩"——永久性工程第一次正式破土开槽。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'工程质量监督机构收到建设工程质量监督的申报手续，并对有关文件进行审查，审查合格后签发（ ）。',options:['质量监督文件', '施工许可证', '质量监督报告', '监督计划方案'],answer:[0],analysis:'工程质量监督机构收到建设工程质量监督的申报手续，并对有关文件进行审查，审查合格后签发质量监督文件。工程竣工验收工作结束后，工程质量监督机构应出具工程质量监督报告。',memory:'【口诀】"申报签文件，验收出报告"——开工前签发质量监督文件，竣工后出具监督报告。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'建设工程的实体质量监督以（ ）方式为主，并辅以科学的检测手段。',options:['检测', '巡查', '检查', '抽查'],answer:[3],analysis:'建设工程的实体质量监督以抽查方式为主，并辅以科学的检测手段',memory:'【口诀】"实体监督抽查为主"——工程实体质量监督以抽查方式为主。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'下列 BOT 演变形式中，项目所在国政府将已投产运行的项目在一定期限内移交给外商经营，以项目在该期限内的现金流量为标的，一次性地从外商处筹得一笔资金，用于建设新项目的方式是（ ）。',options:['TOT', 'TBT', 'ROT', 'DBFOT'],answer:[0],analysis:'TOT（移交－经营－移交）出售现有投产项目在一定期限内的现金流量（转让已建成项目的产权和经营权），从而获得资金来建设新项目',memory:'【口诀】"TOT=转让已建项目"——卖现有项目现金流量权来建新项目。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'工程质量监督申报手续应在工程项目（ ）向工程质量监督机构办理。',options:['开工之日起 7 日内，由建设单位', '开工前，由建设单位', '开工前，由施工单位', '开工之日起 7 日内，由施工单位'],answer:[1],analysis:'工程开工前，建设单位办理工程质量监督手续',memory:'【口诀】"开工前办监督"——建设单位在开工前办理质量监督手续。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'关于工程总承包模式的特点，下列说法正确的是（ ）。',options:['不利于缩短建设周期', '工程项目责任主体多', '便于建设单位提前确定工程造价', '建设单位前期工作量小'],answer:[2],analysis:'选项 A 错误，有利于缩短建设工期。选项 B 错误，工程项目责任主体单一化。选项 D 错误，建设单位前期工作量大。',memory:'【对比】总承包优点：缩工期、控造价、合同简单；缺点：前期工作量大。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'项目后评价是工程（    ）阶段的延伸，根据规定需每年选取一定数量项目开展',options:['投资决策', '建设实施', '运营维护', '投产使用'],answer:[1],analysis:'项目后评价是工程建设实施阶段的延伸',memory:'【口诀】"后评价是实施的延伸"——项目后评价是工程建设实施阶段的延伸。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'建设工程采用平行承包模式的特点是（ ）。',options:['有利于缩短建设工期', '不利于控制工程质量', '业主组织管理简单', '工程造价控制难度小'],answer:[0],analysis:'选项 B 错误，平行承包模式有利于质量控制。选项 C 错误，业主组织管理和协调工作量大，要求建设单位具有较强的组织协调能力。选项 D 错误，平行承包模式下，工程造价控制难度大。',memory:'【对比】平行承包：业主协调量大、造价控制难，但有利于质量和择优。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'工程项目承包模式中，建设单位组织协调工作量小，但风险较大的是（ ）。',options:['总分包模式', '合作体承包模式', '平行承包模式', '联合体承包模式'],answer:[1],analysis:'选项 C 错误，平行承包模式下建设单位协调工作量大。选项 A、D 错误，联合体承包模式下，建设单位的风险相对较小，不符合题意。合作体模式的特点：①建设单位：组织协调工作量小，风险较大。②合作体：各承包单位之间既有合作的愿望，又不愿意组成联合体。',memory:'【口诀】"合作体协调小风险大"——合作体分别签合同风险大；联合体联合签合同风险小。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'关于 CM 承包模式的说法，正确的是（ ）。',options:['使工程项目实现有条件的 “边设计，边施工”', '在工程设计全部结束之后，进行施工招标', 'CM 模式适用于实施周期短的大型复杂工程', '所有分包无须通过招标的方式展开竞争'],answer:[0],analysis:'选项 B 错误，设计尚未结束就开始施工招标。选项 C 错误，CM 模式适合实施周期长、工期要求紧迫的大型复杂工程。选项 D 错误，所有分包通过招标方式选择。',memory:'【口诀】"CM=边设计边施工"——设计未结束就开始施工招标，适合工期紧迫的大型复杂工程。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'非代理型CM 合同中，关于保证工程最大费用值（GMP）的说法，正确的是（ ）。',options:['GMP 为合同承包总价', '节约的 GMP 全部归 CM 承包商', '节约的 GMP 全部归业主', '工程实际总费用超过 GMP 的部分由 CM 承包商承担'],answer:[3],analysis:'选项 A 错误，GMP 为工程最大费用值。选项 B、C 错误，节约的部分归建设单位，CM 单位可获得部分分奖励。',memory:'【口诀】"GMP节约归业主，CM可拿奖"——超GMP部分由CM承担。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'政府建设主管部门对工程项目实施质量监督，其工作包括：①组织安排工程质量监督准备工作；②组织实施工程竣工验收质量监督；③审核办理工程质量监督手续；④组织实施工程施工质量监督。正确的监督程序是（ ）。',options:['③—④—①—②', '③—①—④—②', '①—③—④—②', '①—④—②—③'],answer:[1],analysis:'',memory:'【顺序】质量监督程序：③审核→①准备→④施工监督→②竣工监督。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'与传统的设计 - 招标 - 建造（DBB）模式相比，采用工程总承包模式的缺点是（ ）。',options:['建设单位前期工作量大', '建设单位合同管理负担重', '不利于缩短建设工期', '不利于建设单位控制工程造价'],answer:[0],analysis:'选项 B、C、D 错误，采用工程总承包模式，有利于缩短建设工期、控制造价；建设单位合同管理负担减轻。',memory:'【口诀】"总承包缺点：前期工作大"——相比DBB，总承包前期工作量大。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'建设工程采用 CM 模式时，CM 单位以（ ）身份进行项目管理。',options:['建设单位', '监理单位', '承包单位', '设计单位'],answer:[2],analysis:'CM模式是指由建设单位委托一家 CM 单位承担项目管理工作，该 CM 单位以承包单位的身份进行施工管理，并在一定程度上影响工程设计活动，组织快速路径的生产方式，使工程项目实现有条件的 “边设计、边施工”。',memory:'【口诀】"CM单位是承包商"——以承包单位身份进行项目管理。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'采用联合体方式承包工程时，对联合体各成员单位正确的要求是（ ）。',options:['共同与建设单位签订工程承包合同', '需要具有与工程规模相应的相同承包资质', '承担相同的工程承包合同义务和责任', '共同与建设单位签订联合体协议'],answer:[0],analysis:'选项 B、C 错误，联合体各方资质等级、承担的责任与义务可以不同；选项 D 错误，联合体协议是联合体各方共同签署。',memory:'【口诀】"联合体共同签合同，资质按低取"——各方资质可不同，共同与业主签一份合同。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'关于联合体承包模式，下列说法正确的是（ ）。',options:['建设单位合同结构复杂', '建设单位组织协调工程量大', '有利于增强联合体的能力及抗风险能力', '不利于建设单位控制工程造价和工期'],answer:[2],analysis:'联合体模式的特点见下表。合同签署：建设单位和联合体签署合同特点：（1）对建设单位：合同结构简单，组织协调工作量小，有利于造价和工期控制。（2）对联合体：可以集中各成员单位资金、技术和管理等方面的优势，增强了竞争能力，同时也增强了抗风险能力。',memory:'【对比】联合体模式：合同简单、协调量小、风险小、增强竞争力和抗风险能力。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'根据《建设工程监理范围和规模标准规定》，下列工程项目中，必须实行监理的是（ ）。',options:['总投资额为 1 亿元的服装厂改建项目', '总投资额为 400 万美元的联合国环境规划署援助项目', '总投资额为 2500 万元的垃圾处理项目', '建筑面积为 4 万 m² 的住宅建设项目'],answer:[1],analysis:'',memory:'【排除法】排除不够门槛的：①亿不够3000万、③2500万<3000万、④4万㎡<5万㎡。B=400万美元外援项目必须监理。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'下列工程项目中属于非强制监理的项目是（ ）。',options:['学校', '体育场馆', '影剧院', '自建农场养殖房'],answer:[3],analysis:'同上',memory:'【排除法】自建农场养殖房不属强制监理。学校、体育场馆、影剧院均属社会事业工程须监理。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'以下属于总监理工程师职责的有（ ）。',options:['参与验收分部工程', '组织工程竣工预验收', '参与审核分包单位资格', '进行见证取样'],answer:[1],analysis:'AC属于专家；D属于监理员',memory:'【口诀】"总监做组织"——B竣工预验收属总监职责；A分部验收属专监，D见证取样属监理员。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'根据《建设工程监理规范》GB/T 50319—2013，总监理工程师不得委托给总监理工程师代表的职责是（ ）。',options:['组织审查和处理工程变更', '参与工程质量事故的调查', '组织整理工程项目的监理文件资料', '检查监理人员工作'],answer:[1],analysis:'不能授权总监理工程师代表\n（1）组织编制监理规划，审批监理实施细则；（文件）\n（2）根据工程进展及监理工作情况调配监理人员；（人）\n（3）组织审查施工组织设计、（专项）施工方案；（文件）\n（4）签发工程开工令、暂停令和复工令；\n（5）签发工程款支付证书，组织审核竣工结算；（钱）\n（6）调解建设单位与施工单位的合同争议，处理工程索赔；（钱）\n（7）审查施工单位的竣工申请，组织工程竣工预验收，组织编写工程质量评估报告，参与工程竣工验收；\n（8）参与或配合工程质量安全事故的调查和处理',memory:'【口诀】"总监不委托八件事：规人施令钱争验故"——监理规划、调配人员、施工方案、开工令、支付证书、合同争议、竣工预验收、事故。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'下列监理机构人员的职责中，总监理工程师可以以书面授权委托给总监理工程师代表的是（ ）。',options:['签发工程开工令', '组织编写监理月报', '审批监理实施细则', '组织编写工程质量评估报告'],answer:[1],analysis:'同上题',memory:'【口诀】"可委托=日常事务"——编写监理月报可委托。签发开工令、审批细则、编写评估报告不可委托。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'监理员应承担的工作职责是（ ）。',options:['组织召开监理工作会议', '组织审查分包单位资格', '参与工程竣工预验收', '见证取样进场材料'],answer:[3],analysis:'AB属于总监理工程师职责；C属于专监工作职责',memory:'【口诀】"监理员做见证取样"——A组织会议属总监，B审查分包属总监，C参与预验收属专监。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'根据《建设工程监理规范》GB/T 50319—2013，不属于总监理工程师职责的是（ ）。',options:['检查监理人员工作', '进行工程计量', '组织编制监理规划', '确定项目监理机构人员'],answer:[1],analysis:'B属于专家工作职责',memory:'【排除法】B"进行工程计量"属于专业监理工程师职责，不属于总监。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'根据《建设工程监理规范》GB/T 50319—2013，不属于专业监理工程师职责的是（ ）。',options:['进行工程计量', '组织编写监理日志', '检查工序施工结果', '检查进场工程材料的质量'],answer:[2],analysis:'C属于监理员的工作职责',memory:'【排除法】C"检查工序施工结果"属于监理员职责，不属于专监。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'下列工程质量监督机构的主要任务中，属于对建设参与各方主体质量行为监督的是（ ）。',options:['监督检查建设工程主体结构的施工质量', '监督检查用于工程的主要建筑材料的质量', '检查工程质量保证资料是否准确完整', '检查质量管理体系和质量责任制的落实情况'],answer:[3],analysis:'ABC属于实体质量的检查',memory:'【口诀】"行为监督看制度落实"——ABC属实体质量检查，D属质量行为监督。',section:'1.1  工程项目投资管理与实施'},
  {type:'multi',question:'根据《国务院关于固定资产投资项目试行资本金制度的通知》，项目资本金可以用（ ）出资或作价出资。',options:['土地使用权', '工业产权', '现金', '非专利技术', '股权'],answer:[0, 1, 2, 3],analysis:'项目资本金可以用货币出资，也可以用实物、工业产权、非专利技术、土地使用权作价出资。',memory:'【口诀】"货币实物产权地"——货币、实物、工业产权、非专利技术、土地使用权出资。不含"现金"(书面用语"货币")、不含"股权"。',section:'1.1  工程项目投资管理与实施'},
  {type:'multi',question:'根据《国务院关于投资体制改革的决定》，不使用政府资金投资建设的企业投资，政府实行（ ）制度。',options:['审批制', '核准制', '承诺制', '备案制', '审查制'],answer:[1, 3],analysis:'对于企业不使用政府资金投资建设的项目，一律不再实行审批制，区别不同情况实行核准制和备案制',memory:'【口诀】"不用政府钱，核准备案选"——不再审批制，实行核准制和备案制。不含承诺制和审查制。',section:'1.1  工程项目投资管理与实施'},
  {type:'multi',question:'工程项目在开工建设之前要切实做好各项准备工作，下列属于建设准备工作的有（ ）。',options:['组建生产管理机构', '招聘和培训生产人员', '办理工程质量监督手续', '准备必要的施工图纸', '组织招标选择工程监理单位'],answer:[2, 3, 4],analysis:'在工程开工建设前，需要切实做好各项准备工作，这些准备工作包括：(1) 征地、拆迁和场地平整；(2) 完成施工用水、电、通信网络、交通道路等接通工作；(3) 准备必要的施工图纸；(4) 组织工程监理、施工及材料设备采购招标工作；(5) 办理施工许可证、工程质量监督等手续。',memory:'【口诀】"建设准备五件事：征地拆平、水电网路、准备图纸、招标采购、办证办监督"。AB属生产准备非建设准备。',section:'1.1  工程项目投资管理与实施'},
  {type:'multi',question:'工程勘察活动包括（ ）。',options:['工程测量', '施工图设计', '技术设计', '岩土地质勘察', '水文地质勘察'],answer:[0, 3, 4],analysis:'在工程勘察设计阶段进行的勘察活动，主要是为满足工程设计需要而进行的。\n①工程测量：为设计提供准确、可靠的空间数据;\n②岩土地质勘察：提出工程设计所需的地质技术参数，并对有关技术经济指标进行评价;\n③水文地质勘察：为工程设计提供水文依据。',memory:'【口诀】"勘察三件套：测量、岩土、水文"——排除施工图设计和技术设计（属设计活动）。',section:'1.1  工程项目投资管理与实施'},
  {type:'multi',question:'工程项目交付使用前，建设单位在生产准备阶段需要进行的工作有（ ）。',options:['落实原材料和燃料来源', '准备必要的施工图纸', '组织生产人员参加设备安装调试工作', '完成施工水电气等接通工作', '组织单位工程预验收'],answer:[0, 2],analysis:'根据工程项目种类不同，生产准备工作内容会存在差异。但一般应包括以下内容：①组建生产管理机构，制定生产管理制度；②招聘和培训生产人员，组织生产人员参加设备安装、调试和工程验收工作；③落实原材料、协作产品、燃料、水、电、气等来源和其他需协作配合的条件，并组织工装、器具、备品、备件等制造或订货等。',memory:'【口诀】"生产准备三步：组建机构、招聘培训、落实资源"——B图纸属建设准备，D水电气属建设准备，E预验收属竣工验收。',section:'1.1  工程项目投资管理与实施'},
  {type:'multi',question:'作为工程建设实施阶段的最后一个环节，工程竣工验收的基本作用有（ ）。',options:['结算全部工程款项', '全面检验工程质量', '全面进行工程项目后评价', '全面考核工程建设成果', '标志着投资成果转生产或使用'],answer:[1, 3, 4],analysis:'工程竣工验收是工程建设实施阶段最后一个环节，是投资成果转入生产或使用的标志，也是全面考核工程建设成果、检验工程质量的重要步骤。工程勘察、设计、施工、监理等单位应参加工程竣工验收。不同专业类别的工程竣工验收有着不同',memory:'【口诀】"验收三件事：考核成果、检验质量、转入使用"——结算全部款项和项目后评价不属于基本作用。',section:'1.1  工程项目投资管理与实施'},
  {type:'multi',question:'下列关于 PPP 项目及新机制的核心要求的说法，正确的有（ ）。',options:['采用政府和社会资本合作模式不得额外新增地方财政未来支出责任', '政府付费只能按规定补贴运营、补贴建设成本', '政府和社会资本合作应限定于有经营性收益的项目', '特许经营期限原则上不超过 50 年', '关系国计民生、公共属性较强的项目，民营企业股权占比原则上不低于 35%'],answer:[0, 2, 4],analysis:'政府和社会资本合作项目应聚焦使用者付费项目，明确收费渠道和方式，项目经营收入能够覆盖建设投资和运营成本，具备一定投资回报，不因采用政府和社会资本合作模式额外新增地方财政未来支出责任。政府可在严防新增地方政府隐性债务、符合法律法规和有关政策规定要求的前提下，按照一视同仁的原则，在项目建设期对使用者付费项目给予政府投资支持；政府付费只能按规定补贴运营、不能补贴建设成本。除此之外，不得通过可行性缺口补助、承诺保底收益率、可用性付费等任何方式，使用财政资金弥补项目建设和运营成本。政府和社会资本合作应限定于有经营性收益的项目，特许经营期限原则上不超过 40 年；关系国计民生、公共属性较强的项目，民营企业股权占比原则上不低于 35%。',memory:'【口诀】"PPP新机制：用户付费、不新增财政、限经营性收益、特许≤40年、民营≥35%"。B"补贴建设成本"错、D"50年"错。',section:'1.1  工程项目投资管理与实施'},
  {type:'multi',question:'关于合作体承包模式，下列说法正确的有（ ）。',options:['各施工单位分别与建设单位签订施工合同', '建设单位组织协调工作量大', '当合作体内某一施工单位倒闭破产时，其他成员单位及合作体机构承担其施工合同的经济责任和风险', '由于承包单位是一个合作体，各施工单位之间能相互协调，可减少建设单位组织协调工作量', '合作体各施工单位之间有合作愿望，彼此之间高度信任'],answer:[0, 3],analysis:'如果某一施工单位倒闭破产，风险会转嫁给建设单位。建设单位和合作体成员分别签署合同。对建设单位组织协调工作量小，风险较大。各承包单位之间既有合作的愿望，又不愿意组成联合体；彼此之间信任度不够。',memory:'【口诀】"合作体分别签合同、协调小风险大、信任不够"——B协调量大错、C承担风险错、D减少协调错、E高度信任错。',section:'1.1  工程项目投资管理与实施'},
  {type:'multi',question:'下列必须实行监理的工程范围是（ ）。',options:['学校', '影剧院', '总投资额为 2000 万元水运工程', '体育场馆', '国际组织贷款援助资金的工程'],answer:[0, 1, 3, 4],analysis:'必须实行监理\n①国家重点建设工程；\n②大中型公用事业工程（总投资额在3000万元以上的工程项目）；\n③成片开发建设的住宅小区工程（5万m2以上的住宅；高层住宅及地基、结构复杂的多层住宅）；\n④利用外国政府或者国际组织贷款、援助资金的工程；\n⑤国家规定必须实行监理的其他工程',memory:'【口诀】"强制监理五类：国家重点、公用≥3000万、住宅≥5万㎡、外资贷款、其他规定"——C水运2000万不够。',section:'1.1  工程项目投资管理与实施'},
  {type:'multi',question:'根据《建设工程监理规范》GB/T 50319—2013，专业监理工程师的职责有（ ）。',options:['检查进场的工程材料、构配件、设备的质量', '验收分项工程', '进行工程计量', '进行见证取样', '检查工序施工结果'],answer:[0, 1, 2],analysis:'',memory:'【口诀】"专监做：检查材料、验收分项、工程计量、见证取样、检查工序"。',section:'1.1  工程项目投资管理与实施'},
  {type:'multi',question:'施工准备及开工报审过程中，施工单位的主要工作是（ ）。',options:['主持召开图纸会审和设计交底会议', '报审施工组织设计', '报送工程开工报审表', '报审分包单位资格', '主持召开第一次工地会议'],answer:[1, 2, 3],analysis:'AE属于建设单位的主要工作',memory:'【口诀】"建设单位主持：图纸会审、第一次工地会议"——AE属建设单位，BCD属施工单位。',section:'1.1  工程项目投资管理与实施'},
  {type:'multi',question:'申请开工的工程需要具备的条件有（ ）。',options:['设计交底和图纸会审已完成', '施工组织设计已由总监理工程师签认', '施工单位现场质量、安全生产管理体系已建立', '进场道路及水、电、通信等已满足开工要求', '第一次工地会议已召开'],answer:[0, 1, 2, 3],analysis:'',memory:'【口诀】"开工四条件：图纸会审完成、施组总监签认、质安体系建立、水电路满足"。',section:'1.1  工程项目投资管理与实施'},
  {type:'multi',question:'分包工程开工前，项目监理机构对施工分包单位资格审核的基本内容包括（ ）。',options:['分包单位资质及其业绩', '分包单位专职管理人员和特种作业人员资格证书', '安全生产许可文件', '施工单位对分包单位的管理制度', '分包单位施工规划'],answer:[0, 1, 2],analysis:'',memory:'【口诀】"分包审核四样：资质业绩、人员资格、安全许可、管理制度"——E施工规划不属审核内容。',section:'1.1  工程项目投资管理与实施'},
  {type:'multi',question:'建设工程施工过程中，政府质量监督活动的内容有（ ）。',options:['检查参与工程建设各方的质量行为', '检查参与工程建设各方的质量责任制履行情况', '施工进度与合同履行情况', '工程质量保证资料', '审查参与工程建设各方人员资格证书'],answer:[0, 1, 3, 4],analysis:'政府质量监督主要是对工程实体质量、参建各方质量行为等进行监督检查，不负责监督施工进度与合同履行情况。',memory:'【口诀】"政府监督不监进度合同"——C"施工进度与合同履行"不属于监督内容。',section:'1.1  工程项目投资管理与实施'},
  {type:'multi',question:'在工程实践中，工程质量监督机构的工程质量监督检查内容主要包括（ ）。',options:['工程参建各方主体质量行为', '工程实体质量', '施工组织设计文件', '工程质量保证资料', '质量管理组织架构'],answer:[0, 1, 3],analysis:'',memory:'【口诀】"监督查三样：质量行为、实体质量、保证资料"——C施工组织设计和E质量管理组织架构不属主要检查。',section:'1.1  工程项目投资管理与实施'},
  {type:'multi',question:'建设单位在办理工程质量监督注册手续时需提供的资料有（ ）。',options:['中标通知书', '施工图预算', '工程施工合同', '施工组织设计', '监理规划'],answer:[0, 2, 3, 4],analysis:'',memory:'【排除法】B施工图预算和E监理规划不属于质量监督注册提交资料。',section:'1.1  工程项目投资管理与实施'},
  {type:'multi',question:'下列关于工程质量监督的说法，错误的有（ ）。',options:['工程质量监督报告必须由工程质量监督负责人签认', '核验工程质量保证资料的目的是为了验证工程实体质量', '工程开工前，建设单位需申请办理工程质量监督手续', '工程质量监督机构应对工程质量保证资料进行逐一检查', '工程竣工验收工作之前工程质量监督机构应出具工程质量监督报告'],answer:[3, 4],analysis:'工程质量监督机构对工程质量保证资料是抽查而非逐一检查，故 D 错误；工程质量监督报告是在竣工验收合格后出具，而非验收前，故 E 错误。',memory:'【口诀】"两个错误：逐一检查（应抽查）、验收前出报告（应验收后）"。',section:'1.1  工程项目投资管理与实施'},
  {type:'multi',question:'工程质量监督机构参加竣工验收时，对现场验收重点监督的内容有（ ）。',options:['验收组织形式', '验收方法', '验收程序', '标准规定的执行情况', '观感质量检查', '项目后评价是工程全寿命期管理的延伸', '列入后评价年度计划的项目应开展外部评审工作', '项目后评价针对我国所有在建工程', '项目后评价一般包括定性和定量相结合方法', '重大社会民生项目可列入后评价年度计划中'],answer:[0, 2, 3],analysis:'工程质量监督机构应参加建设单位组织的工程竣工验收，并对现场验收的组织形式、验收程序、执行标准规定等进行重点监督',memory:'【口诀】"验收监督三重点：组织形式、验收程序、执行标准"——B验收方法和E观感质量不属重点。',section:'1.1  工程项目投资管理与实施'},
  {type:'multi',question:'BOT 项目运作流程包括（ ）。',options:['项目策划', '特许权协议', '融资安排', '开发建设', '项目移交'],answer:[3, 4],analysis:'A错误：项目后评价是竣工验收和投产运营阶段的管理延伸，而非全寿命期管理的延伸。\nB错误：列入后评价年度计划的项目应开展自我总结评价，而非外部评审。\nC错误：项目后评价主要针对重大工程、新工艺、新设备项目，并非所有在建工程。',memory:'【口诀】"BOT五步：特许→融资→建设→经营→移交"——A"项目策划"不属于BOT运作流程。',section:'1.1  工程项目投资管理与实施'},
  {type:'multi',question:'下列关于项目的工程开工时间的说法，错误的有（ ）。',options:['设计中任何永久性工程破土开槽开始施工的时间', '既有建筑物拆除开始施工的时间', '铁路开始进行土方、石方工程的时间', '公路开始进行平整场地的时间', '施工队伍进场时间'],answer:[1, 2, 3, 4],analysis:'BOT 项目运作流程如下：A.特许权协议，即社会资本方组建项目公司，从政府部门获得 “特许权协议”，作为安排融资和项目开发建设的基础。B.融资安排，即项目公司以特许权协议为基础安排融资。C.开发建设，即由项目公司组织项目开发建设或发包给工程承包公司实施。D.项目经营，即由项目公司在特许经营期内负责项目运行、维修和保养，支付贷款本息并获得投资回报。E.项目移交，即由项目公司在特许经营期满后将项目移交给政府部门或其指定机构。',memory:'【排除法】不算开工的：B拆除、D平整场地、E队伍进场。AC为正确开工定义。',section:'1.1  工程项目投资管理与实施'},
  {type:'multi',question:'关于 CM 模式在工程造价控制方面的价值，下列说法正确的有（ ）。',options:['CM 单位赚取总包与分包之间的差价', '与施工总承包相比，合同价更合理', '施工合同总价一次确定，有利于控制造价', '工程设计与施工的早期结合，减少设计变更，从而减少分包单位因设计变更而提出的索赔', 'CM 单位与分包单位或供货单位的合同价是保密的'],answer:[1, 3, 4],analysis:'工程开工时间是指该工程设计文件中规定的任何一项永久性工程第一次正式破土开槽开始施工的时间。不需开槽的工程，正式开始打桩的时间就是开工时间。铁路、公路、水库等需要进行大量土石方工程的，以正式开始进行土方、石方工程的时间作为正式开工时间。',memory:'【口诀】"CM造价特点：合同价更合理、设计施工结合减少变更、分包合同价保密"——A错不赚差价，C错分批确定。',section:'1.1  工程项目投资管理与实施'},
  {type:'single',question:'业主方项目管理的进度目标是指(    )。',options:['项目竣工验收', '项目调试', '项目试生产', '项目交付使用'],answer:[3],analysis:'业主方项目管理是指站在业主角度，通过有效控制工程建设进度、质量和投资目标，最终实现工程项目的价值。其中，进度目标是指工程项目交付使用的时间目标。',memory:'【口诀】"业主进度目标=交付使用"——进度目标是工程项目交付使用的时间目标。',section:'1.2  工程项目管理组织与项目经理'},
  {type:'single',question:'工程总承包方项目管理中，试运行经理应依据合同约定，负责组织或协助(    )编制试运行方案，并应按试运行执行计划和方案的要求落实相关的技术、人员和物资。',options:['施工项目经理', '项目监理机构', '项目发包人', '使用单位'],answer:[2],analysis:'试运行经理应依据合同约定，负责组织或协助项目发包人编制试运行方案，并应按试运行执行计划和方案的要求落实相关的技术、人员和物资。',memory:'【口诀】"试运行经理协助发包人"——负责组织或协助项目发包人编制试运行方案。',section:'1.2  工程项目管理组织与项目经理'},
  {type:'single',question:'下列关于业主方项目管理的说法中，错误的是(    )。',options:['业主方项目管理是全过程的，包括工程项目投资决策、建设实施阶段和运营维护的各个环节', '对于大多数建设单位而言，自行进行项目管理往往存在很大的局限性', '建设单位完全可以依靠社会化的工程咨询单位，为其提供全过程的工程咨询服务', '工程监理单位接受建设单位委托，为其提供专业化服务也属于业主方项目管理'],answer:[0],analysis:'业主方项目管理是全过程的，包括工程项目投资决策和建设实施阶段各个环节，A选项错误。',memory:'【口诀】"业主方管理=投资决策+建设实施"——A选项"运营维护"错误。',section:'1.2  工程项目管理组织与项目经理'},
  {type:'single',question:'按照项目经理的权限不同，矩阵式组织结构可分为的三种形式是(    )。',options:['强矩阵式组织、线性矩阵式组织和弱矩阵式组织', '大矩阵式组织、中矩阵式组织和小矩阵式组织', '强矩阵式组织、职能矩阵式组织和弱矩阵式组织', '强矩阵式组织、中矩阵式组织和弱矩阵式组织'],answer:[3],analysis:'按照项目经理的权限不同，矩阵式组织结构又可分为三种形式：强矩阵式组织、中矩阵式组织和弱矩阵式组织。',memory:'【口诀】"矩阵三形式：强、中、弱"——按项目经理权限分。',section:'1.2  工程项目管理组织与项目经理'},
  {type:'single',question:'某施工项目管理组织机构图如下，其组织形式是(    )。',options:['直线式', '直线职能式', '职能式', '矩阵式'],answer:[0],analysis:'直线式组织结构是一种最简单的组织结构形式。在这种组织结构中，各种职位均按直线垂直排列，项目经理直接进行单线垂直领导。',memory:'【口诀】"直线式最简单，单线垂直管"——各种职位按直线垂直排列。',section:'1.2  工程项目管理组织与项目经理'},
  {type:'single',question:'关于工程项目管理组织机构特点的说法，正确的是(    )。',options:['矩阵制组织中项目成员受双重领导', '职能式组织中指令统一且职责清晰', '直线式组织中可实现专业化管理强', '矩阵式组织中项目成员仅对职能经理负责'],answer:[0],analysis:'职能组织结构存在多头领导，使下级执行者接受多方指令，容易造成职责不清，B选项错误；直线式组织结构无法实现管理工作专业化，不利于提高项目管理水平，C选项错误；矩阵式组织结构中每一位成员同时受项目经理和职能部门经理的双重领导，D选项错误。本题正确答案是A。',memory:'【口诀】"矩阵双重领导"——项目成员同时受项目经理和职能部门经理双重领导。',section:'1.2  工程项目管理组织与项目经理'},
  {type:'single',question:'某公司为完成某大型复杂的工程项目，要求在项目管理组织机构内设置职能部门以发挥各类专家作用。同时从公司临时抽调专业人员到项目管理组织机构，要求所有成员只对项目经理负责，项目经理全权负责该项目。该项目管理组织机构宜采用的组织形式是(    )。',options:['直线式', '强矩阵式', '职能式', '弱矩阵式'],answer:[1],analysis:'强矩阵式组织中，项目经理由企业最高领导任命，并全权负责项目。项目经理直接向企业最高领导负责，项目部成员绩效完全由项目经理进行考核，项目部成员只对项目经理负责。',memory:'【口诀】"只对经理负责=强矩阵"——项目经理全权负责，成员只对项目经理负责。',section:'1.2  工程项目管理组织与项目经理'},
  {type:'single',question:'下列关于工程项目管理组织机构形式的表述中，正确的是(    )。',options:['直线式组织结构中各职能部门的职责分明，但信息传递路线长', '职能式组织结构能够分别从职能角度对下级进行业务管理', '直线职能式组织结构中各职能部门可以直接下达命令，传递信息路线短', '矩阵式组织结构实现了集权和分权的最优组合，具有较强的稳定性'],answer:[1],analysis:'直线式组织机构中未设置职能部门，A选项错误；直线职能式组织结构中，职能部门只作为相应层级领导的参谋，在其所管辖业务范围内实施管理，不直接指挥下级，与下一层级职能部门构成业务指导关系，C选项错误；矩阵式组织结构的稳定性较差，尤其是业务人员的工作岗位调动频繁，D选项错误。本题正确答案是B选项。',memory:'【口诀】"职能式可从职能角度管理"——B正确。A直线无职能部门、C职能部门不直接指挥、D矩阵稳定性差均错。',section:'1.2  工程项目管理组织与项目经理'},
  {type:'single',question:'下列关于强矩阵式组织结构的说法中，错误的是(    )。',options:['项目经理由企业最高领导任命，并全权负责项目', '项目部成员绩效完全由项目经理进行考核', '需要精心建立管理程序和配备训练有素的协调人员', '适用于技术复杂且时间紧迫的工程项目'],answer:[2],analysis:'中矩阵式组织结构(平衡矩阵式组织结构)的特点是需要精心建立管理程序和配备训练有素的协调人员，C选项错误。',memory:'【口诀】"需要协调人员=中矩阵特征"——C描述的是中矩阵式特点，非强矩阵。',section:'1.2  工程项目管理组织与项目经理'},
  {type:'single',question:'下列工程参建方项目管理的说法，错误的是(    )。',options:['工程监理单位接受建设单位委托，为其提供专业化服务属于业主方项目管理', '工程设计方项目管理不仅仅局限于工程设计阶段，而是会延伸到施工阶段和竣工验收阶段', '工程咨询单位为施工承包单位提供的咨询服务不属于工程施工方项目管理范畴', '工程施工方项目管理目标包括施工进度、质量、成本和安全'],answer:[2],analysis:'工程咨询单位为施工承包单位提供的咨询服务也属于工程施工方项目管理范畴。',memory:'【口诀】"咨询帮施工也算施工方管理"——咨询单位为施工方服务属施工方项目管理。',section:'1.2  工程项目管理组织与项目经理'},
  {type:'single',question:'下列关于职能式组织结构的说法，错误的是(    )。',options:['在职能式组织结构中，各级领导不直接指挥下级，而是指挥职能部门', '各职能部门可以向下级执行者发布命令和指示', '职能式组织结构的主要优点是强调管理业务专门化，注意发挥各类专家在项目管理中的作用', '职能式组织结构存在多头领导，使下级执行者接受多方指令，容易造成职责不清'],answer:[1],analysis:'各职能部门可以在上级领导授权范围内，就其所管辖业务范围向下级执行者发布命令和指示。',memory:'【口诀】"职能式能下令"——可在授权范围内下达命令。A"不直接指挥"错误。',section:'1.2  工程项目管理组织与项目经理'},
  {type:'single',question:'关于工程项目管理组织结构形式特点的说法，正确的是(    )。',options:['职能式组织结构的主要优点是结构简单、权力集中、易于统一指挥、隶属关系明确、职责分明、决策迅速', '直线式组织结构的主要优点是强调管理业务专门化，注意发挥各类专家在项目管理中的作用。', '直线职能式组织结构主要优点是集中领导、职责清楚，有利于提高管理效率', '矩阵式组织结构的稳定性好'],answer:[2],analysis:'A选项错误，直线式组织结构的主要优点是结构简单、权力集中、易于统一指挥、隶属关系明确、职责分明、决策迅速。B选项错误，职能式组织结构的主要优点是强调管理业务专门化，注意发挥各类专家在项目管理中的作用。D选项错误，矩阵式组织结构的稳定性较差。',memory:'【口诀】"直能式=集中领导+职责清楚+效率高"——C正确。D矩阵稳定性差。',section:'1.2  工程项目管理组织与项目经理'},
  {type:'single',question:'根据《建设工程施工项目经理岗位职业标准》T/CCIAT0010—2019的规定，施工项目经理的职责不包括(    )。',options:['执行企业各项规章制度，组织制定和执行施工现场项目管理制度', '负责组织项目的管理收尾和合同收尾工作', '组织项目团队成员进行施工合同交底和项目管理目标责任分解', '建立健全协调工作机制，主持工地例会，协调解决工程施工问题'],answer:[1],analysis:'B项是工程总承包项目经理的职责。',memory:'【口诀】"管理收尾和合同收尾=总承包经理职责"——B不属于施工经理职责。',section:'1.2  工程项目管理组织与项目经理'},

  {type:'multi',question:'下列关于工程总承包管理的说法，正确的是(    )。',options:['设计经理或项目经理应负责组织编制设计执行计划', '项目经理应对采购执行计划的实施进行管理和监控', '施工经理应负责组织编制施工执行计划', '试运行经理应依据合同约定，负责组织或协助项目经理编制试运行方案', '试运行经理应按试运行执行计划和方案的要求落实相关的技术、人员和物资。'],answer:[0, 2, 4],analysis:'B项错误，采购经理应对采购执行计划的实施进行管理和监控。D项错误，试运行经理应依据合同约定，负责组织或协助项目发包人编制试运行方案，并应按试运行执行计划和方案的要求落实相关的技术、人员和物资。',memory:'【口诀】"设计经理编设计计划，采购经理管采购计划"——B项目经理监控采购错、D协助项目经理编方案错（应协助发包人）。',section:'1.2  工程项目管理组织与项目经理'},

  {type:'multi',question:'下列关于责任矩阵的作用，说法正确的是(    )。',options:['将工程项目管理的具体任务分配、落实到相关职能部门或人员，使工程项目部人员分工一目了然', '有利于调动各类人员的工作积极性，使项目管理工作顺利进行', '清楚地显示出工程项目部各部门或个人的角色、职责和相互关系，避免职责不清而出现推诿、扯皮现象', '有利于项目经理从总体上分析管理任务的分配是否平衡适当，以便进行必要的调整和优化', '确保最适合的人员去做最适当的事情，从而提高项目管理工作效率'],answer:[0, 2, 3, 4],analysis:'B项是矩阵式组织结构的优点。',memory:'【口诀】"B调动积极性=矩阵式优点"——B属矩阵式组织结构优点，不属责任矩阵作用。',section:'1.2  工程项目管理组织与项目经理'},
  {type:'multi',question:'下列关于直线式组织结构的特点，说法正确的是(    )。',options:['直线式组织结构是一种最简单的组织结构形式', '直线式组织结构的主要优点是结构简单、权力集中、易于统一指挥、隶属关系明确、职责分明、决策迅速', '项目经理有参谋和助手', '能够实现管理工作专业化，有利于提高项目管理水平', '项目经理直接进行单线垂直领导'],answer:[0, 1, 4],analysis:'直线式组织结构是一种最简单的组织结构形式。在这种组织结构中，各种职位均按直线垂直排列，项目经理直接进行单线垂直领导。直线式组织结构的主要优点是结构简单、权力集中、易于统一指挥、隶属关系明确、职责分明、决策迅速。但由于未设置职能部门，项目经理没有参谋和助手，需要其通晓各种业务，成为“全能式”人才。无法实现管理工作专业化，不利于提高项目管理水平。',memory:'【口诀】"直线式无参谋助手、不专业"——C"有参谋"和D"能专业化"均错。',section:'1.2  工程项目管理组织与项目经理'},
  {type:'multi',question:'下列关于直线职能式组织结构的特点，说法正确的是(    )。',options:['职能部门的指令，必须经过同层级领导的批准才能下达', '各管理层级之间按直线式组织结构原理构成直接上下级关系', '主要优点是集中领导、职责清楚', '不利于提高管理效率', '各职能部门之间的横向联系差，信息传递路线长，职能部门与指挥者之间容易产生矛盾'],answer:[0, 1, 2, 4],analysis:'D项错误，直线职能式组织结构其主要优点是集中领导、职责清楚，有利于提高管理效率。',memory:'【口诀】"直能式=集中领导效率高"——D"不利于提高效率"错误。',section:'1.2  工程项目管理组织与项目经理'},

  {type:'multi',question:'下列施工组织设计内容中，属于单位工程施工组织设计中 “施工部署” 的有（ ）。',options:['主要施工方案', '工程施工目标', '施工重点和难点分析', '主要分项工程施工工艺要求', '项目经理部工作岗位设置与职责划分'],answer:[1, 2, 4],analysis:'本题通过排除法作答，选项 A 与施工部署是并列关系；选项 D 属于施工方案特有的内容。施工部署是指对工程施工过程进行的统筹规划和全面安排，包括：①工程施工目标；②进度安排和空间组织；③施工重点和难点分析，包括组织管理和施工技术两个方面；④工程管理组织结构形式（项目经理部工作岗位设置与职责划分）；⑤“四新” 使用部署或要求；⑥分包单位要求。',memory:'【口诀】"施工部署六内容"——排除A(并列)和D(属施工方案)。',section:'1.3  工程项目管理规划与动态控制'},
  {type:'multi',question:'工程施工过程中，需要对施工组织设计进行修改或补充的情形有（ ）。',options:['工程设计有重大修改', '有关费用变化的', '主要施工方法有重大调整', '主要施工资源配置有重大调整', '施工环境有重大改变'],answer:[0, 2, 3, 4],analysis:'本题作答技巧：找关键词 “重大、重要、法律法规变化”。工程施工过程中发生下列情形时，应及时对施工组织设计进行修改或补充：①工程设计有重大修改；②有关法律、法规及标准实施、修订和废止；③主要施工方法有重大调整；④主要施工资源配置有重大调整；⑤施工环境有重大改变。',memory:'【口诀】"修改补充五情形：设计重大修改、法规变化、方法重大调整、资源重大调整、环境重大改变"——B"费用变化"不属。',section:'1.3  工程项目管理规划与动态控制'},

  {type:'multi',question:'下列施工项目目标控制措施中，属于经济措施的是（ ）。',options:['采用价值工程方法', '对工程变更方案进行技术经济分析', '与建设单位协商确定完善的合同条款', '建立施工项目目标控制工作考评机制', '明确工程责任成本'],answer:[1, 4],analysis:'A属于技术；B、E 属于经济措施；C 属于合同措施；D 属于组织措施。\n第2章  建设工程项目管理相关体系标准',memory:'【口诀】"经济措施=技术经济分析+明确责任成本"——BE属经济，A属技术，C属合同，D属组织。',section:'1.3  工程项目管理规划与动态控制'}
];
const PASSWORD = '6666';
let currentIndex = 0, score = 0, revealed = false;
let userAnswers = new Array(questions.length).fill(null);
let feedbackList = [];
const optLabels = 'ABCDEFGHIJ'.split('');

let pwPassed = false;
function checkPassword() {
  const i = document.getElementById('pwInput'), e = document.getElementById('pwError');
  if (i.value===PASSWORD) {
    pwPassed = true;
    document.getElementById('passwordOverlay').style.display = 'none';
    document.body.style.overflow = '';
    init();
  }
  else { e.textContent='密码错误，请重新输入'; i.style.animation='shake 0.4s'; setTimeout(()=>i.style.animation='',400); }
}
function initPassword() {
  document.body.style.overflow = 'hidden';
  document.getElementById('pwInput').focus();
  document.getElementById('pwInput').addEventListener('keydown', function(ev) { if (ev.key==='Enter') checkPassword(); });
  document.getElementById('pwBtn').addEventListener('click', function() { checkPassword(); });
}

function init() {
  const js=document.getElementById('jumpSelect');
  questions.forEach((_,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`第 ${i+1} 题`;js.appendChild(o);});
  js.addEventListener('change',()=>{currentIndex=parseInt(js.value);renderQuestion();});
  document.getElementById('totalNum').textContent=questions.length;
  renderQuestion();
}

function renderQuestion() {
  const q=questions[currentIndex];
  document.getElementById('questionCard').style.display='';
  document.getElementById('finishCard').classList.remove('show');
  document.getElementById('sectionTag').textContent=q.section||'';
  document.getElementById('qBadge').textContent=q.type==='single'?'单选题':'多选题';
  document.getElementById('qBadge').className='q-badge '+(q.type==='single'?'single':'multi');
  document.getElementById('qNumber').textContent=`第 ${currentIndex+1} 题（共 ${questions.length} 题）`;
  document.getElementById('qText').textContent=q.question;
  document.getElementById('qScoreText').textContent=q.type==='single'?'1分':'2分';
  document.getElementById('currentNum').textContent=currentIndex+1;
  document.getElementById('progressBar').style.width=((currentIndex+1)/questions.length*100)+'%';
  document.getElementById('jumpSelect').value=currentIndex;
  const c=document.getElementById('optionsContainer');c.innerHTML='';
  q.options.forEach((opt,i)=>{const d=document.createElement('div');d.className='option';d.innerHTML=`<div class="opt-label">${optLabels[i]}</div><div class="opt-text">${opt}</div><div class="opt-icon"></div>`;d.addEventListener('click',()=>toggleOption(i,d));c.appendChild(d);});
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('confirmBtn').style.display='';document.getElementById('feedbackBtn').style.display='none';
  if(userAnswers[currentIndex]!==null){revealed=true;showResult(false);}else{revealed=false;document.getElementById('confirmBtn').disabled=false;}
}

function toggleOption(index,div) {
  if(revealed)return;const q=questions[currentIndex];
  if(q.type==='single'){document.querySelectorAll('.option').forEach(el=>el.classList.remove('selected'));div.classList.add('selected');userAnswers[currentIndex]=[index];}
  else{div.classList.toggle('selected');const s=[];document.querySelectorAll('.option').forEach((el,i)=>{if(el.classList.contains('selected'))s.push(i);});userAnswers[currentIndex]=s.length>0?s:null;}
  document.getElementById('confirmBtn').disabled=!userAnswers[currentIndex]||userAnswers[currentIndex].length===0;
}

function confirmAnswer() {
  if(revealed){const a=userAnswers.every(a=>a!==null);if(a)showFinish();else nextQuestion();return;}
  if(!userAnswers[currentIndex])return;revealed=true;showResult(true);
}

function showResult(isConfirm) {
  const q=questions[currentIndex],ua=userAnswers[currentIndex].slice().sort(),ca=q.answer.slice().sort();
  const ok=ua.length===ca.length&&ua.every((v,i)=>v===ca[i]);
  if(isConfirm){if(ok)score+=q.type==='single'?1:2;else if(q.type==='multi'&&ua.length>0){const w=ua.filter(a=>!ca.includes(a));if(w.length===0){score+=Math.round(ua.filter(a=>ca.includes(a)).length*0.5*10)/10;}}document.getElementById('scoreDisplay').textContent=score;}
  document.querySelectorAll('.option').forEach((el,i)=>{el.classList.add('disabled');if(ca.includes(i)){if(ua.includes(i))el.classList.add('correct');else el.classList.add('reveal-correct');el.querySelector('.opt-icon').textContent='✓';}else if(ua.includes(i)){el.classList.add('wrong');el.querySelector('.opt-icon').textContent='✗';}});
  if(ok){const p=q.type==='single'?1:2;document.getElementById('expAnswer').innerHTML=`<span style="color:#38a169">✓ 回答正确！+${p}分</span>`;}
  else{let ps=0;if(q.type==='multi'&&ua.length>0){const w=ua.filter(a=>!ca.includes(a));if(w.length===0)ps=Math.round(ua.filter(a=>ca.includes(a)).length*0.5*10)/10;}document.getElementById('expAnswer').innerHTML=`<span style="color:#e53e3e">✗ 回答错误${ps>0?'（部分正确 +'+ps+'分）':''}。正确答案：${ca.map(a=>optLabels[a]).join('')}</span>`;}
  document.getElementById('expAnalysis').innerHTML=`<div class="ea-title">📝 解析</div>${q.analysis}`;
  if(q.memory){document.getElementById('expMemory').innerHTML=`<div class="em-title">💡 记忆技巧</div>${q.memory}`;document.getElementById('expMemory').style.display='block';}else{document.getElementById('expMemory').style.display='none';}
  document.getElementById('explanation').classList.add('show');
  document.getElementById('confirmBtn').textContent='下一题 ▶';document.getElementById('confirmBtn').style.display='';document.getElementById('feedbackBtn').style.display='';
  if(isConfirm){const a=userAnswers.every(a=>a!==null);if(a)document.getElementById('confirmBtn').textContent='查看结果 🎉';}
}

function nextQuestion() { if(currentIndex<questions.length-1){currentIndex++;renderQuestion();} }

function showFinish() {
  document.getElementById('questionCard').style.display='none';
  document.getElementById('finishCard').classList.add('show');
  const t=questions.reduce((s,q)=>s+(q.type==='single'?1:2),0),w=[];
  questions.forEach((q,i)=>{if(userAnswers[i]===null)return;const u=userAnswers[i].slice().sort(),c=q.answer.slice().sort();if(!(u.length===c.length&&u.every((v,j)=>v===c[j])))w.push(i+1);});
  document.getElementById('finalScore').textContent=`${score} / ${t}`;
  document.getElementById('finalDetail').textContent=`共${questions.length}题，答对${questions.length-w.length}题，答错${w.length}题`;
  document.getElementById('reviewBtn').style.display=w.length>0?'':'none';
}

function resetQuiz() { currentIndex=0;score=0;revealed=false;userAnswers=new Array(questions.length).fill(null);feedbackList=[];document.getElementById('scoreDisplay').textContent='0';renderQuestion(); }

function openReview() {
  const l=document.getElementById('reviewList');l.innerHTML='';let h=false;
  questions.forEach((q,i)=>{if(userAnswers[i]===null)return;const u=userAnswers[i].slice().sort(),c=q.answer.slice().sort();
  if(!(u.length===c.length&&u.every((v,j)=>v===c[j]))){h=true;const d=document.createElement('div');d.className='review-item';d.innerHTML=`<div class="ri-q">${i+1}. ${q.question}</div><div class="ri-row ri-user">你的答案：${u.map(a=>optLabels[a]).join('')}</div><div class="ri-row ri-correct">正确答案：${c.map(a=>optLabels[a]).join('')}</div><div class="ri-kp">📝 ${q.analysis}</div>`;d.style.cursor='pointer';d.addEventListener('click',()=>{closeReview();currentIndex=i;renderQuestion();});l.appendChild(d);}});
  if(!h)l.innerHTML='<div class="review-empty">🎉 全部正确，没有错题！</div>';
  document.getElementById('reviewModal').classList.add('show');
}
function closeReview(){document.getElementById('reviewModal').classList.remove('show');}
function openFeedback(){document.getElementById('feedbackText').value='';document.getElementById('feedbackModal').classList.add('show');}
function closeFeedback(){document.getElementById('feedbackModal').classList.remove('show');}
function submitFeedback(){const t=document.getElementById('feedbackText').value.trim();if(!t)return;feedbackList.push({qIndex:currentIndex,question:questions[currentIndex].question,content:t});closeFeedback();}
function openFeedbackSummary(){const l=document.getElementById('feedbackSummaryList');l.innerHTML='';feedbackList.forEach(fb=>{const d=document.createElement('div');d.className='fb-item';d.innerHTML=`<div class="fb-q">第${fb.qIndex+1}题：${fb.question}</div><div class="fb-content">${fb.content}</div>`;l.appendChild(d);});document.getElementById('feedbackSummaryModal').classList.add('show');}
function closeFeedbackSummary(){document.getElementById('feedbackSummaryModal').classList.remove('show');}

initPassword();
</script>
</body>
